                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                console.log('[person] 停止天维度自动刷新');
              }
            }
          }, 3 * 60 * 1000); // 每 3 分钟刷新一次

          if (mode === 'day' && selectedDate) {

              console.log('[person] ✅ 自动刷新（立即）：restoreLatestFromServer 完成');
              const clientId = resolveClientId();
              fetch(`${API_BASE}/api/archives/history?client_id=${encodeURIComponent(clientId)}&date=${encodeURIComponent(selectedDate)}`, { cache: 'no-store' })
                .then(resp => {
                  if(resp.ok){
                    return resp.json();
                  }
                  return null;
                })
                .then(payload => {
                  if(payload && payload.memberRaw){
                    const normalizedRaw = CacheManager.normalizeMemberRaw(payload.memberRaw);
                    if(normalizedRaw && typeof normalizedRaw === 'string' && normalizedRaw.length > 100){
                      try{
                        const testParse = JSON.parse(normalizedRaw);
                        if(testParse && testParse.log && testParse.log.entries && Array.isArray(testParse.log.entries) && testParse.log.entries.length > 0){
                          localStorage.setItem(storageRawKey(selectedDate), normalizedRaw);
                          console.log('[person] ✅ 自动刷新（立即）：已更新', selectedDate, '的最新 HAR 数据，长度:', normalizedRaw.length, 'entries:', testParse.log.entries.length);
                        }
                      }catch(e){
                        console.warn('[person] ⚠️ 自动刷新（立即）：HAR 数据解析失败:', e);
                      }
                    }
                  }
                  refreshFromLocal().then(() => {
                    if(mode === 'day'){
                      renderChartDayHourly();
                    } else {
                      const name = currentName || (function(){ const params = new URLSearchParams(location.search); return decodeURIComponent(params.get('name') || '').trim(); })();
                      renderChartUnified(buildSeriesForName(name), buildCompareMap(mode));
                    }
                  });
                })
                .catch(err => {
                  console.warn('[person] ⚠️ 自动刷新（立即）：获取最新 HAR 数据失败:', err);
                  refreshFromLocal().then(() => {
                    if(mode === 'day'){
                      renderChartDayHourly();
                    } else {
                      const name = currentName || (function(){ const params = new URLSearchParams(location.search); return decodeURIComponent(params.get('name') || '').trim(); })();
                      renderChartUnified(buildSeriesForName(name), buildCompareMap(mode));
                    }
                  });
                });
            }).catch(err => {
              console.warn('[person] ❌ 自动刷新（立即）失败:', err);
            });
          }
        }
      }
      
      // 监听模式切换和日期切换，自动启动/停止刷新
      const granularitySeg = document.getElementById('granularity');
      if (granularitySeg) {
        granularitySeg.addEventListener('click', (e) => {
          const btn = e.target.closest('button');
          if (btn && btn.dataset.mode) {
            setTimeout(() => {
              startAutoRefreshForDay();
            }, 100);
          }
        });
      }
      
      // 监听日期选择器变化（注意：在 updateDateNavigation 中已经有另一个监听器，这里只负责启动自动刷新）
      // 这个监听器会在日期切换后启动自动刷新
      
      // 页面加载后启动自动刷新（如果是天维度且选择的是今天）
      setTimeout(() => {
        startAutoRefreshForDay();
      }, 2000); // 延迟 2 秒启动，避免与初始加载冲突
      
      // 页面卸载时清除定时器
      window.addEventListener('beforeunload', () => {
        if (autoRefreshInterval) {
          clearInterval(autoRefreshInterval);
          autoRefreshInterval = null;
        }
      });
      if(localBtn){
        let forceBtn = document.getElementById('localForceRefreshBtn');
        if(!forceBtn){
          forceBtn = document.createElement('button');
          forceBtn.id = 'localForceRefreshBtn';
          forceBtn.className = 'btn-light';
          forceBtn.title = '强制从本地原始存档补齐并覆盖当日';
          forceBtn.textContent = '强制补齐当日';
          forceBtn.style.marginLeft = '8px';
          forceBtn.style.display = 'none';
          localBtn.insertAdjacentElement('afterend', forceBtn);
        }
        forceBtn.addEventListener('click', ()=>{
          const d = selectedDate || (function(){ const ds = listStoredDates(); return ds.length ? ds[ds.length-1] : null; })();
          restoreLatestFromServer().then(()=>refreshFromLocal({ force: true, dates: d ? [d] : null })).catch(()=>{});
        });
      }

      // 更多成员筛选渲染与事件绑定
      const moreContainer = document.getElementById('moreMembers');
      let allCandidates = [];

      // 取某成员的出生时间戳（优先源数据，其次回退映射），不存在返回 -Infinity
      function birthTsForName(n){
        try{
          const name = String(n||'').trim();
          if(!name) return -Infinity;
          const dates = listStoredDates();
          for(const d of dates){
            const rows = getStoredRowsForDate(d) || [];
            for(const r of rows){
              const rn = String(r.realName || r.姓名 || '').trim();
              if(rn === name){
                const ts = (r.birthTs != null && Number.isFinite(Number(r.birthTs))) ? Number(r.birthTs) : null;
                if(ts != null) return ts;
              }
            }
          }
          const fb = birthFallbacks[name];
          if(fb){ const parsed = Date.parse(fb); if(Number.isFinite(parsed)) return parsed; }
          return -Infinity;
        }catch(e){ return -Infinity; }
      }

      function renderMoreMembers(){
        const main = String(currentName || '').trim();
        let list = (allCandidates || [])
          .filter(n => String(n || '').trim())
          .filter(n => { // 仅显示有历史记录的成员
            try{
              const s = buildSeriesForName(n) || [];
              return Array.isArray(s) && s.length > 0;
            }catch(e){ return false; }
          });
        // 按出生年月日时间由小到大（最年长在前）；未知出生排最后
        list = list.sort((a,b) => {
          const va = birthTsForName(a);
          const vb = birthTsForName(b);
          if(va === -Infinity && vb === -Infinity) return 0;
          if(va === -Infinity) return 1;
          if(vb === -Infinity) return -1;
          return va - vb;
        });
        moreContainer.innerHTML = list.map(n => {
          const c = colorOf(n);
          const bg = colorWithAlpha(c, 0.18);
          const bd = c;
          return `
          <label class="chk ${compareNames.has(n)?'active':''}" data-name="${n}" style="display:flex; align-items:center; gap:4px; font-size:13px; padding:3px 6px; border:1px solid ${bd}; border-radius:6px; background:${bg}; color:#1d1d1f; width:max-content;">
            <span>${n}</span>
          </label>
          `;
        }).join('');
      }

      function latestFansForName(n){
        try{
          const s = buildSeriesForName(n) || [];
          if(!s.length) return -Infinity; // 无数据的成员不参与默认Top7
          const last = s[s.length - 1];
          return Number(last.fans) || 0;
        }catch(e){ return -Infinity; }
      }

      (function populateMoreMembers(){
        const fromStorage = listAllMemberNames().filter(n => n);
        const fallback = Object.keys(birthFallbacks || {}).filter(n => n);
        allCandidates = (fromStorage.length ? fromStorage : fallback);
        // 默认：进入主页时按最新粉丝数选出 TOP7（含主页成员最多7条）
        try{
          const main = String(currentName || '').trim();
          const targetTotal = 7;
          const sortedByFans = (allCandidates || [])
            .filter(n => String(n || '').trim())
            .map(n => {
              const s = buildSeriesForName(n) || [];
              const latestFans = (s.length ? (Number(s[s.length - 1].fans) || 0) : -Infinity);
              return { name: n, latestFans };
            })
            .filter(x => x.latestFans !== -Infinity)
            .sort((a,b) => b.latestFans - a.latestFans)
            .map(x => x.name);
          const topList = sortedByFans.slice(0, targetTotal);
          let compares = [];
          if(topList.includes(main)){
            compares = topList.filter(n => n !== main);
          }else{
            compares = topList.slice(0, Math.max(0, targetTotal - 1));
          }
          compareNames = new Set(compares);
        }catch(e){
          compareNames = new Set();
        }
        renderMoreMembers();
        // 初始渲染包含默认TOP7对比成员
        renderChartUnified(seriesRaw, buildCompareMap(mode));
      })();

      // 标签点击切换：选中显示该成员趋势，再次点击隐藏
      moreContainer.addEventListener('click', (e) => {
        const lab = e.target.closest('label.chk');
        if(!lab) return;
        const nm = lab.dataset.name;
        const main = String(currentName || '').trim();
        if(String(nm || '').trim() === main) return;
        if(compareNames.has(nm)){
          compareNames.delete(nm);
          lab.classList.remove('active');
          try{
            const c = colorOf(nm);
            lab.style.borderColor = c;
            lab.style.background = colorWithAlpha(c, 0.18);
          }catch(e){}
        } else {
          compareNames.add(nm);
          lab.classList.add('active');
          try{
            const c = colorOf(nm);
            lab.style.borderColor = c;
            lab.style.background = colorWithAlpha(c, 0.28);
          }catch(e){}
        }
        renderChartUnified(buildSeriesForName(currentName || ''), buildCompareMap(mode));
        updateDateNavigation();
      });

      // 已移除搜索框与过滤逻辑，始终展示完整候选成员列表

      // 切换颗粒度
      const seg = document.getElementById('granularity');
      seg.addEventListener('click', (e)=>{
        const btn = e.target.closest('button');
        if(!btn) return;
        [...seg.querySelectorAll('button')].forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode || 'week';
        // 切换维度后按选择的日期本地重渲染
        renderChartUnified(buildSeriesForName(currentName || ''), buildCompareMap(mode));
        updateDateNavigation();
      });

      // 趋势类型切换
      const typeSeg = document.getElementById('trendType');
      typeSeg.addEventListener('click', (e)=>{
        const btn = e.target.closest('button');
        if(!btn) return;
        [...typeSeg.querySelectorAll('button')].forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        trendType = btn.dataset.type || 'growth';
        renderChartUnified(buildSeriesForName(currentName || ''), buildCompareMap(mode));
      });

      // 日期导航（所有维度均可选单日；week/month 以该日所在周/月作为区间）
      function updateDateNavigation(){
        const dateNav = document.getElementById('dateNavigation');
        const dateSelector = document.getElementById('dateSelector');
        const stored = listStoredDates().sort().reverse();
        const fallbackToday = new Date().toISOString().split('T')[0];
        dateNav.style.display = 'flex';
        dateSelector.innerHTML = '<option value="">请选择日期</option>';
        // 过滤掉未来日期，只显示今天及之前的日期
        const today = new Date().toISOString().split('T')[0];
        const validDates = stored.filter(d => d <= today);
        const dates = validDates.length ? validDates : [fallbackToday];
        const current = selectedDate || fallbackToday;
        dates.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d; opt.textContent = d; if(d===current) opt.selected = true; dateSelector.appendChild(opt);
        });
      }
      // 标志位：用户是否主动选择了日期
      let userSelectedDate = false;
      
      document.getElementById('dateSelector').addEventListener('change', async (e)=>{
        const v = e.target.value;
        if(v){
          userSelectedDate = true; // 标记用户已主动选择日期
          selectedDate = v;
          try{
            const monthDates = listDatesBetween(getMonthStart(v), v);
            await ensureDateCoverage({
              clientId: resolveClientId(),
              dates: monthDates
            });
            // 如果是天维度，确保获取该日期的最新 HAR 数据
            if(mode === 'day'){
              try{
                const clientId = resolveClientId();
                const dateHistoryResp = await fetch(`${API_BASE}/api/archives/history?client_id=${encodeURIComponent(clientId)}&date=${encodeURIComponent(v)}`, { cache: 'no-store' });
                if(dateHistoryResp.ok){
                  const dateHistoryPayload = await dateHistoryResp.json();
                  const normalizedRaw = CacheManager.normalizeMemberRaw(dateHistoryPayload.memberRaw);
                  // 更新 memberRaw（HAR 数据）到 localStorage
                  if(normalizedRaw && normalizedRaw.length > 100){
                    try{ 
                      localStorage.setItem(storageRawKey(v), normalizedRaw);
                      console.log('[person] ✅ 日期切换：已更新日期', v, '的 HAR 数据，长度:', normalizedRaw.length);
                    }catch(_){}
                  } else {
                    console.warn('[person] ⚠️ 日期切换：获取到的 HAR 数据无效，长度:', normalizedRaw ? normalizedRaw.length : 0);
                  }
                }
              }catch(err){
                console.warn('[person] 获取日期', v, '的 HAR 数据失败:', err);
              }
            }
          }catch(err){
            console.warn('[person] dateSelector ensure coverage failed:', err);
          }
          renderChartUnified(buildSeriesForName(currentName || ''), buildCompareMap(mode));
          // 日期切换后，重新启动自动刷新
          setTimeout(() => {
            startAutoRefreshForDay();
          }, 100);
        }
      });


      // 初始化后自动拉取并重算，确保增长趋势最新，并在数据就绪后重建默认TOP7
      restoreLatestFromServer()
        .then(()=>refreshFromLocal())
        .then(()=>{
          // 如果当前是天维度且用户未主动选择日期，才自动切换到最新日期
          if(mode === 'day' && !userSelectedDate){
            const allDates = listStoredDates();
            if(allDates.length){
              const latestStoredDate = allDates[allDates.length - 1];
              if(!selectedDate || selectedDate !== latestStoredDate){
                selectedDate = latestStoredDate;
                updateDateNavigation();
                console.log('[person] 天维度自动切换到最新日期（首次加载）:', selectedDate);
              }
            }
          }
          try{
            const fromStorage = listAllMemberNames().filter(n => n);
            const fallback = Object.keys(birthFallbacks || {}).filter(n => n);
            const candidates = (fromStorage.length ? fromStorage : fallback);
            const main = String(currentName || '').trim();
            const targetTotal = 7;
            const sortedByFans = (candidates || [])
              .filter(n => String(n || '').trim())
              .map(n => {
                const s = buildSeriesForName(n) || [];
                const latestFans = (s.length ? (Number(s[s.length - 1].fans) || 0) : -Infinity);
                return { name: n, latestFans };
              })
              .filter(x => x.latestFans !== -Infinity)
              .sort((a,b) => b.latestFans - a.latestFans)
              .map(x => x.name);
            const topList = sortedByFans.slice(0, targetTotal);
            let compares = [];
            if(topList.includes(main)){
              compares = topList.filter(n => n !== main);
            }else{
              compares = topList.slice(0, Math.max(0, targetTotal - 1));
            }
            compareNames = new Set(compares);
          }catch(e){ compareNames = new Set(); }
          renderMoreMembers();
          renderChartUnified([], buildCompareMap(mode));
        })
        .catch(()=>{
          refreshFromLocal().then(()=>{
            try{
              const fromStorage = listAllMemberNames().filter(n => n);
              const fallback = Object.keys(birthFallbacks || {}).filter(n => n);
              const candidates = (fromStorage.length ? fromStorage : fallback);
              const main = String(currentName || '').trim();
              const targetTotal = 7;
              const sortedByFans = (candidates || [])
                .filter(n => String(n || '').trim())
                .map(n => {
                  const s = buildSeriesForName(n) || [];
                  const latestFans = (s.length ? (Number(s[s.length - 1].fans) || 0) : -Infinity);
                  return { name: n, latestFans };
                })
                .filter(x => x.latestFans !== -Infinity)
                .sort((a,b) => b.latestFans - a.latestFans)
                .map(x => x.name);
              const topList = sortedByFans.slice(0, targetTotal);
              let compares = [];
              if(topList.includes(main)){
                compares = topList.filter(n => n !== main);
              }else{
                compares = topList.slice(0, Math.max(0, targetTotal - 1));
              }
              compareNames = new Set(compares);
            }catch(e){ compareNames = new Set(); }
            renderMoreMembers();
            renderChartUnified([], buildCompareMap(mode));
          });
        });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
