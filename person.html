<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎀 个人主页</title>
  <style>
    /* 基础配色与容器样式，沿用主页面紫色渐变视觉 */
    :root {
      --purple-1: #8e73ff;
      --purple-2: #c3a8ff;
      --purple-3: #6f8af8;
      --text-strong: #2c2c2c;
      --text-muted: #666;
      --card-bg: #fff;
      --border: rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #f6f7fb; color: var(--text-strong); }
    .container { max-width: 920px; margin: 0 auto; background: #fff; border-radius: 14px; box-shadow: 0 6px 24px rgba(0,0,0,0.06); padding: 50px 12px 36px; position: relative; }
    .container::before { content:""; position: absolute; left:0; top:0; width:100%; height:30px; background: linear-gradient(90deg, var(--purple-1), var(--purple-2), var(--purple-3)); border-top-left-radius: 14px; border-top-right-radius: 14px; }
    .page-header { padding: 0 0 14px; border-bottom: 1px solid var(--border); }
    .title-wrap { position: relative; }
    .title-wrap h1 { margin: 0; font-size: 22px; line-height: 1.4; font-weight: 800; letter-spacing: 0.5px; }
    .title-wrap h1::after { content:""; display:block; width: 100%; height: 2px; margin-top: 8px; background: linear-gradient(90deg, var(--purple-1), var(--purple-2), var(--purple-3)); opacity: 0.82; border-radius: 2px; }
    .back-link { position:absolute; right:0; top:0; font-size: 13px; color: #4c6ef5; text-decoration: none; padding: 4px 8px; border-radius: 6px; background: rgba(76,110,245,0.1); }

    .profile { display: grid; grid-template-columns: 96px 1fr; gap: 16px; align-items: center; margin-top: 16px; }
    .avatar { width: 96px; height: 96px; border-radius: 12px; object-fit: cover; background: #eee; border: 1px solid var(--border); }
    .info .name { font-size: 20px; font-weight: 700; }
    .info .nick { font-size: 14px; color: var(--text-muted); margin-left: 8px; }
    .info .meta { margin-top: 6px; font-size: 13px; color: var(--text-muted); }

    .stats { display:none; }
    .metrics-inline { margin-top: 16px; display: flex; justify-content: center; gap: 10px; }
    .metrics-inline .metric { display: flex; align-items: baseline; justify-content: center; text-align: center; font-size: 14px; color: var(--text-strong); gap: 6px; }
    .metrics-inline .value { font-weight: 700; }

    .controls { display:flex; align-items:center; gap:10px; margin-top: 18px; }
    .seg { display:flex; border:1px solid var(--border); border-radius: 8px; overflow:hidden; }
    .seg button { padding: 8px 12px; background:#fff; border:none; border-right:1px solid var(--border); font-size: 13px; cursor:pointer; }
    .seg button:last-child { border-right:none; }
    .seg button.active { background: rgba(142,115,255,0.14); color:#4c3bb3; }

    .chart-wrap { margin-top: 10px; background: var(--card-bg); border:1px solid var(--border); border-radius: 12px; padding: 12px; }
    .empty { margin-top: 12px; color: var(--text-muted); font-size: 13px; }
    /* 更多成员标签点击态样式 */
    .more-members .chk { cursor: pointer; user-select: none; }
    .more-members .chk.active { background: rgba(142,115,255,0.12); border-color: var(--purple-1); }
    /* 隐藏文本的辅助类：用于特定区域清空文本显示 */
    .hide-text, .hide-text * { color: transparent !important; }
    /* 隐藏整块控制区容器 */
    .hide-controls { display: none !important; }

    @media (max-width: 640px){
      .container { padding: 50px 12px 36px; }
      .profile { grid-template-columns: 72px 1fr; }
      .avatar { width: 72px; height: 72px; border-radius: 10px; }
      .stats { grid-template-columns: 1fr; }
      .metrics-inline { gap: 8px; }
      .metrics-inline .metric { font-size: 13px; }
    }
    /* 页脚 LOGO：居中显示，响应式宽度与回退文本 */
    .footer-logo { margin-top: 16px; margin-bottom: 8px; text-align: center; }
    .footer-logo img { display: block; margin: 0 auto; width: min(420px, 86vw); height: auto; max-width: 100%; }
    .footer-logo .logo-fallback { display: none; font-size: 13px; color: #444; opacity: 0.75; }
    @media (max-width: 640px){
      .footer-logo img { width: min(360px, 86vw); }
    }
    /* 状态徽章样式：用于拉取/刷新状态与最后同步时间 */
    .status-badge { display:inline-block; padding:4px 8px; border-radius: 999px; background: rgba(142,115,255,0.08); border:1px solid var(--border); font-size:12px; line-height:1.2; }
    .status-info { color:#4c6ef5; background: rgba(76,110,245,0.10); border-color: rgba(76,110,245,0.18); }
    .status-success { color:#137333; background: rgba(19,115,51,0.10); border-color: rgba(19,115,51,0.18); }
    .status-error { color:#d93025; background: rgba(217,48,37,0.10); border-color: rgba(217,48,37,0.18); }
    .status-muted { color: var(--text-muted); background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }
  </style>
  <!-- 引入 Chart.js 用于趋势可视化（离线） -->
  <script src="vendor/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <div class="title-wrap">
        <h1>🎀 个人主页</h1>
        <a class="back-link" href="index.html">返回榜单</a>
      </div>
    </div>

    <div class="profile">
      <img id="profileAvatar" class="avatar" alt="头像" onerror="this.style.display='none'" />
      <div class="info">
        <div class="name">
          <span id="profileName">—</span>
          <span id="profileNick" class="nick">—</span>
        </div>
        <div class="meta">用户ID：<span id="profileUserId">—</span></div>
        <div class="meta">生日：<span id="profileBirth">—</span></div>
        <div class="meta">年龄：<span id="profileAge">—</span> · <span id="profileZodiac">—</span></div>
      </div>
    </div>

    <div class="metrics-inline">
      <div class="metric"><span class="label">粉丝数</span>：<span id="statFans" class="value">—</span></div>
      <div class="metric"><span class="label">收藏数</span>：<span id="statCollect" class="value">—</span></div>
      <div class="metric"><span class="label">点赞数</span>：<span id="statLike" class="value">—</span></div>
    </div>

    <div class="controls" id="dateNavigation" style="margin-top:6px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <div class="label" style="font-size:13px; color:var(--text-muted);">选择日期：</div>
      <select id="dateSelector" style="padding:4px 8px; border:1px solid #ddd; border-radius:4px; font-size:13px;">
        <option value="">请选择日期</option>
      </select>
    </div>
    <div class="controls">
      <div class="label" style="font-size:13px; color:var(--text-muted);">时间维度：</div>
      <div class="seg" id="granularity">
        <button data-mode="day" class="active">天</button>
        <button data-mode="week">周</button>
        <button data-mode="month">月</button>
      </div>
    </div>
    <div class="controls hide-controls" style="margin-top:6px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <div class="label" style="font-size:13px; color:var(--text-muted);">存档：</div>
      <button id="restoreLatestBtn" class="btn-light" title="从服务器拉取最新归档并合并到本地">从服务器恢复最新存档</button>
      <button id="localRefreshBtn" class="btn-light" title="从本地原始存档扫描缺失并重渲染">从本地刷新并重渲染</button>
      <span id="restoreStatus" class="status-badge"></span>
      <span id="localRefreshStatus" class="status-badge"></span>
      <span id="lastSyncTimePerson" class="status-badge status-muted">最后同步时间：—</span>
    </div>
    <!-- 显示内容勾选：默认仅显示粉丝数，勾选显示点赞/收藏 -->
    <div class="controls" style="margin-top:6px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <div class="label" style="font-size:13px; color:var(--text-muted);">数据维度：</div>
      <div id="metricToggles" style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
          <input id="toggleFans" type="radio" name="metric" checked /> 粉丝数
        </label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
          <input id="toggleLike" type="radio" name="metric" /> 点赞数
        </label>
        <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
          <input id="toggleCollect" type="radio" name="metric" /> 收藏数
        </label>
      </div>
    </div>
    <!-- 趋势类型：增长/总数切换 -->
    <div class="controls" style="margin-top:6px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <div class="label" style="font-size:13px; color:var(--text-muted);">趋势类型：</div>
      <div class="seg" id="trendType">
        <button data-type="growth" class="active">增长趋势</button>
        <button data-type="total">粉丝总数趋势</button>
      </div>
    </div>
    <!-- 已移除日维度日期导航：仅保留周/月 -->
    

    <div class="chart-wrap">
      <canvas id="trendChart" height="220"></canvas>
      <div id="emptyMsg" class="empty" style="display:none;">暂无该成员历史数据，请先在榜单页保存当日数据。</div>
    </div>
    <!-- 成员选择模块：移至折线图下方（每行 6 个，移除“更多成员”文本） -->
    <div class="filters" style="display:flex; align-items:flex-start; gap:10px; flex-wrap:wrap; margin-top:8px;">
      <div id="moreMembers" class="more-members" style="display:grid; grid-template-columns: repeat(7, auto); gap:8px; justify-content:center; width:max-content; margin:0 auto;"></div>
    </div>
    <!-- 页脚LOGO（图片加载失败时显示回退文本） -->
    <div class="footer-logo" role="contentinfo" aria-label="站点Logo">
      <img src="assets/tf-family-logo-dark.png" alt="TF FAMILY LOGO" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';" />
      <div class="logo-fallback" aria-hidden="true">TF FAMILY · TF家族</div>
    </div>

  </div>

  <script>
    // 复用主页面的本地存储结构
    // 统一使用稳定 API 域名；页面将优先通过同源 /api 代理转发
    const API_BASE = 'https://api.rank.dailygh4.com';
    function storageKey(dateStr){ return `memberData:${dateStr}`; }
    function storageRawKey(dateStr){ return `memberRaw:${dateStr}`; }
    function listStoredDates(){
      const dates = new Set();
      try{
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(!k) continue;
          if(k.startsWith('memberRaw:') || k.startsWith('memberData:')){
            const d = k.split(':')[1];
            if(d) dates.add(d);
          }
        }
      }catch(e){}
      return Array.from(dates).sort();
    }
    function getStoredRowsForDate(dateStr){
      if(!dateStr) return [];
      try{ const v = localStorage.getItem(storageKey(dateStr)); return v ? JSON.parse(v) : []; }catch(e){ return []; }
    }
    function getWeekStart(dateStr){
      const d = new Date(dateStr);
      const day = d.getDay();
      const delta = -day; // Sunday as start (周日起始)
      const start = new Date(d);
      start.setDate(d.getDate() + delta);
      return start.toISOString().split('T')[0];
    }
    function getMonthStart(dateStr){
      const d = new Date(dateStr);
      const y = d.getFullYear(); const m = d.getMonth()+1;
      const mm = String(m).padStart(2,'0');
      return `${y}-${mm}-01`;
    }
    // 计算日期列表：周（日-六）与月（1日至最后一日）
    function addDays(dateStr, days){
      const d = new Date(dateStr);
      const nd = new Date(d);
      nd.setDate(d.getDate() + Number(days));
      return nd.toISOString().split('T')[0];
    }
    function listDatesInWeek(dateStr){
      if(!dateStr) return [];
      const start = getWeekStart(dateStr);
      const labels = [];
      for(let i=0;i<7;i++) labels.push(addDays(start, i));
      return labels;
    }
    function listDatesInMonth(dateStr){
      if(!dateStr) return [];
      const d = new Date(dateStr);
      const y = d.getFullYear();
      const m = d.getMonth()+1; // 1-12
      const lastDay = new Date(y, m, 0).getDate();
      const mm = String(m).padStart(2,'0');
      const labels = [];
      for(let dd=1; dd<=lastDay; dd++){
        const ddStr = String(dd).padStart(2,'0');
        labels.push(`${y}-${mm}-${ddStr}`);
      }
      return labels;
    }

    // 最后同步时间显示与持久化
    function initLastSyncPerson(){ try{ const v = Number(localStorage.getItem('last_sync_time')); const el = document.getElementById('lastSyncTimePerson'); if(el){ el.textContent = v ? `最后同步时间：${new Date(v).toLocaleString('zh-CN',{hour12:false})}` : '最后同步时间：—'; } }catch(e){} }
    function setLastSync(ts){ try{ const v = (ts instanceof Date) ? ts.getTime() : Number(ts)||Date.now(); localStorage.setItem('last_sync_time', String(v)); const el1 = document.getElementById('lastSyncTimePerson'); if(el1){ el1.textContent = `最后同步时间：${new Date(v).toLocaleString('zh-CN',{hour12:false})}`; } const el2 = document.getElementById('lastSyncTime'); if(el2){ el2.textContent = `最后同步时间：${new Date(v).toLocaleString('zh-CN',{hour12:false})}`; } }catch(e){} }
    document.addEventListener('DOMContentLoaded', initLastSyncPerson);

    // 将 API 返回的行格式（含 info 嵌套）标准化为页面使用的平铺格式，避免展示为 0
    function normalizeMemberRow(r){
      if(!r || typeof r !== 'object') return null;
      const info = r.info || {};
      const name = String(r.realName ?? r.姓名 ?? '').trim();
      if(!name) return null;
      const fans = Number(r.fansNum ?? r.粉丝数 ?? info.fansNum ?? info.粉丝数 ?? 0);
      const like = Number(r.likeNum ?? r.点赞数 ?? info.likeNum ?? info.点赞数 ?? 0);
      const collect = Number(r.collectNum ?? r.收藏数 ?? info.collectNum ?? info.收藏数 ?? 0);
      return {
        realName: name,
        姓名: name,
        fansNum: fans,
        粉丝数: fans,
        likeNum: like,
        点赞数: like,
        collectNum: collect,
        收藏数: collect,
        startedDateTime: r.startedDateTime ?? null
      };
    }

    // 从服务器恢复最新存档并合并到本地（多源拉取：同源 /api → api.rank → api.dailygh4 → 静态文件）
    async function restoreLatestFromServer(){
      const statusEl = document.getElementById('restoreStatus');
      function setStatus(type, msg){ if(statusEl) { statusEl.style.color = (type==='error') ? '#d93025' : (type==='success' ? '#137333' : 'var(--text-muted)'); statusEl.textContent = msg; } }
      const prevSelected = selectedDate;
      try{
        setStatus('info','正在拉取最新存档…');
        const clientId = location.hostname || 'default';
        const query = `client_id=${encodeURIComponent(clientId)}&raw=1`;
        const apiCandidates = [
          () => fetch(`/api/archives/latest?${query}`, { mode: 'cors', cache: 'no-store' }),
          () => fetch(`${API_BASE}/api/archives/latest?${query}`, { mode: 'cors', cache: 'no-store' }),
          () => fetch(`https://api.dailygh4.com/api/archives/latest?${query}`, { mode: 'cors', cache: 'no-store' })
        ];
        const staticCandidates = [
          'archives/latest_localhost.json',
          'archives/latest_rank.dailygh4.com.json',
          'archives/latest.json'
        ];
        let payload = null;
        let lastErr = null;
        for(const attempt of apiCandidates){
          try{
            const resp = await attempt();
            if(!resp.ok){ lastErr = new Error(await resp.text() || '拉取失败'); continue; }
            const data = await resp.json();
            const rawMap = data.memberRaw || {};
            const dataMap = data.memberData || {};
            const hasData = Object.keys(rawMap).length > 0 || Object.keys(dataMap).length > 0;
            if(hasData){ payload = data; lastErr = null; break; }
            lastErr = new Error('接口返回无有效数据');
          }catch(e){ lastErr = e; }
        }
        if(!payload && staticCandidates.length){
          for(const path of staticCandidates){
            try{
              const resp = await fetch(path, { cache: 'no-store' });
              if(!resp.ok) continue;
              const data = await resp.json();
              const rawMap = data.memberRaw || {};
              const dataMap = data.memberData || {};
              const hasData = Object.keys(rawMap).length > 0 || Object.keys(dataMap).length > 0;
              if(hasData){ payload = data; lastErr = null; break; }
            }catch(e){ }
          }
        }
        if(!payload){
          setStatus('error', lastErr && lastErr.message ? `拉取失败：${lastErr.message}` : '所有数据源均不可用，请稍后重试');
          return;
        }
        const rawMap = payload.memberRaw || {};
        const dataMap = payload.memberData || {};
        const unionDates = Array.from(new Set([ ...Object.keys(rawMap), ...Object.keys(dataMap) ])).sort();
        let updatedCount = 0, keptCount = 0;

        // 通过行数据提取指定日期的最大 startedDateTime
        function getMaxIsoFromRowsForDate(rows, date){
          try{
            if(!Array.isArray(rows) || !rows.length || !date) return null;
            let maxTs = -Infinity; let maxIso = null;
            for(const r of rows){
              const iso = r && r.startedDateTime ? String(r.startedDateTime) : null;
              if(!iso) continue;
              const dt = new Date(iso);
              const y = dt.getFullYear(); const m = String(dt.getMonth()+1).padStart(2,'0'); const d = String(dt.getDate()).padStart(2,'0');
              const dsLocal = `${y}-${m}-${d}`;
              if(dsLocal !== date) continue;
              const ts = Date.parse(iso);
              if(Number.isFinite(ts) && ts > maxTs){ maxTs = ts; maxIso = iso; }
            }
            return maxIso;
          }catch(e){ return null; }
        }
        // 从原始文本中检测指定日期的最大 startedDateTime（优先解析 HAR，失败时用正则兜底）
        function detectMaxTsForDateFromText(rawText, targetDate){
          if(!rawText || !rawText.trim() || !targetDate) return null;
          try{
            const obj = JSON.parse(rawText);
            const entries = obj?.log?.entries;
            if(Array.isArray(entries) && entries.length){
              let maxTs = -Infinity; let maxStr = null;
              for(const e of entries){
                const t = e?.startedDateTime || e?.request?.startedDateTime || e?.response?.startedDateTime;
                if(!t) continue;
                const dt = new Date(t);
                const y = dt.getFullYear(); const m = String(dt.getMonth()+1).padStart(2,'0'); const d = String(dt.getDate()).padStart(2,'0');
                const dsLocal = `${y}-${m}-${d}`;
                if(dsLocal !== targetDate) continue;
                const ts = Date.parse(String(t));
                if(Number.isFinite(ts) && ts > maxTs){ maxTs = ts; maxStr = String(t); }
              }
              if(maxStr) return maxStr;
            }
          }catch(e){}
          try{
            const re = new RegExp(`(\\d{4}-\\d{2}-\\d{2})[T\\s]([0-9:.-]+(?:Z|[+-][0-9:]+)?)`, 'g');
            const matches = String(rawText).matchAll(re);
            if(matches){
              let maxTs = -Infinity; let maxStr = null;
              for(const match of matches){
                const datePart = match[1];
                const timePart = match[2];
                const iso = `${datePart}T${timePart}`.replace(' ', 'T');
                const dt = new Date(iso);
                const y = dt.getFullYear(); const m = String(dt.getMonth()+1).padStart(2,'0'); const d = String(dt.getDate()).padStart(2,'0');
                const dsLocal = `${y}-${m}-${d}`;
                if(dsLocal !== targetDate) continue;
                const ts = Date.parse(iso);
                if(Number.isFinite(ts) && ts > maxTs){ maxTs = ts; maxStr = iso; }
              }
              if(maxStr) return maxStr;
            }
          }catch(e){}
          return null;
        }

        for(const d of unionDates){
          try{
            const srvRaw = rawMap[d] || '';
            const srvRowsRaw = Array.isArray(dataMap[d]) ? dataMap[d] : [];
            const srvRows = srvRowsRaw.map(normalizeMemberRow).filter(Boolean);
            const locRaw = localStorage.getItem(storageRawKey(d)) || '';
            const locRowsStr = localStorage.getItem(storageKey(d));
            const locRows = locRowsStr ? (function(){ try{ return JSON.parse(locRowsStr); }catch(e){ return []; } })() : [];

            const hasLocal = (!!locRaw && locRaw.trim()) || (Array.isArray(locRows) && locRows.length);
            const hasServer = (!!srvRaw && srvRaw.trim()) || (Array.isArray(srvRows) && srvRows.length);

            let srvMaxIso = srvRaw ? detectMaxTsForDateFromText(srvRaw, d) : null;
            if(!srvMaxIso && srvRows.length){ srvMaxIso = getMaxIsoFromRowsForDate(srvRows, d); }
            const srvMax = srvMaxIso ? Date.parse(srvMaxIso) : null;

            let locMaxIso = locRaw ? detectMaxTsForDateFromText(locRaw, d) : null;
            if(!locMaxIso && locRows.length){ locMaxIso = getMaxIsoFromRowsForDate(locRows, d); }
            const locMax = locMaxIso ? Date.parse(locMaxIso) : null;

            if(hasLocal && hasServer && locMax!=null && srvMax!=null){
              if(locMax >= srvMax){ keptCount++; continue; }
              try{ if(srvRaw && srvRaw.trim()) localStorage.setItem(storageRawKey(d), srvRaw); }catch(e){}
              try{ localStorage.setItem(storageKey(d), JSON.stringify(srvRows)); }catch(e){}
              updatedCount++; continue;
            }
            if(hasLocal && !hasServer){ keptCount++; continue; }
            if(!hasLocal && hasServer){
              try{ if(srvRaw && srvRaw.trim()) localStorage.setItem(storageRawKey(d), srvRaw); }catch(e){}
              try{ localStorage.setItem(storageKey(d), JSON.stringify(srvRows)); }catch(e){}
              updatedCount++; continue;
            }
            // 两边都没有有效数据，不做处理
          }catch(e){ /* 单个日期合并失败忽略 */ }
        }

    // 自动计算 Y 轴范围与步长
    function niceStep(rawSpan){
      const n = Math.max(1, Number(rawSpan) || 1);
      const pow = Math.pow(10, Math.floor(Math.log10(n)));
      const base = n / pow;
      let factor = 1;
      if(base <= 1) factor = 1; else if(base <= 2) factor = 2; else if(base <= 5) factor = 5; else factor = 10;
      return Math.max(1, Math.round(factor * pow));
    }
    function computeYAxisScale(datasets){
      try{
        const vals = [];
        for(const ds of (datasets || [])){
          const arr = Array.isArray(ds?.data) ? ds.data : [];
          for(const v of arr){ if(v != null && Number.isFinite(Number(v))) vals.push(Number(v)); }
        }
        if(!vals.length){ return { min: 0, max: 1, step: 1 }; }
        const mn = Math.min(...vals);
        const mx = Math.max(...vals);
        if(mn === mx){
          const pad = Math.max(1, Math.round(Math.abs(mx) * 0.1) || 1);
          const min = mn - pad;
          const max = mx + pad;
          const step = niceStep((max - min) / 6);
          return { min, max, step };
        }
        const range = mx - mn;
        const min = Math.floor(mn - range * 0.06);
        const max = Math.ceil(mx + range * 0.06);
        const step = niceStep(range / 6);
        return { min, max, step };
      }catch(e){ return { min: 0, max: 1, step: 1 }; }
    }

        console.warn(`[buildHourlyMapForDate] No memberRaw data for ${dateStr}, key: ${storageRawKey(dateStr)}`);
        return new Map();

      let obj = null;
      try{ obj = JSON.parse(raw); }
      catch(e){ const m = String(raw).match(/\{[\s\S]*\}/); if(m){ try{ obj = JSON.parse(m[0]); }catch(e2){ obj = null; } } }

      let labels = (mode === 'month') ? listDatesInMonth(selectedDate) : listDatesInWeek(selectedDate);
      if(!labels.length){ empty.style.display='block'; if(chart){ chart.destroy(); } return; }
      empty.style.display='none';
      // 主成员：按日填充数据，缺失为 null 以断线
      const mainMap = new Map((series || []).map(it => [String(it.date), { fans: it.fans, like: it.like, collect: it.collect }]));
      let dataFans = labels.map(d => (mainMap.get(d)?.fans ?? null));
      let dataLike = labels.map(d => (mainMap.get(d)?.like ?? null));
      let dataCollect = labels.map(d => (mainMap.get(d)?.collect ?? null));
      if(trendType === 'growth'){
        dataFans = toSequentialDeltaWithFirst(dataFans, labels, mainMap, 'fans');
        dataLike = toSequentialDeltaWithFirst(dataLike, labels, mainMap, 'like');
        dataCollect = toSequentialDeltaWithFirst(dataCollect, labels, mainMap, 'collect');
      }
      // 月视图：隐藏无数据日期，避免视觉留白（仅保留当前指标有值的日期）
      if(mode === 'month'){
        const mask = labels.map((_, i) => {
          const v = showFans ? dataFans[i] : (showLike ? dataLike[i] : dataCollect[i]);
          return v != null;
        });
        labels = labels.filter((_, i) => mask[i]);
        dataFans = dataFans.filter((_, i) => mask[i]);
        dataLike = dataLike.filter((_, i) => mask[i]);
        dataCollect = dataCollect.filter((_, i) => mask[i]);
        if(!labels.length){ empty.style.display='block'; if(chart){ chart.destroy(); } return; }
      }
      const mainColor = colorOf(currentName || '');
      const baseDatasets = [];
      if(showFans){ baseDatasets.push({ label: currentName, data: dataFans, borderColor: mainColor, backgroundColor: colorWithAlpha(mainColor, 0.08), tension: 0.5, cubicInterpolationMode: 'monotone', borderWidth: 1.5, spanGaps: false }); }
      if(showLike){ baseDatasets.push({ label: currentName, data: dataLike, borderColor: mainColor, backgroundColor: colorWithAlpha(mainColor, 0.07), tension: 0.5, cubicInterpolationMode: 'monotone', borderWidth: 1.5, spanGaps: false }); }

      // 追加“更多成员”对比粉丝趋势（仅在勾选粉丝数时）
      if(compareMap && compareMap.size && showFans){

          let cmpFans = labels.map(d => (cmpMap.get(d) ?? null));

          const cmpColor = colorOf(nm);

        }
      }
      // 追加“更多成员”对比点赞趋势（在勾选点赞数时）
      if(compareMap && compareMap.size && showLike){
        for(const [nm, ser] of compareMap.entries()){
          const cmpMap = new Map((ser || []).map(it => [String(it.date), Number(it.like)]));
          let cmpLike = labels.map(d => (cmpMap.get(d) ?? null));
          if(trendType === 'growth'){ cmpLike = toSequentialDeltaWithFirstForValueMap(cmpLike, labels, cmpMap); }
          const cmpColor = colorOf(nm);
          baseDatasets.push({ label: nm, data: cmpLike, borderColor: cmpColor, backgroundColor: colorWithAlpha(cmpColor, 0.04), tension: 0.5, cubicInterpolationMode: 'monotone', borderWidth: 1.5, spanGaps: false });
        }
      }
      // 追加“更多成员”对比收藏趋势（在勾选收藏数时）
      if(compareMap && compareMap.size && showCollect){
        for(const [nm, ser] of compareMap.entries()){
          const cmpMap = new Map((ser || []).map(it => [String(it.date), Number(it.collect)]));
          let cmpCollect = labels.map(d => (cmpMap.get(d) ?? null));
          if(trendType === 'growth'){ cmpCollect = toSequentialDeltaWithFirstForValueMap(cmpCollect, labels, cmpMap); }
          const cmpColor = colorOf(nm);

        }

      const cfg = {
        type: 'line',
        data: {
          labels,
          datasets: baseDatasets
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          elements: { point: { radius: 0, hitRadius: 0, hoverRadius: 0 } },
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              enabled: true,
              itemSort: function(a, b){
                const ay = (a.parsed && a.parsed.y != null) ? a.parsed.y : a.raw;
                const by = (b.parsed && b.parsed.y != null) ? b.parsed.y : b.raw;
                const an = Number(ay);
                const bn = Number(by);
                const av = Number.isFinite(an) ? an : -Infinity;
                const bv = Number.isFinite(bn) ? bn : -Infinity;
                return bv - av; // 降序排列
              },
              callbacks: {
                label: function(ctx) {
                  const y = (ctx.parsed && ctx.parsed.y != null) ? ctx.parsed.y : ctx.raw;
                  if (y == null) return;
                  const num = Number(y);
                  const val = Number.isFinite(num) ? num.toLocaleString('zh-CN') : String(y);
                  return ctx.dataset.label + ': ' + val;

                  const s = String(lab ?? value);

            })()
          }
        }
      };

    function listAllMemberNames(){
      const set = new Set();
      const dates = listStoredDates();
      for(const d of dates){
        const rows = getStoredRowsForDate(d) || [];
        for(const r of rows){
          const rn = String(r.realName || r.姓名 || '').trim();
          if(rn) set.add(rn);
        }
      }
      return Array.from(set).sort();
    }

    function buildSeriesForName(targetName){
      const dates = listStoredDates();
      const series = [];
      for(const d of dates){
        const rows = getStoredRowsForDate(d) || [];
        const found = rows.find(r => String(r.realName || r.姓名 || '').trim() === targetName);
        if(!found) continue;
        const fans = Number(found.fansNum != null ? found.fansNum : (found.粉丝数 != null ? found.粉丝数 : 0));
        const like = Number(found.likeNum != null ? found.likeNum : (found.点赞数 != null ? found.点赞数 : 0));
        const collect = Number(found.collectNum != null ? found.collectNum : (found.收藏数 != null ? found.收藏数 : 0));
        series.push({ date: d, fans, like, collect });
      }
      series.sort((a,b)=> new Date(a.date) - new Date(b.date));
      return series;
    }

    function buildCompareMap(mode){
      const names = Array.from(compareNames);
      const map = new Map();
      for(const n of names){
        const raw = buildSeriesForName(n); // 返回按日的原始序列
        map.set(n, raw);
      }
      return map;
    }

    function init(){
      const params = new URLSearchParams(location.search);
      const name = decodeURIComponent(params.get('name') || '').trim();
      const domName = document.getElementById('profileName');
      const domNick = document.getElementById('profileNick');
      const domBirth = document.getElementById('profileBirth');
      const domAge = document.getElementById('profileAge');
      const domZodiac = document.getElementById('profileZodiac');
      const domUserId = document.getElementById('profileUserId');
      const domAvatar = document.getElementById('profileAvatar');
      const domFans = document.getElementById('statFans');
      const domLike = document.getElementById('statLike');
      const domCollect = document.getElementById('statCollect');
      if(!name){
        domName.textContent = '—';
        // 不提前返回，让默认 TOP7 逻辑继续执行
      } else {
        domName.textContent = name;
        currentName = name;
      }

      const dates = listStoredDates();
      const seriesRaw = [];
      let avatarUrl = '';
      let birthTs = null;
      let nick = '';
      let userId = null;
      for(const d of dates){
        const rows = getStoredRowsForDate(d) || [];
        let found = null;
        for(const r of rows){
          const rn = r.realName || r.姓名 || '';
          if(String(rn).trim() === name){ found = r; break; }
        }
        if(!found) continue;
        const fans = Number(found.fansNum != null ? found.fansNum : found.粉丝数 || 0);
        const like = Number(found.likeNum != null ? found.likeNum : found.点赞数 || 0);
        const collect = Number(found.collectNum != null ? found.collectNum : found.收藏数 || 0);
        seriesRaw.push({ date: d, fans, like, collect });
        if(!avatarUrl) avatarUrl = found.avatarUrl || found.headPortrait || '';
        if(birthTs == null && found.birthTs != null && Number.isFinite(Number(found.birthTs))) birthTs = Number(found.birthTs);
        if(!nick) nick = found.nickName || nicknameFallbacks[found.realName] || nicknameFallbacks[name] || '';
        if(userId == null && (found.userId != null)) userId = found.userId;
      }

      // 源数据缺失时：使用出生日期回退映射
      if(birthTs == null && birthFallbacks[name]){
        const parsed = Date.parse(birthFallbacks[name]);
        if(Number.isFinite(parsed)) birthTs = parsed;
      }

      // 资料展示（优先源数据，其次回退映射）
      const displayNick = nick || nicknameFallbacks[name] || '';
      // 按需展示昵称，仅显示值，去掉“昵称：”前缀；缺失时不回退到姓名
      domNick.textContent = displayNick || '';
      domBirth.textContent = fmtBirth(birthTs);
      domUserId.textContent = (userId != null) ? String(userId) : (userIdFallbacks[name] != null ? String(userIdFallbacks[name]) : '—');
      domAvatar.src = avatarUrl || 'https://cdn.jsdelivr.net/gh/placeholder-logos/placeholder-user@main/avatar.png';

      // 最新统计
      const latest = seriesRaw.length ? seriesRaw[seriesRaw.length-1] : { fans:'—', like:'—', collect:'—' };
      const latestDateStr = seriesRaw.length ? seriesRaw[seriesRaw.length-1].date : null;
      const refDate = latestDateStr ? new Date(latestDateStr) : new Date();
      domFans.textContent = (latest.fans ?? '—');
      domLike.textContent = (latest.like ?? '—');
      domCollect.textContent = (latest.collect ?? '—');
      domAge.textContent = fmtAge(birthTs, refDate);
      domZodiac.textContent = fmtZodiac(birthTs);

      // 默认：天颗粒度
      allDates = listStoredDates();
      selectedDate = allDates.length ? allDates[allDates.length-1] : null;
      mode = 'day';
      renderChartUnified(seriesRaw, buildCompareMap(mode));

      // 勾选事件：按需显示粉丝/点赞/收藏
      const chkFans = document.getElementById('toggleFans');
      const chkLike = document.getElementById('toggleLike');
      const chkCollect = document.getElementById('toggleCollect');
      if(chkFans){
        chkFans.checked = true;
        chkFans.addEventListener('change', () => {
          if(!chkFans.checked) return;
          showFans = true; showLike = false; showCollect = false;
          restoreLatestFromServer().then(()=>refreshFromLocal()).catch(()=>{});
        });
      }
      if(chkLike){
        chkLike.checked = false;
        chkLike.addEventListener('change', () => {
          if(!chkLike.checked) return;
          showFans = false; showLike = true; showCollect = false;
          restoreLatestFromServer().then(()=>refreshFromLocal()).catch(()=>{});
        });
      }
      if(chkCollect){
        chkCollect.checked = false;
        chkCollect.addEventListener('change', () => {
          if(!chkCollect.checked) return;
          showFans = false; showLike = false; showCollect = true;
          restoreLatestFromServer().then(()=>refreshFromLocal()).catch(()=>{});
        });
      }
      const restoreBtn = document.getElementById('restoreLatestBtn');
      restoreBtn?.addEventListener('click', restoreLatestFromServer);
      const localBtn = document.getElementById('localRefreshBtn');
      localBtn?.addEventListener('click', refreshFromLocal);
      if(localBtn){
        let forceBtn = document.getElementById('localForceRefreshBtn');
        if(!forceBtn){
          forceBtn = document.createElement('button');
          forceBtn.id = 'localForceRefreshBtn';
          forceBtn.className = 'btn-light';
          forceBtn.title = '强制从本地原始存档补齐并覆盖当日';
          forceBtn.textContent = '强制补齐当日';
          forceBtn.style.marginLeft = '8px';
          localBtn.insertAdjacentElement('afterend', forceBtn);
        }
        forceBtn.addEventListener('click', ()=>{
          const d = selectedDate || (function(){ const ds = listStoredDates(); return ds.length ? ds[ds.length-1] : null; })();
          restoreLatestFromServer().then(()=>refreshFromLocal({ force: true, dates: d ? [d] : null })).catch(()=>{});
        });
      }

      // 更多成员筛选渲染与事件绑定
      const moreContainer = document.getElementById('moreMembers');
      let allCandidates = [];

      // 取某成员的出生时间戳（优先源数据，其次回退映射），不存在返回 -Infinity
      function birthTsForName(n){
        try{
          const name = String(n||'').trim();
          if(!name) return -Infinity;
          const dates = listStoredDates();
          for(const d of dates){
            const rows = getStoredRowsForDate(d) || [];
            for(const r of rows){
              const rn = String(r.realName || r.姓名 || '').trim();
              if(rn === name){
                const ts = (r.birthTs != null && Number.isFinite(Number(r.birthTs))) ? Number(r.birthTs) : null;
                if(ts != null) return ts;
              }
            }
          }
          const fb = birthFallbacks[name];
          if(fb){ const parsed = Date.parse(fb); if(Number.isFinite(parsed)) return parsed; }
          return -Infinity;
        }catch(e){ return -Infinity; }
      }

      function renderMoreMembers(){
        const main = String(currentName || '').trim();
        let list = (allCandidates || [])
          .filter(n => String(n || '').trim())
          .filter(n => { // 仅显示有历史记录的成员
            try{
              const s = buildSeriesForName(n) || [];
              return Array.isArray(s) && s.length > 0;
            }catch(e){ return false; }
          });
        // 按出生年月日时间由小到大（最年长在前）；未知出生排最后
        list = list.sort((a,b) => {
          const va = birthTsForName(a);
          const vb = birthTsForName(b);
          if(va === -Infinity && vb === -Infinity) return 0;
