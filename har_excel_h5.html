  <style>
    body { font-family: Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f6f7fb; margin:0; }
    .container { max-width: 1080px; margin: 0 auto; background:#fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); padding: 50px 12px 36px; position: relative; }
    h1 { font-size: 28px; margin: 0; color:#111; letter-spacing: 0.3px; line-height: 1.25; position: relative; }
    .desc { color:#616a76; font-size: 14px; margin-top: 6px; margin-bottom: 0; line-height: 1.8; }
    .container::before { content:""; position:absolute; top:0; left:0; right:0; height: 18px; border-top-left-radius:12px; border-top-right-radius:12px; background: linear-gradient(90deg, #8e73ff, #c3a8ff, #6f8af8); }
    /* Page header cosmetics */
    .page-header { display:flex; align-items:center; gap:14px; padding: 0 0 14px; border-bottom: 1px solid #eef2f7; margin-bottom: 16px; }
    .header-icon { width:44px; height:44px; border-radius:10px; background: linear-gradient(135deg, #7c4dff, #4c6ef5); box-shadow: 0 8px 20px rgba(76,110,245,0.25); display:flex; align-items:center; justify-content:center; color:#fff; }
    .header-icon svg { width:22px; height:22px; }
    .title-wrap { flex:1; }
    .title-wrap h1::after { content:""; position:absolute; left:0; bottom:-8px; width:72px; height:3px; border-radius:2px; background: linear-gradient(90deg, #8e73ff, #c3a8ff, #6f8af8); opacity:0.82; }
    /* 隐藏标题下的说明文本 */
    .title-wrap .desc { display: none; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background:#fafafa; border:1px solid #eee; border-radius:10px; padding:12px; }
    label { display:block; font-size: 13px; color:#333; margin-bottom:6px; }
    input[type=date] { width: 100%; box-sizing: border-box; padding:8px 10px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
    textarea { width: 100%; min-height: 180px; box-sizing: border-box; padding:10px; border:1px solid #ddd; border-radius:10px; font-size:13px; resize: vertical; }
    /* 表格样式与美化 */
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #b28cff; color: #333; font-weight: 600; white-space: nowrap; }
    th, td { padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 13px; line-height: 1.35; border-right: 1px solid #e0e0e0; text-align: center; white-space: nowrap; }
    thead th:last-child, tbody td:last-child { border-right: none; }
    /* 偶数行浅灰底色（以行序号/排名为准） */
    .zebra-even td { background-color: #efefef; }
    /* 增长用红色，下降用绿色 */
    .num-pos { color: #c62828; font-weight: 600; }
    .num-neg { color: #2e7d32; font-weight: 600; }
    .range-bar { text-align:center; color:#555; font-size:13px; margin:12px 0; display:block; width:100%; }
    #preview .range-bar { text-align: center !important; }
    /* 导出 PNG 时：日期区间整体居中，上下留白间距一致 */
    #preview.export-png .range-bar { margin: 12px 0 !important; text-align: center !important; }
    /* 统一保留的样式，去除重复的 table/th,td 定义 */
    .actions { display:flex; gap:10px; margin-top: 12px; flex-wrap: wrap; }
    button { padding: 8px 14px; border: none; border-radius: 8px; font-weight: 600; cursor:pointer; }
    .btn-primary { background: #4c6ef5; color:#fff; }
    .btn-secondary { background:#20c997; color:#fff; }
    .btn-light { background:#f1f3f5; color:#333; }
    .msg { display:none; margin-top: 10px; padding:8px 10px; border-radius:8px; font-size:13px; }
    .msg.error { background:#fff5f5; color:#c92a2a; border:1px solid #ffe3e3; }
    .msg.success { background:#f4fce3; color:#2b8a3e; border:1px solid #e9fac8; }
    .muted { color:#868e96; font-size:12px; }
    .icon { width: 16px; height: 16px; margin-right: 4px; vertical-align: -1px; font-size: 16px; }

    /* 手机端统一：左右12px、底部36px、顶部50px */
    @media (max-width: 640px){
      .container { padding: 50px 12px 36px; }
    }
    .flame-icon { display: inline-block; margin-left: 4px; font-size: 14px; line-height: 1; vertical-align: middle; }
    /* 涨幅单元格：文本居中，火焰固定在最左侧，不遮挡文字 */
    .growth-cell {
      position: relative;
      display: block;
      width: 100%;
      text-align: center;
      /* 预留左右内边距，保证居中视觉不偏移，同时避免文本与火焰重叠
         使用 max() 适配移动端 emoji 真实宽度 */
      padding-left: max(18px, 1.6em);
      padding-right: 18px;
      box-sizing: border-box;
    }
    .growth-cell .flame-left {
      position: absolute;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      /* 覆盖通用火焰样式中的左外边距，确保贴近列最左侧 */
      margin-left: 0;
    }
    .flame-icon { font-size: 14px; line-height: 1; }
    /* 导出 PNG 时进一步扩大左侧预留，避免手机端遮挡 */
    #preview.export-png .growth-cell { padding-left: max(26px, 2em) !important; }
    #preview.export-png .growth-cell .flame-left { left: 4px; }
    /* 导出 PNG 时文本居中、内容完整：预览区域不裁剪且所有单元格居中 */
    #preview { overflow: visible; }
    #preview table th, #preview table td { text-align: center !important; }
    /* PNG 导出同步说明留白：下方间距加长 */
    #preview.export-png .preview-notes { margin: 12px 0 18px !important; }
    /* 头像网格：两排共14个，7列布局 */
    .avatar-grid { margin-top: 22px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .avatar-item { position: relative; aspect-ratio: 1 / 1; border-radius: 10px; overflow: hidden; background: linear-gradient(135deg, #7c4dff, #b28cff, #4c6ef5); padding: 1px; display: block; text-decoration: none; color: inherit; cursor: pointer; }
    .avatar-item img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 9px; background-color: #fff; }
    .avatar-name { position: absolute; left: 50%; bottom: 3px; transform: translateX(-50%); padding: 2px 6px; font-size: 12px; line-height: 1.4; color: #fff; background: rgba(0,0,0,0.38); border-radius: 6px; white-space: nowrap; }
    /* 手机端同步样式：日期区间与说明留白在小屏一致 */
    @media (max-width: 640px){
      .range-bar { margin: 12px 0 !important; text-align: center !important; }
      #preview.export-png .range-bar { margin-top: 24px !important; margin-bottom: 12px !important; }
      .preview-notes { margin: 12px 0 18px !important; }
      #preview.export-png .preview-notes { margin-bottom: 32px !important; }
      /* 手机端额外加大左边距，保证 emoji 不压到文本 */
      .growth-cell { padding-left: max(22px, 1.8em); padding-right: 16px; }
      #preview.export-png .growth-cell { padding-left: max(28px, 2.2em) !important; }
      #preview.export-png .growth-cell .flame-left { left: 4px; }
      /* 手机端头像姓名：缩小字号，不换行显示并做超长省略 */
      .avatar-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 12px); }
    }
    /* 页脚 LOGO：居中显示，移动端与桌面端自适应宽度 */
    .footer-logo { margin-top: 16px; margin-bottom: 8px; text-align: center; }
    .footer-logo img { display: block; margin: 0 auto; width: min(420px, 86vw); height: auto; max-width: 100%; }
    .footer-logo .logo-fallback { display: none; font-size: 13px; color: #444; opacity: 0.75; }
    @media (max-width: 640px){
      .footer-logo img { width: min(360px, 86vw); }
    }
  </style>

<body>
  <div class="container">
    <div class="page-header">
      <div class="title-wrap">
        <h1>🎀 高会排行榜</h1>
        <div class="desc">粘贴当日与前一日的代码文本，系统将解析出 姓名/收藏/点赞/粉丝 数据，按粉丝数降序排序，并生成表头为中文的Excel，同时新增“排序变化”、“距上一名”和“涨幅”三列（涨幅为与指定日期粉丝数的差值）。</div>
        <div id="avatarGrid" class="avatar-grid" aria-label="成员头像展示"></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <label>当日日期</label>
        <input type="date" id="todayDate" />
        <label style="margin-top:8px;">快速选择已有日期（当日）</label>
        <select id="todayDateSelect"><option value="">— 选择存档日期 —</option></select>
        <button class="btn-light" onclick="clearDateStorageByDate('today')" style="margin-left:8px;">清空该日期存档</button>
        <label style="margin-top:8px;">当日代码文本</label>
        <div class="muted" style="margin:4px 0 6px; font-size:12px;">识别到最晚 startedDateTime：<span id="todayMaxTs" style="display:block; margin-top:2px; font-weight:600; color:#333;">—</span></div>
        <textarea id="todayText" placeholder="粘贴当日抓取到的HAR或接口JSON……"></textarea>
        <div class="actions" style="margin-top:8px;">
          <button class="btn-light" onclick="selectAllText('todayText')">全选当日代码</button>
        </div>
      </div>
      <div class="card">
        <label>昨日日期</label>
        <input type="date" id="yesterdayDate" />
        <label style="margin-top:8px;">快速选择已有日期（昨日）</label>
        <select id="yesterdayDateSelect"><option value="">— 选择存档日期 —</option></select>
        <button class="btn-light" onclick="clearDateStorageByDate('yesterday')" style="margin-left:8px;">清空昨日日期存档</button>
        <label style="margin-top:8px;">昨日代码文本</label>
        <div class="muted" style="margin:4px 0 6px; font-size:12px;">识别到最晚 startedDateTime：<span id="yesterdayMaxTs" style="display:block; margin-top:2px; font-weight:600; color:#333;">—</span></div>
        <textarea id="yesterdayText" placeholder="若本地没有存档，可粘贴昨日的HAR或JSON用于对比……"></textarea>
        <div class="actions" style="margin-top:8px;">
          <button class="btn-light" onclick="selectAllText('yesterdayText')">全选昨日代码</button>
        </div>
      </div>
      </div>
      <!-- 已按你的要求删除“昨日”输入卡片（日期/下拉/文本/全选按钮/说明），逻辑仍默认使用当日-1作为对比日期 -->

    <div class="actions">
      <button class="btn-primary" onclick="parseAndPreview()">解析并预览</button>
      <button class="btn-primary" onclick="clearLocalArchives()" title="清除所有以 memberRaw:/memberData: 为前缀的本地缓存">清空本地存档</button>
      <button class="btn-secondary" onclick="exportExcel()">导出Excel</button>
      <button class="btn-secondary" onclick="exportImage()">导出图片</button>
      <button class="btn-light" onclick="saveTodayToLocal()">保存今日数据到本地</button>
    </div>
    <div class="actions" style="align-items:center;">
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleCollect" /> 显示收藏数
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleLike" /> 显示点赞数
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleFans" checked /> 显示粉丝数
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleWeekGrowth" /> 显示本周涨幅
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleMonthGrowth" /> 显示本月涨幅
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="followTextDate" /> 跟随文本日期
      </label>
    </div>


    <div id="msgError" class="msg error"></div>
    <div id="msgSuccess" class="msg success"></div>
    <div id="msgInfo" class="msg info"></div>

    <div id="preview" style="margin-top: 12px;"></div>
    
    <!-- 页面底部的存档操作区 -->
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;"/>
    <div class="actions" style="margin-top:0; gap:8px;">
      <button class="btn-light" onclick="exportLocalBackup()">导出本地存档</button>
      <button class="btn-light" onclick="triggerImport()">导入本地存档</button>
      <button class="btn-light" onclick="uploadLocalBackup()">上传到服务器</button>
      <span id="uploadStatus" class="inline-msg" aria-live="polite"></span>
      <button class="btn-light" onclick="pullLatestBackup()">拉取服务器最新</button>
      <span id="pullStatus" class="inline-msg" aria-live="polite"></span>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
    </div>

    <!-- 页脚LOGO（图片加载失败时显示回退文本） -->
    <div class="footer-logo" role="contentinfo" aria-label="站点Logo">
      <img src="assets/tf-family-logo-dark.png" alt="TF FAMILY LOGO" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';" />
      <div class="logo-fallback" aria-hidden="true">TF FAMILY · TF家族</div>
    </div>
  </div>

<script>
// 轻提示样式
try{
  const style = document.createElement('style');
  style.textContent = `.msg.info { background:#e7f5ff; color:#0b7285; border:1px solid #d0ebff; } .inline-msg{font-size:12px;margin-left:6px;color:#666;opacity:0;transition:opacity .2s;} .inline-msg.show{opacity:1;} .inline-msg.success{color:#207044;} .inline-msg.error{color:#b00020;} .inline-msg.info{color:#245a9b;}`;
  document.head.appendChild(style);
}catch(e){}
function showError(msg){ const el = document.getElementById('msgError'); el.textContent = msg; el.style.display='block'; setTimeout(()=>el.style.display='none', 4000); }
function showSuccess(msg){ const el = document.getElementById('msgSuccess'); el.textContent = msg; el.style.display='block'; setTimeout(()=>el.style.display='none', 2500); }
function showInfo(msg){ const el = document.getElementById('msgInfo'); el.textContent = msg; el.style.display='block'; setTimeout(()=>el.style.display='none', 2000); }

// 内联提示：显示在指定元素旁
function showInlineStatus(targetId, type, text, ms=2200){
  try{
    const el = document.getElementById(targetId);
    if(!el) return;
    el.textContent = text || '';
    el.classList.remove('success','error','info','show');
    if(type) el.classList.add(type);
    void el.offsetWidth; // force reflow
    el.classList.add('show');
    clearTimeout(el._hideT);
    el._hideT = setTimeout(()=>{ el.classList.remove('show'); }, ms);
  }catch(e){}
}

function ensureNonDuplicateDates(){
  try{
    const tdEl = document.getElementById('todayDate');
    const ydEl = document.getElementById('yesterdayDate');
    const td = tdEl?.value || '';
    const yd = ydEl?.value || '';
    if(td && yd && td === yd){
      const prev = getPrevDateStr(td);
      if(ydEl){ ydEl.value = prev; }
      fillRawTextForDate(prev, 'yesterdayText');
      if(typeof showInfo === 'function') showInfo(`已切换至 ${td}，昨日自动修正为 ${prev}`);
      return true;
    }
  }catch(e){}
  return false;
}

function selectAllText(id){
  const el = document.getElementById(id);
  if(!el){ showError('未找到文本框'); return; }
  el.focus();
  el.select();
  showSuccess('已全选：可按 ⌘/Ctrl+C 复制');
}

function getPrevDateStr(dateStr){ const d = new Date(dateStr); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; }
function getNextDateStr(dateStr){ const d = new Date(dateStr); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; }
function storageKey(dateStr){ return `memberData:${dateStr}`; }
function storageRawKey(dateStr){ return `memberRaw:${dateStr}`; }
// 昵称回退映射：用于当源数据缺失 nickName 时的显示与持久化
const nicknameFallbacks = Object.freeze({
  '官俊臣': '害羞游泳圈'
});
// 用户ID回退映射：当源数据缺失 userId 时用于持久化与展示
const userIdFallbacks = Object.freeze({
  '官俊臣': 16823098
});
// 出生日期回退映射：用于源数据缺失时的显示与持久化（ISO，UTC）
const birthFallbacks = Object.freeze({
  '官俊臣': '2007-07-04T00:00:00Z',
  '汪浚熙': '2008-09-11T00:00:00Z',
  '王浩':   '2008-11-05T00:00:00Z',
  '张桂源': '2009-05-11T00:00:00Z',
  '张函瑞': '2009-10-18T00:00:00Z',
  '王橹杰': '2010-01-08T00:00:00Z',
  '李嘉森': '2010-01-19T00:00:00Z',
  '王烁然': '2010-03-15T00:00:00Z',
  '左奇函': '2010-03-19T00:00:00Z',
  '陈奕恒': '2010-05-09T00:00:00Z',
  '杨博文': '2010-06-01T00:00:00Z',
  '杨涵博': '2010-06-08T00:00:00Z',
  '张奕然': '2010-09-15T00:00:00Z',
  '聂玮辰': '2011-02-18T00:00:00Z',
  '陈思罕': '2011-11-08T00:00:00Z',
  '魏子宸': '2011-12-19T00:00:00Z',
  '李煜东': '2012-03-15T00:00:00Z',
  '陈浚铭': '2012-05-17T00:00:00Z'
});
function clearLocalArchives(){
  try{
    if(!confirm('确认清空本地存档文本？该操作不可恢复。')) return;
    const toRemove = [];
    for(let i=0;i<localStorage.length;i++){
      const key = localStorage.key(i);
      if(key && (key.startsWith('memberRaw:') || key.startsWith('memberData:'))){
        toRemove.push(key);
      }
    }
    toRemove.forEach(k=>localStorage.removeItem(k));
    if(typeof refreshDateOptions === 'function') refreshDateOptions();
    if(typeof showSuccess === 'function') showSuccess(`已清空本地存档文本，共移除 ${toRemove.length} 项`);
  }catch(e){ if(typeof showError === 'function') showError(`清空失败：${e.message || e}`); }
}
function clearDateStorageByDate(which){
  try{
    const id = which === 'yesterday' ? 'yesterdayDate' : 'todayDate';
    const d = document.getElementById(id)?.value || '';
    if(!d){ showError('请先选择日期'); return; }
    if(!confirm(`确认清空 ${d} 的存档（原始文本与解析数据）？`)) return;
    localStorage.removeItem(storageRawKey(d));
    localStorage.removeItem(storageKey(d));
    // 清空对应文本框
    const targetId = which === 'yesterday' ? 'yesterdayText' : 'todayText';
    const el = document.getElementById(targetId); if(el) el.value = '';
    refreshDateOptions();
    showSuccess(`已清空 ${d} 的本地存档`);
  }catch(e){ showError('清空失败'); }
}
function fillRawTextForDate(dateStr, targetId){
  try{
    const raw = dateStr ? localStorage.getItem(storageRawKey(dateStr)) : null;
    const el = document.getElementById(targetId);
    if(!el) return;
    if(raw){
      el.value = raw;
      if(typeof showSuccess === 'function') showSuccess(`已填充 ${dateStr} 的原始文本`);
    } else {
      el.value = '';
      if(typeof showError === 'function') showError('无本地文档');
    }
  }catch(e){}
}
function extractDateFromJsonObj(obj){
  try{
    // HAR: 优先取 entries 中“数值最大”的 startedDateTime 对应的日期；若不可解析则回退到“出现次数最多的日期”
    const entries = obj?.log?.entries;
    if(Array.isArray(entries) && entries.length){
      // 1) 先找最大 startedDateTime
      let maxTs = -Infinity;
      let maxDate = null;
      for(const e of entries){
        const t = e?.startedDateTime || e?.request?.startedDateTime || e?.response?.startedDateTime;
        if(!t) continue;
        const ts = Date.parse(String(t));
        const ds = String(t).split('T')[0];
        if(!Number.isFinite(ts) || !/\d{4}-\d{2}-\d{2}/.test(ds)) continue;
        if(ts > maxTs){ maxTs = ts; maxDate = ds; }
      }
      if(maxDate) return maxDate;
      // 2) 回退：按日期出现次数最多
      const counts = {};
      for(const e of entries){
        const t = e?.startedDateTime || e?.request?.startedDateTime || e?.response?.startedDateTime;
        if(!t) continue;
        const ds = String(t).split('T')[0];
        if(/\d{4}-\d{2}-\d{2}/.test(ds)){ counts[ds] = (counts[ds]||0)+1; }
      }
      const best = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
      if(best) return best;
    }
    // 常见 payload: 尝试 obj.date / obj.data.date / obj.info.date / obj.data.info.date
    const candidates = [];
    const maybeDates = [obj?.date, obj?.data?.date, obj?.info?.date, obj?.data?.info?.date];
    for(const v of maybeDates){ if(typeof v === 'string'){ const m = v.match(/\d{4}-\d{2}-\d{2}/); if(m){ candidates.push(m[0]); } } }
    if(candidates.length) return candidates[0];

// 将 ISO 时间字符串格式化为 "YYYY-MM-DD HH:mm:ss"（不做时区换算，仅截取主体部分）
function formatDateTimeForDisplay(tsStr){
  if(!tsStr) return null;
  let s = String(tsStr).replace('T',' ');
  const idxZ = s.indexOf('Z');
  const idxPlus = s.lastIndexOf('+');
  const idxMinus = s.lastIndexOf('-');
  let cutIndex = -1;
  if(idxZ >= 0) cutIndex = idxZ; else if(idxPlus > 10) cutIndex = idxPlus; else if(idxMinus > 10) cutIndex = idxMinus;
  if(cutIndex > 0) s = s.slice(0, cutIndex);
  if(s.includes('.')) s = s.split('.')[0];
  // 仅保留到分钟（YYYY-MM-DD HH:mm）
  const parts = s.split(' ');
  if(parts.length === 2){
    const hhmm = parts[1].split(':').slice(0,2).join(':');
    return `${parts[0]} ${hhmm}`;
  }
  // 回退：截取到前16位（YYYY-MM-DD HH:mm）
  return s.slice(0,16);
}

// 根据 HAR entries.startedDateTime 校验存档日期（优先使用 entries 最大 startedDateTime 对应日期，无法解析时回退到“出现次数最多的日期”）
function validateDateAgainstStartedDateTime(chosenDate, rawText, options){
  const opts = options || {};
  const follow = document.getElementById('followTextDate')?.checked;
  if(!rawText || !rawText.trim()) return { date: chosenDate, changed: false, reason: '' };
  const strategy = opts.strategy || 'max';
  if(strategy === 'latest_for_day'){
    // 仅用于当日校准：不跨天，若文本最大日期不等于所选日期，则保留所选日期
    const latest = detectLatestDateFromText(rawText);
    if(!latest) return { date: chosenDate, changed: false, reason: 'no_detected' };
    if(chosenDate && latest !== chosenDate){
      return { date: chosenDate, changed: false, reason: 'keep_today' };
    }
    return { date: chosenDate || latest, changed: !chosenDate, reason: chosenDate ? '' : 'empty_chosen' };
  }
  const detected = strategy === 'earliest' ? detectEarliestDateFromText(rawText)
                   : strategy === 'latest' ? detectLatestDateFromText(rawText)
                   : detectDateFromText(rawText);
  if(!detected) return { date: chosenDate, changed: false, reason: 'no_detected' };
  if(!chosenDate){
    return { date: detected, changed: true, reason: 'empty_chosen' };
  }
  if(chosenDate !== detected){
    if(follow || opts.enforce){
      return { date: detected, changed: true, reason: 'mismatch_follow' };
    } else {
      showError(`所选日期(${chosenDate})与文本中的 startedDateTime(${detected})不一致，请确认或开启“跟随文本日期”`);
      return { date: chosenDate, changed: false, reason: 'mismatch' };
    }
  }
  return { date: chosenDate, changed: false, reason: '' };
}

// 新增：出生时间解析工具函数（兼容常见字段与嵌套）
function parseBirthTs(val){
  if(val == null) return null;
  if(typeof val === 'number'){
    const n = Number(val);
    if(!Number.isFinite(n)) return null;
    const ts = n > 1e10 ? n : n * 1000; // 兼容秒/毫秒
    return Number.isFinite(ts) ? ts : null;
  }
  const s = String(val);
  const m = s.match(/\b(\d{4})[-\/.](\d{2})[-\/.](\d{2})\b/);
  if(m){
    const iso = `${m[1]}-${m[2]}-${m[3]}T00:00:00Z`;
    const ts = Date.parse(iso);
    return Number.isFinite(ts) ? ts : null;
  }
  return null;
}
function findFirstBirthValDeep(obj){
  const keys = ['birthday','birthDay','birth_date','dateOfBirth','birth','出生时间','出生日期','birthdayDesc'];
  try{
    const stack = [obj];
    while(stack.length){
      const cur = stack.pop();
      if(cur && typeof cur === 'object'){
        for(const [k,v] of Object.entries(cur)){
          const kl = String(k).toLowerCase();
          if(keys.some(x => kl === String(x).toLowerCase())){
            return v;
          }
          if(v && typeof v === 'object') stack.push(v);
        }
      }
    }
  }catch(e){}
  return null;
}
function extractBirthTsFromPayload(payload){
  const d = payload?.data || {};
  const i = d?.info || payload?.info || {};
  const candidates = [
    d.birthday, d.birthDay, d.birth_date, d.dateOfBirth, d.birth, d['出生时间'], d['出生日期'], d.birthdayDesc,
    i.birthday, i.birthDay, i.birth_date, i.dateOfBirth, i.birth, i['出生时间'], i['出生日期'], i.birthdayDesc
  ];
  for(const v of candidates){
    const ts = parseBirthTs(v);
    if(Number.isFinite(ts)) return ts;
  }
  const deepVal = findFirstBirthValDeep(payload);
  const ts2 = parseBirthTs(deepVal);
  return Number.isFinite(ts2) ? ts2 : null;
}

function parseTextToRows(rawText){
  if(!rawText || !rawText.trim()) return [];
  let obj = null;
  try{ obj = JSON.parse(rawText); }catch(e){
    // 尝试提取第一个大括号段落再解析
    const m = rawText.match(/\{[\s\S]*\}/);
    if(m){ try{ obj = JSON.parse(m[0]); }catch(e2){ obj = null; } }
  }
  if(!obj || typeof obj !== 'object') return [];
  // 支持：完整HAR 或 直接接口JSON
  const rows = [];
  const entries = obj?.log?.entries;
  if(Array.isArray(entries)){
    for(const entry of entries){
      const textVal = entry?.response?.content?.text;
      if(!textVal) continue;
      let payload = null;
      try{ payload = JSON.parse(textVal); }catch(e){
        const mm = String(textVal).match(/\{[\s\S]*\}/);
        if(mm){ try{ payload = JSON.parse(mm[0]); }catch(e2){ payload=null; } }
      }
      if(!payload || typeof payload!=='object') continue;
      const data = payload.data || {};
      const info = data.info || {};
      const birthTs = extractBirthTsFromPayload(payload);
      rows.push({
        realName: data.realName || '',
        nickName: data.nickName || data.nick || (nicknameFallbacks[data.realName] || ''),

        birthTs: (birthTs != null ? birthTs : (birthFallbacks[data.realName] ? Date.parse(birthFallbacks[data.realName]) : null)),
        userId: (data.userId != null ? data.userId : (userIdFallbacks[data.realName] || null))
      });
    }
  } else {
    // 直接接口JSON，结构与 payload 相同
    const data = obj.data || {};
    const info = data.info || {};
    const birthTs = extractBirthTsFromPayload(obj);
    if(data.realName || info.fansNum!=null){
      rows.push({
        realName: data.realName || '',

        userId: (data.userId != null ? data.userId : (userIdFallbacks[data.realName] || null))
      });
    }
  }
  return rows;
}

function sortAndEnrich(todayRows, yesterdayRows, baselineWeekRows, baselineMonthRows){
  const mapYesterdayFans = new Map();
  for(const r of (yesterdayRows||[])){
    if(r.realName) mapYesterdayFans.set(String(r.realName), Number(r.fansNum||0));
  }
  const mapBaselineWeek = new Map();
  for(const r of (baselineWeekRows||[])){
    if(r.realName) mapBaselineWeek.set(String(r.realName), Number(r.fansNum||0));
  }
  const mapBaselineMonth = new Map();
  for(const r of (baselineMonthRows||[])){
    if(r.realName) mapBaselineMonth.set(String(r.realName), Number(r.fansNum||0));
  }
  // 计算指定日期的排名映射（按粉丝数降序）
  const prevSorted = (yesterdayRows||[]).slice().sort((a,b)=>Number(b.fansNum||0)-Number(a.fansNum||0));
  const prevRankMap = new Map();
  let prevRankCounter = 0;
  for (const pr of prevSorted) {
    prevRankCounter += 1;
    if (pr.realName) prevRankMap.set(String(pr.realName), prevRankCounter);
  }

  const sorted = (todayRows||[]).slice().sort((a,b)=>Number(b.fansNum||0)-Number(a.fansNum||0));
  let prevFans = null;
  const enriched = [];
  let rank = 0;
  for(const r of sorted){
    rank += 1;
    const fans = Number(r.fansNum||0);
    const diffPrev = prevFans==null? '' : (prevFans - fans);
    prevFans = fans;
    const yesFans = mapYesterdayFans.has(String(r.realName)) ? mapYesterdayFans.get(String(r.realName)) : null;
    const growth = (yesFans==null ? '' : (fans - Number(yesFans))); // 日涨幅（昨日为基准）
    const weekBase = mapBaselineWeek.has(String(r.realName)) ? mapBaselineWeek.get(String(r.realName)) : null;
    const monthBase = mapBaselineMonth.has(String(r.realName)) ? mapBaselineMonth.get(String(r.realName)) : null;
    const weekGrowth = (weekBase==null ? '' : (fans - Number(weekBase))); // 不回退
    const monthGrowth = (monthBase==null ? '' : (fans - Number(monthBase))); // 不回退
    // 排名变化
    const prevRank = prevRankMap.has(String(r.realName)) ? prevRankMap.get(String(r.realName)) : null;
    let rankChange = '';
    if (prevRank != null) {
      const diff = prevRank - rank; // 正数表示排名提升（数值变小）
      if (diff > 0) rankChange = `上升${diff}名`;
      else if (diff < 0) rankChange = `下降${Math.abs(diff)}名`;
      else rankChange = '持平';
    }

    enriched.push({
      排名: rank,
      姓名: r.realName || '',
      收藏数: Number(r.collectNum||0),
      点赞数: Number(r.likeNum||0),
      粉丝数: fans,
      涨幅: growth,
      本周涨幅: weekGrowth,
      本月涨幅: monthGrowth,
      与前一名差值: diffPrev,
      排名变化: rankChange,
      avatarUrl: r.avatarUrl || r.headPortrait || '',
      birthTs: (r.birthTs!=null && Number.isFinite(Number(r.birthTs))) ? Number(r.birthTs) : null,
      nickName: r.nickName || (nicknameFallbacks[r.realName] || ''),
      userId: (r.userId != null ? r.userId : (userIdFallbacks[r.realName] || null))
    });
  }
  return enriched;
}

  // 同步渲染头像网格（两排14个，右下角姓名）
  try{ renderAvatarGrid(rows); }catch(e){}
  if(!rows || !rows.length){ container.innerHTML = rangeHtml + '<div class="muted">暂无数据预览</div>'; return; }
  // 计算粉丝数最大值用于数据条宽度
  const maxFans = Math.max(...rows.map(r=>Number(r.粉丝数||0)));
  // 动态构建表头，顺序：排名 姓名 收藏数 点赞数 粉丝数 距上一名 涨幅 本周涨幅 本月涨幅 排名变化
  const headerCols = ['排序','姓名'];
  if (showCollect) headerCols.push('收藏数');
  if (showLike) headerCols.push('点赞数');
  headerCols.push('粉丝数','距上一名','涨幅');
  if (showWeekGrowth) headerCols.push('本周涨幅');
  if (showMonthGrowth) headerCols.push('本月涨幅');
  headerCols.push('排序变化');
  let html = '<table><thead><tr>' + headerCols.map(h=>`<th>${h}</th>`).join('') + '</tr></thead><tbody>';
  for(const r of rows){
    const isEven = (Number(r.排名||0) % 2 === 0);
    const fans = Number(r.粉丝数||0);
    const pct = maxFans > 0 ? Math.round(fans / maxFans * 100) : 0;
    const growthRaw = (r.涨幅 === '' || r.涨幅 == null) ? null : Number(r.涨幅);
    const growthText = (growthRaw == null) ? '' : (growthRaw === 0 ? '-' : (growthRaw > 0 ? `+${growthRaw}` : `${growthRaw}`));
    const growthCls = (growthRaw == null || growthRaw === 0) ? '' : (growthRaw > 0 ? 'num-pos' : 'num-neg');
    // 是否展示火焰图标（仅当涨幅超过阈值）
    const showFlame = (growthRaw != null && growthRaw > flameThreshold);
    const rankChangeText = r.排名变化 === '持平' ? '-' : (r.排名变化 || '');
    const rankChangeCls = rankChangeText.startsWith('上升') ? 'num-pos' : (rankChangeText.startsWith('下降') ? 'num-neg' : '');
    const upIcon = '<svg viewBox="0 0 12 12" class="icon" aria-hidden="true"><path d="M6 2l-3.5 3.5h2.5v4h2v-4h2.5L6 2z" fill="currentColor"/></svg>';
    const downIcon = '<svg viewBox="0 0 12 12" class="icon" aria-hidden="true"><path d="M6 10l3.5-3.5H7v-4H5v4H2.5L6 10z" fill="currentColor"/></svg>';
    const flameIcon = '<span class="flame-icon flame-left" aria-hidden="true">🔥</span>';
    const growthIcon = (growthRaw == null || growthRaw === 0) ? '' : (growthRaw > 0 ? upIcon : downIcon);
    const rankIcon = rankChangeText.startsWith('上升') ? upIcon : (rankChangeText.startsWith('下降') ? downIcon : '');
    const diffPrevRaw = (r['与前一名差值'] === '' || r['与前一名差值'] == null) ? null : Number(r['与前一名差值']);
    const diffPrevText = (diffPrevRaw == null) ? '' : (diffPrevRaw === 0 ? '-' : `${diffPrevRaw}`);
    const diffPrevCls = (diffPrevRaw == null || diffPrevRaw === 0) ? '' : (diffPrevRaw > 0 ? 'num-pos' : 'num-neg');
    const diffPrevIcon = (diffPrevRaw == null || diffPrevRaw === 0) ? '' : (diffPrevRaw > 0 ? upIcon : downIcon);
    const cells = [];
    cells.push(`<td>${r.排名}</td>`);
    cells.push(`<td>${r.姓名}</td>`);
    if (showCollect) cells.push(`<td>${r.收藏数}</td>`);
    if (showLike) cells.push(`<td>${r.点赞数}</td>`);
    const fansCellStyleBase = `background-image: linear-gradient(to right, #fb8c00, #ffe082); background-size: ${pct}% 100%; background-repeat: no-repeat;`;
    const fansCellStyle = isEven ? fansCellStyleBase + ' background-color: #efefef; background-blend-mode: multiply;' : fansCellStyleBase;
    cells.push(`<td style="${fansCellStyle}">${fans}</td>`);
    cells.push(`<td>${diffPrevText}</td>`);
    // 日涨幅（带火焰）
    cells.push(`<td><span class="growth-cell ${growthCls}">${growthText}${showFlame ? `<span class="flame-icon flame-left" aria-hidden="true" title="涨幅：${growthRaw}">🔥</span>` : ''}</span></td>`);
    // 本周涨幅（不回退，无火焰）
    if (showWeekGrowth) {
      const wgRaw = (r['本周涨幅'] === '' || r['本周涨幅'] == null) ? null : Number(r['本周涨幅']);
      const wgText = (wgRaw == null) ? '' : (wgRaw === 0 ? '-' : (wgRaw > 0 ? `+${wgRaw}` : `${wgRaw}`));
      const wgCls = (wgRaw == null || wgRaw === 0) ? '' : (wgRaw > 0 ? 'num-pos' : 'num-neg');
      cells.push(`<td><span class="growth-cell ${wgCls}">${wgText}</span></td>`);
    }
    // 本月涨幅（不回退，无火焰）
    if (showMonthGrowth) {
      const mgRaw = (r['本月涨幅'] === '' || r['本月涨幅'] == null) ? null : Number(r['本月涨幅']);
      const mgText = (mgRaw == null) ? '' : (mgRaw === 0 ? '-' : (mgRaw > 0 ? `+${mgRaw}` : `${mgRaw}`));
      const mgCls = (mgRaw == null || mgRaw === 0) ? '' : (mgRaw > 0 ? 'num-pos' : 'num-neg');
      cells.push(`<td><span class="growth-cell ${mgCls}">${mgText}</span></td>`);
    }
    cells.push(`<td><span class=\"${rankChangeCls}\">${rankChangeText}</span></td>`);
    html += `<tr${isEven ? ' class="zebra-even"' : ''}>${cells.join('')}</tr>`;
  }
  html += '</tbody></table>';
  // 底部说明（导出PNG时一并包含）
  const noteHtml = `
    <div class="preview-notes" style="margin:12px 0 18px; padding-left:1ch; color:#606c76; font-size:12px; line-height:1.7;">
      <div><strong>说明：</strong></div>
      <div>1、涨幅指：单日或指定日期区间的粉丝数变化数值</div>
      <div>2、本周涨幅指：当前日期距本周一的粉丝数变化数值</div>
      <div>3、本月涨幅指：当前日期距本月1日的粉丝数变化数值</div>
      <div>4、所有数据从 2025/10/10开始统计，在此之前的暂不支持查看</div>
    </div>`;
  container.innerHTML = rangeHtml + html + noteHtml;
}

function renderAvatarGrid(rows){
  const grid = document.getElementById('avatarGrid');
  if(!grid){ return; }
  const seen = new Set();
  const itemsRaw = [];
  let idx = 0;
  for(const r of (rows || [])){
    const name = r.姓名 || r.realName || '';
    const url = r.avatarUrl || '';
    const birthTs = (r.birthTs!=null && Number.isFinite(Number(r.birthTs))) ? Number(r.birthTs) : null;
    const nickName = r.nickName || (nicknameFallbacks[r.realName] || '');
    if(!name || !url) continue;
    if(seen.has(name)) continue;
    seen.add(name);
    itemsRaw.push({ name, url, birthTs, nickName, _idx: idx++ });
  }
  const safeTs = (x) => (Number.isFinite(Number(x)) ? Number(x) : Infinity);
  itemsRaw.sort((a,b)=>{
    const ta = safeTs(a.birthTs);
    const tb = safeTs(b.birthTs);
    if(ta === tb){ return a._idx - b._idx; }
    return ta - tb; // 出生时间升序（更早出生排前）
  });
  // 指定顺序优先（14位）：官俊臣 张桂源 张函瑞 王橹杰 左奇函 陈奕恒 杨博文 杨涵博 张奕然 聂玮辰 陈思罕 魏子宸 李煜东 陈浚铭
  const preferredOrder = ['官俊臣','张桂源','张函瑞','王橹杰','左奇函','陈奕恒','杨博文','杨涵博','张奕然','聂玮辰','陈思罕','魏子宸','李煜东','陈浚铭'];
  const norm = (s) => String(s||'').trim().replace(/\s+/g,'');
  const byName = new Map(itemsRaw.map(it => [norm(it.name), it]));
  const chosen = [];
  for(const n of preferredOrder){ const it = byName.get(norm(n)); if(it){ chosen.push(it); } }
  // 若不足14位，用剩余按出生时间升序填充
  if(chosen.length < 14){
    for(const it of itemsRaw){ if(chosen.find(x => norm(x.name)===norm(it.name))) continue; chosen.push(it); if(chosen.length>=14) break; }
  }
  const items = chosen.slice(0,14);
  const fmt = (ts) => (Number.isFinite(Number(ts)) ? new Date(Number(ts)).toISOString().slice(0,10) : 'N/A');
  try{ console.log('[avatar-order:preferred]', items.map(it => ({ name: it.name, birth: fmt(it.birthTs), ts: it.birthTs }))); }catch(e){}
  grid.innerHTML = items.map(it => `<a class="avatar-item" href="person.html?name=${encodeURIComponent(it.name)}"><img src="${it.url}" alt="${it.name}" /><span class="avatar-name">${it.name}</span></a>`).join('');
}

function getStoredRowsForDate(dateStr){
  if(!dateStr) return [];
  try{ const v = localStorage.getItem(storageKey(dateStr)); return v ? JSON.parse(v) : []; }catch(e){ return []; }
}

function getWeekStart(dateStr){
  const d = new Date(dateStr);
  const day = d.getDay(); // 0=Sun,1=Mon,...
  const delta = (day === 0) ? -6 : (1 - day); // Monday as start
  const start = new Date(d);
  start.setDate(d.getDate() + delta);
  return start.toISOString().split('T')[0];
}
function getMonthStart(dateStr){
  const d = new Date(dateStr);
  const y = d.getFullYear(); const m = d.getMonth()+1;
  const mm = String(m).padStart(2,'0');
  return `${y}-${mm}-01`;
}
function inRange(dateStr, startStr, endStr){
  const t = new Date(dateStr).getTime();
  return t >= new Date(startStr).getTime() && t <= new Date(endStr).getTime();
}
function getBaselineRowsForMode(mode, todayDate){
  if(mode !== 'week' && mode !== 'month') return [];
  const dates = listStoredDates();
  if(!dates.length) return [];
  if(mode === 'week'){
    const start = getWeekStart(todayDate);
    const end = todayDate;
    const candidates = dates.filter(d=>inRange(d, start, end)).sort();
    const baselineDate = candidates[0] || start; // 取本周内最早有存档的日期
    return getStoredRowsForDate(baselineDate);
  } else {
    const start = getMonthStart(todayDate);
    const end = todayDate;
    const candidates = dates.filter(d=>d.startsWith(start.slice(0,7))).sort();
    const baselineDate = candidates[0] || start; // 取本月内最早有存档的日期
    return getStoredRowsForDate(baselineDate);
  }
}

function autoFillFromLocal(){
  const tdEl = document.getElementById('todayDate');
  const yDateEl = document.getElementById('yesterdayDate');
  const todayEl = document.getElementById('todayText');
  const yesterdayEl = document.getElementById('yesterdayText');
  const follow = document.getElementById('followTextDate')?.checked;
  // 若当日日期为空或开启“跟随文本日期”，尝试从文本识别并填充
  const detectedToday = detectLatestDateFromText(todayEl?.value || '');
  if(follow){
    if(detectedToday){ tdEl.value = detectedToday; showSuccess(`已识别并跟随文本日期（当日）：${detectedToday}`); }
  }else{
    if(!tdEl.value && detectedToday){ tdEl.value = detectedToday; showSuccess(`已识别当日日期：${detectedToday}`); }
    else if(tdEl.value && detectedToday && tdEl.value !== detectedToday){ showError(`文本日期(${detectedToday})与选择日期(${tdEl.value})不一致，已使用选择日期`); }
  }
  const todayDate = tdEl.value;
  // 读取当日原始文本并按 startedDateTime 校验/对齐
  const todayRaw = document.getElementById('todayText')?.value || '';
  const vToday = validateDateAgainstStartedDateTime(todayDate, todayRaw, { strategy: 'latest_for_day' });
  if(vToday.changed){ tdEl.value = vToday.date; todayDate = vToday.date; showSuccess(`已根据 startedDateTime 对齐为：${vToday.date}`); }
  if(vToday.reason === 'mismatch'){ return; }
  if(!todayDate){ showError('请先选择“当日日期”'); return; }
  // 昨日期
  const detectedYesterday = detectLatestDateFromText(yesterdayEl?.value || '');
  const computedYesterday = detectedYesterday || getPrevDateStr(todayDate);
  if(follow){ if(yDateEl) yDateEl.value = computedYesterday; }
  const yesterdayDate = (yDateEl && yDateEl.value && yDateEl.value.trim()) ? yDateEl.value : computedYesterday;
  const todayText = todayEl.value;
  const yesterdayText = yesterdayEl?.value || '';
  // 按最大 startedDateTime 优先规则校验/对齐昨日日期
  const vYesterday = validateDateAgainstStartedDateTime(yesterdayDate, yesterdayText, { strategy: 'latest' });
  const finalYesterdayDate = vYesterday.changed ? vYesterday.date : yesterdayDate;
  if(vYesterday.changed){ if(yDateEl) yDateEl.value = finalYesterdayDate; showSuccess(`已根据 startedDateTime 对齐为：${finalYesterdayDate}（昨日）`); }
  if(vYesterday.reason === 'mismatch'){ return; }
  // 若文本框为空，尝试根据日期从本地填充原始文本
  if (!todayText || !todayText.trim()) {
    try{
      const rawToday = localStorage.getItem(storageRawKey(todayDate));
      if (rawToday) {
        todayEl.value = rawToday;
        showSuccess('已自动填充当日原始文本');
      } else {
        // 当“当日”无本地文档时，自动选取最新的本地存档日期进行填充
        const dates = listStoredDates();
        const latest = dates.length ? dates[dates.length - 1] : null;
        if(latest){
          const rawLatest = localStorage.getItem(storageRawKey(latest));
          if(rawLatest){
            tdEl.value = latest;
            todayDate = latest;
            todayEl.value = rawLatest;
            showSuccess(`已自动选取最新存档：${latest}`);
            // 若昨日未选择，则跟随最新存档的前一天
            const latestPrev = getPrevDateStr(latest);
            if(yDateEl && (!yDateEl.value || !yDateEl.value.trim())){
              yDateEl.value = latestPrev;
            }
          } else {
            showError('无本地文档');
          }
        } else {
          showError('无本地文档');
        }
      }
    }catch(e){}
  }
  if (!yesterdayText || !yesterdayText.trim()) {
    try{
      const targetY = (yDateEl && yDateEl.value && yDateEl.value.trim()) ? yDateEl.value : finalYesterdayDate;
      const rawY = localStorage.getItem(storageRawKey(targetY));
      if (rawY) { yesterdayEl && (yesterdayEl.value = rawY); showSuccess('已自动填充指定日期原始文本'); } else { showError('无本地文档'); }
    }catch(e){}
  }
  let tRows = [];
  let yRows = [];
  let usedTodayLocal = false;
  let usedYesterdayLocal = false;
  const curTodayText = todayEl.value;
  const curYesterdayText = yesterdayEl?.value || '';
  if (curTodayText && curTodayText.trim()) { tRows = parseTextToRows(curTodayText); }
  else { try{ const cachedToday = localStorage.getItem(storageKey(todayDate)); if(cachedToday){ tRows = JSON.parse(cachedToday); usedTodayLocal = true; } }catch(e){} }
  if (curYesterdayText && curYesterdayText.trim()) { yRows = parseTextToRows(curYesterdayText); }
  else { try{ const cachedY = localStorage.getItem(storageKey(finalYesterdayDate)); if(cachedY){ yRows = JSON.parse(cachedY); usedYesterdayLocal = true; } }catch(e){} }
  if (tRows.length){
    lastTodayRows = tRows;
    const baselineWeek = getBaselineRowsForMode('week', todayDate);
    const baselineMonth = getBaselineRowsForMode('month', todayDate);
    lastPreview = sortAndEnrich(tRows, yRows, baselineWeek, baselineMonth);
    renderPreviewTable(lastPreview);
    let msg = '已根据所选日期更新预览';
    const parts = [];
    if (usedTodayLocal) parts.push('当日数据来自本地');
    if (usedYesterdayLocal) parts.push('昨日数据来自本地');
    if (parts.length) msg = parts.join('；');
    showSuccess(msg);
  }
  // 更新“最新 startedDateTime”显示
  updateDetectedTsLabels();
}

  if(vY2.reason === 'mismatch'){ return; }

  if (todayText && todayText.trim()) { try{ localStorage.setItem(storageRawKey(todayDate), todayText); }catch(e){} }
  if (yesterdayText && yesterdayText.trim()) { try{ localStorage.setItem(storageRawKey(finalYDate2), yesterdayText); }catch(e){} }
  let tRows = [];
  if (todayText && todayText.trim()) { tRows = parseTextToRows(todayText); }
  else { try{ const cachedToday = localStorage.getItem(storageKey(todayDate)); if(cachedToday){ tRows = JSON.parse(cachedToday); } }catch(e){ tRows = []; } }
  let yRows = [];
  if(yesterdayText && yesterdayText.trim()){ yRows = parseTextToRows(yesterdayText); }
  else { try{ const cached = localStorage.getItem(storageKey(finalYDate2)); if(cached){ yRows = JSON.parse(cached); } }catch(e){ yRows = []; } }
  // 更新“最新 startedDateTime”显示
  updateDetectedTsLabels();
  try{ if (tRows && tRows.length) { localStorage.setItem(storageKey(todayDate), JSON.stringify(tRows)); refreshDateOptions(); } }catch(e){}
  try{ if (yRows && yRows.length) { localStorage.setItem(storageKey(finalYDate2), JSON.stringify(yRows)); refreshDateOptions(); } }catch(e){}
  lastTodayRows = tRows;
  const baselineWeek2 = getBaselineRowsForMode('week', todayDate);
  const baselineMonth2 = getBaselineRowsForMode('month', todayDate);
  lastPreview = sortAndEnrich(tRows, yRows, baselineWeek2, baselineMonth2);

}

  let todayDisplay = todayDate;
  try{
    const rawToday = localStorage.getItem(storageRawKey(todayDate)) || '';
    const tMaxTs = detectMaxTsForDateFromText(rawToday, todayDate) || detectMaxTsFromText(rawToday);
    if(tMaxTs){ const fmt = formatDateTimeForDisplay(tMaxTs); if(fmt) todayDisplay = fmt; }
  }catch(e){}
  const rows = lastPreview.map(r => {
    const o = { 日期: todayDisplay, ...r };
    if (Object.prototype.hasOwnProperty.call(o, '排名')) {
      o['排序'] = o['排名'];
      delete o['排名'];
    }
    if (Object.prototype.hasOwnProperty.call(o, '排名变化')) {
      o['排序变化'] = o['排名变化'];
      delete o['排名变化'];
    }
    return o;
  });
  // 与网页表头顺序保持一致
  const headers = ['日期','排序','姓名'];
  if (showCollect) headers.push('收藏数');
  if (showLike) headers.push('点赞数');
  headers.push('粉丝数','距上一名','涨幅');
  if (showWeekGrowth) headers.push('本周涨幅');
  if (showMonthGrowth) headers.push('本月涨幅');
  headers.push('排序变化');
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers });

  // 样式优化：更适合手机端查看
  const widthMap = { '日期':12, '排序':8, '姓名':14, '收藏数':10, '点赞数':10, '粉丝数':10, '距上一名':12, '与前一名差值':12, '本周涨幅':10, '本月涨幅':10, '涨幅':10, '排序变化':12 };
  ws['!cols'] = headers.map(k => ({ wch: widthMap[k] || 12 }));
  // 表头行高（仅第一行）
  ws['!rows'] = [{ hpt: 20 }];
  // 自动筛选（首行表头）
  const lastColLetter = String.fromCharCode('A'.charCodeAt(0) + Math.max(1, headers.length) - 1);
  ws['!autofilter'] = { ref: `A1:${lastColLetter}${rows.length + 1}` };

  // 在数据最后追加说明注释（不纳入自动筛选范围）
  const notes = [
    [''],
    [' 说明：'],
    [' 1、涨幅指：单日或指定日期区间的粉丝数变化数值'],
    [' 2、本周涨幅指：当前日期距本周一的粉丝数变化数值'],
    [' 3、本月涨幅指：当前日期距本月1日的粉丝数变化数值'],
    [' 4、所有数据从 2025/10/10开始统计，在此之前的暂不支持查看'],
  ];
  XLSX.utils.sheet_add_aoa(ws, notes, { origin: -1 });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '每日数据');
  // 文件名采用分钟级日期显示，避免冒号不兼容（替换为短横线）
  const safeName = String(todayDisplay).replace(/:/g, '-');
  const fileName = `高会数据_${safeName}.xlsx`;
  XLSX.writeFile(wb, fileName);
  showSuccess(`已导出：${fileName}`);
}

function saveTodayToLocal(){
  const todayDate = document.getElementById('todayDate').value;
  if(!todayDate){ showError('请先选择“当日日期”'); return; }
  // 在保存前按 startedDateTime 校验/对齐（遵循“跟随文本日期”开关）
  const tdEl = document.getElementById('todayDate');
  const todayRaw = document.getElementById('todayText')?.value || '';
  const v = validateDateAgainstStartedDateTime(todayDate, todayRaw, { strategy: 'latest_for_day' });
  let finalDate = todayDate;
  if(v.changed){ tdEl.value = v.date; finalDate = v.date; showSuccess(`已根据 startedDateTime 对齐为：${v.date}`); }
  if(v.reason === 'mismatch'){ return; }
  // 使用最终对齐后的日期进行存档
  const todayEl = document.getElementById('todayText');
  const todayRawText = todayEl?.value || '';
  if (todayRawText && todayRawText.trim()) { localStorage.setItem(storageRawKey(finalDate), todayRawText); }
  localStorage.setItem(storageKey(finalDate), JSON.stringify(lastTodayRows));
  refreshDateOptions();
  showSuccess(`已保存 ${finalDate} 的本地存档`);
}

// 存档日期与备份相关函数（放入主脚本中）
function listStoredDates(){
  const dates = new Set();
  try{
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!k) continue;
      if(k.startsWith('memberRaw:') || k.startsWith('memberData:')){
        const d = k.split(':')[1];
        if(d) dates.add(d);
      }
    }
  }catch(e){}
  return Array.from(dates).sort();
}

function refreshDateOptions(){
  const dates = listStoredDates();
  const build = (selId) => {
    const sel = document.getElementById(selId);
    if(!sel) return;
    sel.innerHTML = '<option value="">— 选择存档日期 —</option>' + dates.map(d=>`<option value="${d}">${d}</option>`).join('');
  };
  build('todayDateSelect');
  build('yesterdayDateSelect');
}

function exportLocalBackup(){
  try{
    const rawMap = {};
    const dataMap = {};
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!k) continue;
      if(k.startsWith('memberRaw:')){
        const d = k.split(':')[1];
        rawMap[d] = localStorage.getItem(k) || '';
      } else if(k.startsWith('memberData:')){
        const d = k.split(':')[1];
        const v = localStorage.getItem(k);
        dataMap[d] = v ? JSON.parse(v) : [];
      }
    }
    const payload = { memberRaw: rawMap, memberData: dataMap, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g,'-');
    a.href = url; a.download = `每日高会_本地存档_${ts}.json`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    showSuccess('已导出本地存档');
  }catch(e){ showError('导出失败'); }
}

function uploadLocalBackup(){
  try{
    const rawMap = {};
    const dataMap = {};
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!k) continue;
      if(k.startsWith('memberRaw:')){
        const d = k.split(':')[1];
        rawMap[d] = localStorage.getItem(k) || '';
      } else if(k.startsWith('memberData:')){
        const d = k.split(':')[1];
        const v = localStorage.getItem(k);
        try{ dataMap[d] = v ? JSON.parse(v) : []; }catch(e){ dataMap[d] = []; }
      }
    }
    const payload = { memberRaw: rawMap, memberData: dataMap, exportedAt: new Date().toISOString() };
    const dateCount = Array.from(new Set([ ...Object.keys(rawMap), ...Object.keys(dataMap) ])).length;
    const clientId = location.hostname || 'default';
    fetch(`/api/archives/upload?client_id=${encodeURIComponent(clientId)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(async (resp)=>{
      if(!resp.ok){ const t = await resp.text(); throw new Error(t || '上传失败'); }
      showInlineStatus('uploadStatus','success',`上传完成：共提交 ${dateCount} 个日期`);
    }).catch(err=>{ showInlineStatus('uploadStatus','error',`上传失败：${err.message || err}`); });
  }catch(e){ showError('上传异常'); }
}

function pullLatestBackup(){
  try{
    const clientId = location.hostname || 'default';
    fetch(`/api/archives/latest?client_id=${encodeURIComponent(clientId)}`)
      .then(async (resp)=>{
        if(!resp.ok){ const t = await resp.text(); throw new Error(t || '拉取失败'); }
        return resp.json();
      }).catch(async (err)=>{
        const resp2 = await fetch('archives/latest_localhost.json');
        if(!resp2.ok){ const t2 = await resp2.text(); throw new Error(t2 || '本地最新存档缺失'); }
        return resp2.json();
      }).then((payload)=>{
        const rawMap = payload.memberRaw || {};
        const dataMap = payload.memberData || {};
        // 合并策略：仅补齐缺失或覆盖较旧版本，保留本地较新版本
        const unionDates = Array.from(new Set([ ...Object.keys(rawMap), ...Object.keys(dataMap) ])).sort();
        let updatedCount = 0, keptCount = 0;
        function getMaxIsoFromRowsForDate(rows, date){
          try{
            if(!Array.isArray(rows) || !rows.length || !date) return null;
            let maxTs = -Infinity; let maxIso = null;
            for(const r of rows){
              const iso = r && r.startedDateTime ? String(r.startedDateTime) : null;
              if(!iso) continue;
              const ds = iso.split('T')[0];
              if(ds !== date) continue;
              const ts = Date.parse(iso);
              if(Number.isFinite(ts) && ts > maxTs){ maxTs = ts; maxIso = iso; }
            }
            return maxIso;
          }catch(e){ return null; }
        }
        for(const d of unionDates){
          try{
            const srvRaw = rawMap[d] || '';
            const srvRows = Array.isArray(dataMap[d]) ? dataMap[d] : [];
            let srvMaxIso = srvRaw ? detectMaxTsForDateFromText(srvRaw, d) : null;
            if(!srvMaxIso && srvRows.length){ srvMaxIso = getMaxIsoFromRowsForDate(srvRows, d); }
            const srvMax = srvMaxIso ? Date.parse(srvMaxIso) : null;

            const locRaw = localStorage.getItem(storageRawKey(d)) || '';
            const locRowsStr = localStorage.getItem(storageKey(d));
            const locRows = locRowsStr ? (function(){ try{ return JSON.parse(locRowsStr); }catch(e){ return []; } })() : [];
            let locMaxIso = locRaw ? detectMaxTsForDateFromText(locRaw, d) : null;
            if(!locMaxIso && Array.isArray(locRows) && locRows.length){ locMaxIso = getMaxIsoFromRowsForDate(locRows, d); }
            const locMax = locMaxIso ? Date.parse(locMaxIso) : null;

            // 决策：若本地较新或同新，则保留本地；否则更新为服务器版本；若本地为空且服务器有，则写入
            const hasLocal = (!!locRaw && locRaw.trim()) || (Array.isArray(locRows) && locRows.length);
            const hasServer = (!!srvRaw && srvRaw.trim()) || (Array.isArray(srvRows) && srvRows.length);

            if(hasLocal && hasServer && locMax!=null && srvMax!=null){
              if(locMax >= srvMax){ keptCount++; continue; }
              // 服务器较新，覆盖
              try{ if(srvRaw && srvRaw.trim()) localStorage.setItem(storageRawKey(d), srvRaw); }catch(e){}
              try{ localStorage.setItem(storageKey(d), JSON.stringify(srvRows)); }catch(e){}
              updatedCount++; continue;
            }
            if(hasLocal && !hasServer){ keptCount++; continue; }
            if(!hasLocal && hasServer){
              try{ if(srvRaw && srvRaw.trim()) localStorage.setItem(storageRawKey(d), srvRaw); }catch(e){}
              try{ localStorage.setItem(storageKey(d), JSON.stringify(srvRows)); }catch(e){}
              updatedCount++; continue;
            }
            // 两边都没有有效数据，不做处理
          }catch(e){ /* 单个日期合并失败忽略 */ }
        }
        if(typeof showInfo==='function'){
          showInfo(`已合并服务器存档：保留本地 ${keptCount} 项，更新 ${updatedCount} 项`);
        }
        // 刷新下拉并切换到最新日期
        refreshDateOptions();
        try{
          const dates = listStoredDates();
          const latest = dates.length ? dates[dates.length - 1] : null;
          if(latest){
            const tdEl = document.getElementById('todayDate');
            const ydEl = document.getElementById('yesterdayDate');
            if(tdEl){ tdEl.value = latest; }
            if(ydEl){ ydEl.value = getPrevDateStr(latest); }
            fillRawTextForDate(latest, 'todayText');
            fillRawTextForDate(getPrevDateStr(latest), 'yesterdayText');
            showInfo(`已切换至 ${latest}`);
          }
        }catch(e){}
        ensureNonDuplicateDates();
        autoFillFromLocal();
        updateDetectedTsLabels();
        // 拉取后校验最新日期是否有有效最大时间戳
        try{
          const tdMaxEl = document.getElementById('todayMaxTs');
          const tdMaxTxt = (tdMaxEl && tdMaxEl.textContent || '').trim();
          const tdValEl = document.getElementById('todayDate');
          const tdVal = tdValEl ? tdValEl.value : '';
          if(!tdMaxTxt || tdMaxTxt === '—' || tdMaxTxt === '-' || tdMaxTxt === 'NaN'){
            showInlineStatus('pullStatus','error',`最新日期${tdVal ? ' '+tdVal : ''}内容为空或无有效 HAR 时间戳`);
          }else{
            showInlineStatus('pullStatus','success','拉取完成：已恢复最新存档');
          }
        }catch(e){
          showInlineStatus('pullStatus','success','拉取完成：已恢复最新存档');
        }
      }).catch(err=>{ showInlineStatus('pullStatus','error',`拉取失败：${err.message || err}`); });
  }catch(e){ showError('拉取异常'); }
}
// 新增：导出图片
function exportImage(){
  if(!lastPreview || !lastPreview.length){ showError('请先“解析并预览”'); return; }
  const todayDate = document.getElementById('todayDate').value || new Date().toISOString().split('T')[0];
  const node = document.getElementById('preview');
  if(!node){ showError('未找到预览区域'); return; }
  // 确保导出时从预览顶部开始，包含表头
  node.scrollTop = 0;
  const origBG = node.style.backgroundColor;
  // 为导出PNG添加专用样式类，确保日期区间居中且上下留白一致
  node.classList.add('export-png');
  // 参照整个已显示列居中对齐：将日期区间宽度设置为表格的实际宽度，并使用左右 margin: auto 居中
  const rangeBar = node.querySelector('.range-bar');
  const tableEl = node.querySelector('table');
  const prevRangeStyle = {
    width: rangeBar ? rangeBar.style.width : '',
    display: rangeBar ? rangeBar.style.display : '',
    marginLeft: rangeBar ? rangeBar.style.marginLeft : '',
    marginRight: rangeBar ? rangeBar.style.marginRight : '',
    marginTop: rangeBar ? rangeBar.style.marginTop : '',
    marginBottom: rangeBar ? rangeBar.style.marginBottom : ''
  };
  try{
    const tw = tableEl ? Math.max(tableEl.scrollWidth, tableEl.offsetWidth, tableEl.clientWidth) : 0;
    if(rangeBar && tw > 0){
      rangeBar.style.width = tw + 'px';
      rangeBar.style.display = 'block';
      rangeBar.style.marginLeft = 'auto';
      rangeBar.style.marginRight = 'auto';
    }
  }catch(e){}
  node.style.backgroundColor = '#ffffff';
  const scale = (window.devicePixelRatio && window.devicePixelRatio > 1) ? 2 : 1;
  // 使用元素的完整滚动宽高，避免截断内容
  const exportWidth = node.scrollWidth;
  const exportHeight = node.scrollHeight;
  html2canvas(node, { scale, useCORS: true, backgroundColor: '#ffffff', width: exportWidth, height: exportHeight })
    .then(canvas => {
      const link = document.createElement('a');
      const fileName = `高会数据_${todayDate}.png`;
      link.download = fileName;
      link.href = canvas.toDataURL('image/png');
      link.click();
      showSuccess(`已导出图片：${fileName}`);
    })
    .catch(e => { showError('导出图片失败：' + (e && e.message ? e.message : e)); })
    .finally(() => {
      node.style.backgroundColor = origBG;
      node.classList.remove('export-png');
      // 还原日期区间样式
      if(rangeBar){
        rangeBar.style.width = prevRangeStyle.width || '';
        rangeBar.style.display = prevRangeStyle.display || '';
        rangeBar.style.marginLeft = prevRangeStyle.marginLeft || '';
        rangeBar.style.marginRight = prevRangeStyle.marginRight || '';
        rangeBar.style.marginTop = prevRangeStyle.marginTop || '';
        rangeBar.style.marginBottom = prevRangeStyle.marginBottom || '';
      }
    });
}
