function renderAvatarGrid(rows){
  const grid = document.getElementById('avatarGrid');
  if(!grid){ return; }
  // 统一清洗头像 URL，修复可能的混合内容（http -> https）和协议相对地址（//），并支持 Worker 代理
  const normalizeAvatarUrl = (u) => {
    try{
      let s = String(u||'').trim();
      if(!s) return '';
      if(s.startsWith('//')) s = 'https:' + s;
      if(s.startsWith('http://')) return '/img?u=' + encodeURIComponent(s);
      if(s.startsWith('https://')) return s;
      // 其他情况（可能是裸域名或奇怪格式），尝试通过代理升级为 https
      return '/img?u=' + encodeURIComponent('https://' + s.replace(/^\+/, ''));
    }catch(e){ return ''; }
  };

  const seen = new Set();
  const itemsRaw = [];
  let idx = 0;
  for(const r of (rows || [])){
    const name = String(r.姓名 || r.realName || '').trim();
    // 过滤掉张三和李四的数据
    if(name === '张三' || name === '李四') continue;
    const origUrl = r.avatarUrl || r.headPortrait || r.starHeadPortrait || '';
    const url = normalizeAvatarUrl(origUrl);
    const birthTs = (r.birthTs!=null && Number.isFinite(Number(r.birthTs))) ? Number(r.birthTs) : null;
    const nickName = r.nickName || (nicknameFallbacks[r.realName] || '');
    if(!name) continue;
    if(seen.has(name)) continue;
    seen.add(name);
    itemsRaw.push({ name, url, origUrl, birthTs, nickName, _idx: idx++ });
  }
  const safeTs = (x) => (Number.isFinite(Number(x)) ? Number(x) : Infinity);
  itemsRaw.sort((a,b)=>{
    const ta = safeTs(a.birthTs);
    const tb = safeTs(b.birthTs);
    if(ta === tb){ return a._idx - b._idx; }
    return ta - tb; // 出生时间升序（更早出生排前）
  });
  // 指定顺序优先（14位）：官俊臣 张桂源 张函瑞 王橹杰 左奇函 陈奕恒 杨博文 杨涵博 张奕然 聂玮辰 陈思罕 魏子宸 李煜东 陈浚铭
  const preferredOrder = ['官俊臣','张桂源','张函瑞','王橹杰','左奇函','陈奕恒','杨博文','杨涵博','张奕然','聂玮辰','陈思罕','魏子宸','李煜东','陈浚铭'];
  const norm = (s) => String(s||'').trim().replace(/\s+/g,'');
  const byName = new Map(itemsRaw.map(it => [norm(it.name), it]));
  const chosen = [];
  for(const n of preferredOrder){ const it = byName.get(norm(n)); if(it){ chosen.push(it); } }
  // 若不足14位，用剩余按出生时间升序填充
  if(chosen.length < 14){
    for(const it of itemsRaw){ if(chosen.find(x => norm(x.name)===norm(it.name))) continue; chosen.push(it); if(chosen.length>=14) break; }
  }
  const items = chosen.slice(0,14);
  const fmt = (ts) => (Number.isFinite(Number(ts)) ? new Date(Number(ts)).toISOString().slice(0,10) : 'N/A');
  try{ console.log('[avatar-order:preferred]', items.map(it => ({ name: it.name, birth: fmt(it.birthTs), ts: it.birthTs }))); }catch(e){}
  grid.innerHTML = items.map(it => {
    const hasImg = !!String(it.url||'').trim();
    const imgHtml = `<img src="${hasImg ? it.url : ''}" alt="${it.name}" style="display:${hasImg?'block':'none'};" loading="lazy" data-orig-url="${encodeURIComponent(it.origUrl||'')}" data-fallback-tried="0" />`;
    const fallbackHtml = `<span class="avatar-fallback" aria-label="${it.name}" style="width:36px;height:36px;border-radius:50%;background:#e9ecef;display:${hasImg?'none':'inline-flex'};align-items:center;justify-content:center;color:#495057;font-size:14px;">${String(it.name).slice(0,1)}</span>`;
    return `<a class="avatar-item" href="person.html?name=${encodeURIComponent(it.name)}">${imgHtml}${fallbackHtml}<span class="avatar-name">${it.name}</span></a>`;
  }).join('');

  // 若图片加载失败，自动切换为首字母占位
  try{
    const imgs = grid.querySelectorAll('.avatar-item img');
    imgs.forEach(img => {
      img.addEventListener('error', () => {
        try{
          const tried = img.getAttribute('data-fallback-tried') || '0';
          const origEnc = img.getAttribute('data-orig-url') || '';
          const orig = decodeURIComponent(origEnc);
          // 若通过代理加载失败，尝试直接升级为 https 原始地址一次
          if((tried === '0') && img.src.startsWith(location.origin + '/img')){
            const upgraded = (orig || '').replace(/^http:\/\//, 'https://');
            if(upgraded && upgraded !== orig){
              img.setAttribute('data-fallback-tried','1');
              img.src = upgraded;
              return;
            }
          }
          img.style.display = 'none';
          const fallback = img.parentElement?.querySelector('.avatar-fallback');
          if(fallback) fallback.style.display = 'inline-flex';
        }catch(_){ /* noop */ }
      });
    });
  }catch(_){ /* noop */ }
}

function getStoredRowsForDate(dateStr){
  if(!dateStr) return [];
  try{ const v = localStorage.getItem(storageKey(dateStr)); return v ? JSON.parse(v) : []; }catch(e){ return []; }
}

function getWeekStart(dateStr){
  const d = new Date(dateStr);
  const day = d.getDay(); // 0=Sun,1=Mon,...,6=Sat
  // 周一作为一周的开始：如果 day=0（周日），回到上周一（-6天）；否则回到本周一（-(day-1)天）
  const delta = day === 0 ? -6 : -(day - 1);
  const start = new Date(d);
  start.setDate(d.getDate() + delta);
  return start.toISOString().split('T')[0];
}
function getLastWeekEnd(dateStr){
  // 获取上周日（上周最晚的日期）
  const d = new Date(dateStr);
  const day = d.getDay(); // 0=Sun,1=Mon,...,6=Sat
  // 如果今天是周日，上周日是7天前；否则是 day 天前
  const delta = day === 0 ? -7 : -day;
  const lastSunday = new Date(d);
  lastSunday.setDate(d.getDate() + delta);
  return lastSunday.toISOString().split('T')[0];
}
function getMonthStart(dateStr){
  const d = new Date(dateStr);
  const y = d.getFullYear(); const m = d.getMonth()+1;
  const mm = String(m).padStart(2,'0');
  return `${y}-${mm}-01`;
}
function getLastMonthEnd(dateStr){
  // 获取上个月的最后一天
  const d = new Date(dateStr);
  // 本月0日 = 上个月最后一天（例如：1月0日 = 12月31日）
  const lastMonth = new Date(d.getFullYear(), d.getMonth(), 0);
  return lastMonth.toISOString().split('T')[0];
}
function inRange(dateStr, startStr, endStr){
  const t = new Date(dateStr).getTime();
  return t >= new Date(startStr).getTime() && t <= new Date(endStr).getTime();
}
function getBaselineRowsForMode(mode, todayDate){
  if(mode !== 'week' && mode !== 'month') return [];
  
  let baselineDate = null;
  
  if(mode === 'week'){
    // 本周涨幅：使用上周最晚有数据的日期，或上周日作为基准
    const lastSunday = getLastWeekEnd(todayDate); // 上周日
    const dates = listStoredDates();
    // 查找上周日之前（包含上周日）的所有日期，取最晚的一个
    const candidates = dates.filter(d => d <= lastSunday).sort();
    baselineDate = candidates.length > 0 ? candidates[candidates.length - 1] : lastSunday; // 取上周最晚有数据的日期，如果没有则使用上周日
    
    // 调试信息：输出本周涨幅的基准日期
    console.log(`[本周涨幅调试] 今日: ${todayDate}, 上周日: ${lastSunday}, 上周及之前有数据的日期: [${candidates.slice(-5).join(', ')}...], 使用的基准日期: ${baselineDate}`);
  } else {
    // 本月涨幅：使用上个月最晚有数据的日期作为基准
    const lastMonthEnd = getLastMonthEnd(todayDate); // 上个月最后一天
    const dates = listStoredDates();
    // 查找上个月最后一天之前（包含）的所有日期，取最晚的一个
    const candidates = dates.filter(d => d <= lastMonthEnd).sort();
    baselineDate = candidates.length > 0 ? candidates[candidates.length - 1] : lastMonthEnd; // 取上个月最晚有数据的日期
    
    // 调试信息：输出本月涨幅的基准日期
    console.log(`[本月涨幅调试] 今日: ${todayDate}, 上个月最后一天: ${lastMonthEnd}, 上个月及之前有数据的日期: [${candidates.slice(-5).join(', ')}...], 使用的基准日期: ${baselineDate}`);
  }
  
  if(!baselineDate) return [];
  
  // 优化：先从本地存储获取基准日期的数据
  let storedRows = getStoredRowsForDate(baselineDate);
  if(storedRows && storedRows.length > 0){
    console.log(`[基准数据调试] 基准日期: ${baselineDate}, 数据条数: ${storedRows.length}（来自缓存）`);
    return storedRows;
  }
  
  // 如果本地存储没有，尝试异步查询（不阻塞主流程）
  // 优化：按需查询基准日期，避免初始加载时查询所有历史日期
  console.log(`[基准数据调试] ⚠️ 基准日期 ${baselineDate} 没有缓存数据，尝试异步查询...`);
  
  // 异步查询基准日期数据（不等待结果，返回空数组，后续会更新）
  // 使用全局变量避免重复查询
  if(!window.__baselineFetching){
    window.__baselineFetching = new Set();
  }
  
  if(!window.__baselineFetching.has(baselineDate)){
    window.__baselineFetching.add(baselineDate);
    const clientId = resolveClientId();
    fetchHistoryRows(clientId, baselineDate).then(payload => {
      const histRows = Array.isArray(payload?.rows) ? dedupeLatestRows(payload.rows) : [];
      if(histRows.length){
        try{ 
          localStorage.setItem(storageKey(baselineDate), JSON.stringify(histRows));
          console.log(`[基准数据调试] ✅ 异步查询获取到基准日期 ${baselineDate} 的数据，条数: ${histRows.length}`);
          window.__baselineFetching.delete(baselineDate);
          // 如果页面已加载，触发重新计算涨幅
          if(typeof refreshAutoTableDisplay === 'function'){
            refreshAutoTableDisplay();
          }
        }catch(e){
          console.warn(`[基准数据调试] 保存基准日期数据失败:`, e);
          window.__baselineFetching.delete(baselineDate);
        }
      } else {
        window.__baselineFetching.delete(baselineDate);
      }
    }).catch(err => {
      console.warn(`[基准数据调试] 查询基准日期 ${baselineDate} 失败:`, err);
      window.__baselineFetching.delete(baselineDate);
    });
  }
  
  // 返回空数组，表示暂时无法计算涨幅（等待异步查询完成）
  return [];
}

function autoFillFromLocal(){
  const tdEl = document.getElementById('todayDate');
  const yDateEl = document.getElementById('yesterdayDate');
  const todayEl = document.getElementById('todayText');
  const yesterdayEl = document.getElementById('yesterdayText');
  const follow = document.getElementById('followTextDate')?.checked;
  // 若当日日期为空或开启“跟随文本日期”，尝试从文本识别并填充
  const detectedToday = detectLatestDateFromText(todayEl?.value || '');
  if(follow){
    if(detectedToday){ tdEl.value = detectedToday; showSuccess(`已识别并跟随文本日期（当日）：${detectedToday}`); }
  }else{
    if(!tdEl.value && detectedToday){ tdEl.value = detectedToday; showSuccess(`已识别当日日期：${detectedToday}`); }
    else if(tdEl.value && detectedToday && tdEl.value !== detectedToday){ showError(`文本日期(${detectedToday})与选择日期(${tdEl.value})不一致，已使用选择日期`); }
  }
  const todayDate = tdEl.value;
  // 读取当日原始文本并按 startedDateTime 校验/对齐
  const todayRaw = document.getElementById('todayText')?.value || '';
  const vToday = validateDateAgainstStartedDateTime(todayDate, todayRaw, { strategy: 'latest_for_day' });
  if(vToday.changed){ tdEl.value = vToday.date; todayDate = vToday.date; showSuccess(`已根据 startedDateTime 对齐为：${vToday.date}`); }
  if(vToday.reason === 'mismatch'){ return; }
  if(!todayDate){ showError('请先选择“当日日期”'); return; }
  // 昨日期
  const detectedYesterday = detectLatestDateFromText(yesterdayEl?.value || '');
  const computedYesterday = detectedYesterday || getPrevDateStr(todayDate);
  if(follow){ if(yDateEl) yDateEl.value = computedYesterday; }
  const yesterdayDate = (yDateEl && yDateEl.value && yDateEl.value.trim()) ? yDateEl.value : computedYesterday;
  const todayText = todayEl.value;
  const yesterdayText = yesterdayEl?.value || '';
  // 按最大 startedDateTime 优先规则校验/对齐昨日日期
  const vYesterday = validateDateAgainstStartedDateTime(yesterdayDate, yesterdayText, { strategy: 'latest' });
  const finalYesterdayDate = vYesterday.changed ? vYesterday.date : yesterdayDate;
  if(vYesterday.changed){ if(yDateEl) yDateEl.value = finalYesterdayDate; showSuccess(`已根据 startedDateTime 对齐为：${finalYesterdayDate}（昨日）`); }
  if(vYesterday.reason === 'mismatch'){ return; }
  // 若文本框为空，尝试根据日期从本地填充原始文本
  if (!todayText || !todayText.trim()) {
    try{
      const rawToday = localStorage.getItem(storageRawKey(todayDate));
      if (rawToday) {
        todayEl.value = rawToday;
        showSuccess('已自动填充当日原始文本');
      } else {
        // 当“当日”无本地文档时，自动选取最新的本地存档日期进行填充
        const dates = listStoredDates();
        const latest = dates.length ? dates[dates.length - 1] : null;
        if(latest){
          const rawLatest = localStorage.getItem(storageRawKey(latest));
          if(rawLatest){
            tdEl.value = latest;
            todayDate = latest;
            todayEl.value = rawLatest;
            showSuccess(`已自动选取最新存档：${latest}`);
            // 若昨日未选择，则跟随最新存档的前一天
            const latestPrev = getPrevDateStr(latest);
            if(yDateEl && (!yDateEl.value || !yDateEl.value.trim())){
              yDateEl.value = latestPrev;
            }
          } else {
            showError('无本地文档');
          }
        } else {
          showError('无本地文档');
        }
      }
    }catch(e){}
  }
  if (!yesterdayText || !yesterdayText.trim()) {
    try{
      const targetY = (yDateEl && yDateEl.value && yDateEl.value.trim()) ? yDateEl.value : finalYesterdayDate;
      const rawY = localStorage.getItem(storageRawKey(targetY));
      if (rawY) { yesterdayEl && (yesterdayEl.value = rawY); showSuccess('已自动填充指定日期原始文本'); } else { showError('无本地文档'); }
    }catch(e){}
  }
  let tRows = [];
  let yRows = [];
  let usedTodayLocal = false;
  let usedYesterdayLocal = false;
  const curTodayText = todayEl.value;
  const curYesterdayText = yesterdayEl?.value || '';
  if (curTodayText && curTodayText.trim()) {
    tRows = parseTextToRows(curTodayText);
    if(!tRows.length){
      try{
        const cachedToday = localStorage.getItem(storageKey(todayDate));
        if(cachedToday){
          tRows = JSON.parse(cachedToday);
          usedTodayLocal = true;
        }
      }catch(e){}
    }
  } else {
    try{
      const cachedToday = localStorage.getItem(storageKey(todayDate));
      if(cachedToday){
        tRows = JSON.parse(cachedToday);
        usedTodayLocal = true;
      }
    }catch(e){}
  }
  if (curYesterdayText && curYesterdayText.trim()) {
    yRows = parseTextToRows(curYesterdayText);
    if(!yRows.length){
      try{
        const cachedY = localStorage.getItem(storageKey(finalYesterdayDate));
        if(cachedY){
          yRows = JSON.parse(cachedY);
          usedYesterdayLocal = true;
        }
      }catch(e){}
    }
  } else {
    try{
      const cachedY = localStorage.getItem(storageKey(finalYesterdayDate));
      if(cachedY){
        yRows = JSON.parse(cachedY);
        usedYesterdayLocal = true;
      }
    }catch(e){}
  }
  if (tRows.length){
    lastTodayRows = tRows;
    const baselineWeek = getBaselineRowsForMode('week', todayDate);
    const baselineMonth = getBaselineRowsForMode('month', todayDate);
    lastPreview = sortAndEnrich(tRows, yRows, baselineWeek, baselineMonth);
    renderPreviewTable(lastPreview);
    let msg = '已根据所选日期更新预览';
    const parts = [];
    if (usedTodayLocal) parts.push('当日数据来自本地');
    if (usedYesterdayLocal) parts.push('昨日数据来自本地');
    if (parts.length) msg = parts.join('；');
    showSuccess(msg);
  }
  // 更新“最新 startedDateTime”显示
  updateDetectedTsLabels();
}

function parseAndPreview(){
  const tdEl = document.getElementById('todayDate');
  const todayTextEl = document.getElementById('todayText');
  let todayDate = tdEl.value;
  const detectedToday = detectLatestDateFromText(todayTextEl?.value || '');
  if(!todayDate && detectedToday){ tdEl.value = detectedToday; todayDate = detectedToday; showSuccess(`已识别当日日期：${detectedToday}`); }
  if(!todayDate){ showError('请先选择“当日日期”或粘贴文本以识别日期'); return; }
  const yDateEl2 = document.getElementById('yesterdayDate');
  const yesterdayTextEl2 = document.getElementById('yesterdayText');
  const detectedYesterday = detectLatestDateFromText(yesterdayTextEl2?.value || '');
  const yesterdayDate = (yDateEl2 && yDateEl2.value && yDateEl2.value.trim()) ? yDateEl2.value : (detectedYesterday || getPrevDateStr(todayDate));
  const todayText = todayTextEl.value;
  const yesterdayText = yesterdayTextEl2?.value || '';
  // 按最大 startedDateTime 优先规则校验/对齐昨日日期
  const vY2 = validateDateAgainstStartedDateTime(yesterdayDate, yesterdayText, { strategy: 'latest' });
  const finalYDate2 = vY2.changed ? vY2.date : yesterdayDate;
  if(vY2.changed){ yDateEl2 && (yDateEl2.value = finalYDate2); showSuccess(`已根据 startedDateTime 对齐为：${finalYDate2}（昨日）`); }
  if(vY2.reason === 'mismatch'){ return; }
  // 同步保存原始文本到本地
  if (todayText && todayText.trim()) { try{ localStorage.setItem(storageRawKey(todayDate), todayText); }catch(e){} }
  if (yesterdayText && yesterdayText.trim()) { try{ localStorage.setItem(storageRawKey(finalYDate2), yesterdayText); }catch(e){} }
  let tRows = [];
  if (todayText && todayText.trim()) { tRows = parseTextToRows(todayText); }
  else { try{ const cachedToday = localStorage.getItem(storageKey(todayDate)); if(cachedToday){ tRows = JSON.parse(cachedToday); } }catch(e){ tRows = []; } }
  let yRows = [];
  if(yesterdayText && yesterdayText.trim()){ yRows = parseTextToRows(yesterdayText); }
  else { try{ const cached = localStorage.getItem(storageKey(finalYDate2)); if(cached){ yRows = JSON.parse(cached); } }catch(e){ yRows = []; } }
  // 更新“最新 startedDateTime”显示
  updateDetectedTsLabels();
  try{ if (tRows && tRows.length) { localStorage.setItem(storageKey(todayDate), JSON.stringify(tRows)); refreshDateOptions(); } }catch(e){}
  try{ if (yRows && yRows.length) { localStorage.setItem(storageKey(finalYDate2), JSON.stringify(yRows)); refreshDateOptions(); } }catch(e){}
  lastTodayRows = tRows;
  const baselineWeek2 = getBaselineRowsForMode('week', todayDate);
  const baselineMonth2 = getBaselineRowsForMode('month', todayDate);
  lastPreview = sortAndEnrich(tRows, yRows, baselineWeek2, baselineMonth2);
  renderPreviewTable(lastPreview);
  showSuccess('解析完成，已生成预览');
}

function uploadLocalBackup(){
  try{
    const rawMap = {};
    const dataMap = {};
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!k) continue;
      if(k.startsWith('memberRaw:')){
        const d = k.split(':')[1];
        const value = localStorage.getItem(k);
        if(value && value.trim()) {
          rawMap[d] = value;
        }
      } else if(k.startsWith('memberData:')){
        const d = k.split(':')[1];
        const v = localStorage.getItem(k);
        try{ 
          const parsed = v ? JSON.parse(v) : [];
          if(Array.isArray(parsed) && parsed.length > 0) {
            dataMap[d] = parsed;
          }
        }catch(e){ 
          console.warn(`Invalid memberData for ${d}:`, e);
        }
      }
    }
    
    // 验证数据
    const rawCount = Object.keys(rawMap).length;
    const dataCount = Object.keys(dataMap).length;
    
    if(rawCount === 0 && dataCount === 0) {
      showInlineStatus('uploadStatus','error','❌ 没有可上传的数据，请先导入HAR文件或创建数据');
      return;
    }
    
    // 检查数据完整性
    if(rawCount === 0) {
      showInlineStatus('uploadStatus','warning','⚠️ 警告：没有原始文本数据，仅上传处理后的数据');
    } else if(dataCount === 0) {
      showInlineStatus('uploadStatus','warning','⚠️ 警告：没有处理后的数据，仅上传原始文本');
    }
    
    console.log(`准备上传数据: 原始文本=${rawCount}个日期, 处理数据=${dataCount}个日期`);
    
    const payload = { memberRaw: rawMap, memberData: dataMap, exportedAt: new Date().toISOString() };
    const dateCount = Array.from(new Set([ ...Object.keys(rawMap), ...Object.keys(dataMap) ])).length;
    const clientId = location.hostname || 'default';
    
    showInlineStatus('uploadStatus','info','正在上传数据...');
    
    // 优先同源 /api 代理（由 Pages Functions/_worker.js 转发到稳定 API 域名）
    fetch(`${API_BASE}/api/archives/upload?client_id=${encodeURIComponent(clientId)}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), mode: 'cors', cache: 'no-store'
    }).then(async (resp)=>{
      if(!resp.ok){ const t = await resp.text(); throw new Error(t || '上传失败'); }
      showInlineStatus('uploadStatus','success',`✅ 上传成功！共提交 ${dateCount} 个日期`);
      setLastSync(Date.now());
    }).catch(async (err)=>{
      console.warn('主API上传失败，尝试备用API:', err.message);
      // 回退：直接访问稳定 API 域名
      try{
        const resp2 = await fetch(`${API_BASE}/api/archives/upload?client_id=${encodeURIComponent(clientId)}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), mode: 'cors', cache: 'no-store' });
        if(!resp2.ok){ 
          const t2 = await resp2.text(); 
          let errorMsg = t2 || '上传失败';
          try {
            const errorObj = JSON.parse(t2);
            if(errorObj.detail) errorMsg = errorObj.detail;
          } catch(e) {}
          throw new Error(errorMsg);
        }
        showInlineStatus('uploadStatus','success',`✅ 上传成功！共提交 ${dateCount} 个日期`);
        setLastSync(Date.now());
      }catch(err2){
        console.error('Upload error (fallback failed):', err2);
        let finalError = '上传失败';
        if(err2 && err2.message) {
          if(err2.message.includes('缺少')) {
            finalError = '数据格式错误：' + err2.message;
          } else if(err2.message.includes('NetworkError') || err2.message.includes('fetch') || err2.message.includes('Failed to fetch')) {
            finalError = '无法连接到服务器。数据已保存在本地，可使用"导出Excel"功能备份数据。';
          } else {
            finalError = err2.message;
          }
        } else if(err && err.message) {
          if(err.message.includes('NetworkError') || err.message.includes('fetch') || err.message.includes('Failed to fetch')) {
            finalError = '无法连接到服务器。数据已保存在本地，可使用"导出Excel"功能备份数据。';
          } else {
            finalError = err.message;
          }
        }
        showInlineStatus('uploadStatus','error',`❌ ${finalError}`);
      }
    });
  }catch(e){ 
    console.error('Upload exception:', e);
    showInlineStatus('uploadStatus','error',`上传异常：${e.message || e}`); 
  }
}

function rowsHaveMeaningfulDiff(serverRows, localRows){
  try{
    const toMap = (rows) => {
      const map = new Map();
      if(!Array.isArray(rows)) return map;
      for(const r of rows){
        const key = String(r?.realName || r?.nickName || r?.userId || '');
        if(!key) continue;
        map.set(key, {
          fans: Number(r?.fansNum || 0),
          collect: Number(r?.collectNum || 0),
          like: Number(r?.likeNum || 0)
        });
      }
      return map;
    };
    const serverMap = toMap(serverRows);
    const localMap = toMap(localRows);
    if(serverMap.size !== localMap.size) return true;
    for(const [key, sval] of serverMap.entries()){
      const lval = localMap.get(key);
      if(!lval) return true;
      if(sval.fans !== lval.fans || sval.collect !== lval.collect || sval.like !== lval.like){
        return true;
      }
    }
    return false;
  }catch(e){
    return true;
  }
}

// 从 rows 数组中提取最新的 startedDateTime（优先使用，因为这是实际显示的数据）
function getMaxIsoFromRows(rows){
  if(!Array.isArray(rows) || !rows.length) return null;
  let maxTs = -Infinity;
  let maxIso = null;
  for(const r of rows){
    if(!r) continue;
    const iso = r.startedDateTime ? String(r.startedDateTime) : '';
    if(!iso || iso.startsWith('1970-01-01')) continue;
    const ts = Date.parse(iso);
    if(Number.isFinite(ts) && ts > maxTs){
      maxTs = ts;
      maxIso = iso;
    }
  }
  return maxIso;
}

function getMaxIsoFromStoredRows(dateStr){
  if(!dateStr) return null;
  try{
    const stored = localStorage.getItem(storageKey(dateStr));
    if(!stored) return null;
    const rows = JSON.parse(stored);
    if(!Array.isArray(rows) || !rows.length) return null;
    let maxTs = -Infinity;
    let maxIso = null;
    for(const r of rows){
      if(!r) continue;
      const iso = r.startedDateTime ? String(r.startedDateTime) : '';
      if(!iso || iso.startsWith('1970-01-01')) continue;
      // 按日期过滤：只考虑指定日期的数据
      const ds = iso.split('T')[0];
      if(ds !== dateStr) continue;
      const ts = Date.parse(iso);
      if(Number.isFinite(ts) && ts > maxTs){
        maxTs = ts;
        maxIso = iso;
      }
    }
    return maxIso;
  }catch(e){
    return null;
  }
}

function formatIsoForLabel(iso){
  if(!iso) return null;
  return formatDateTimeForDisplay(iso);
}

function dedupeLatestRows(rows){
  if(!Array.isArray(rows) || !rows.length) return [];
  const map = new Map();
  for(const r of rows){
    if(!r) continue;
    // 优先使用 realName，其次 userId，确保唯一性
    const realName = String(r.realName || '').trim();
    const userId = r.userId != null ? String(r.userId) : '';
    const key = realName || userId || String(r.nickName || '');
    if(!key) continue;
    
    const iso = r.startedDateTime ? String(r.startedDateTime) : '';
    let ts = 0;
    try{
      ts = iso ? Date.parse(iso) : 0;
    }catch(e){ ts = 0; }
    const prev = map.get(key);
    if(!prev || ts > prev.ts){
      map.set(key, { ts, row: r });
    }
  }
  return Array.from(map.values()).map(entry => entry.row);
}

function listDatesBetween(start, end){
  if(!start || !end) return [];
  const out = [];
  try{
    const startDate = new Date(start);
    const endDate = new Date(end);
    if(!Number.isFinite(startDate.getTime()) || !Number.isFinite(endDate.getTime())) return out;
    let cur = new Date(startDate);
    while(cur.getTime() <= endDate.getTime()){
      out.push(cur.toISOString().split('T')[0]);
      cur.setDate(cur.getDate() + 1);
    }
  }catch(e){}
  return out;
}

const pendingHistoryFetch = new Map();

async function ensureDateCoverage(options){
  const { clientId, dates, memberDataMap, rawMap, force } = options || {};
  if(!clientId || !Array.isArray(dates) || !dates.length) return;
  const unique = Array.from(new Set(dates.filter(Boolean))).sort();
  
  // 优化：先检查本地存储，减少不必要的 API 请求
  const needFetch = [];
  for(const date of unique){
    try{
      // 强制刷新时，即使本地有缓存也要重新获取
      if(force){
        needFetch.push(date);
        continue;
      }
      
      let storedRows = getStoredRowsForDate(date);
      if(!storedRows.length && memberDataMap && Array.isArray(memberDataMap[date])){
        const deduped = dedupeLatestRows(memberDataMap[date]);
        if(deduped.length){
          try{ localStorage.setItem(storageKey(date), JSON.stringify(deduped)); }catch(e){}
          storedRows = deduped;
        }
      }
      if(rawMap && rawMap[date]){
          try{ localStorage.setItem(storageRawKey(date), rawMap[date]); }catch(e){}
        }
      // 如果本地已有数据，跳过请求
      if(!storedRows.length && !pendingHistoryFetch.get(date)){
        needFetch.push(date);
      } else if(pendingHistoryFetch.get(date)){
        await pendingHistoryFetch.get(date);
      } else {
        console.log(`[ensureDateCoverage] 跳过 ${date}（本地已有缓存）`);
      }
    }catch(e){
      console.warn('ensureDateCoverage error:', date, e);
      }
      }
  
  // 优化：限制并行请求数量，避免过多请求
  if(needFetch.length > 0){
    const maxConcurrent = 3; // 降低并发数避免限流：5→3
    const toFetchNow = needFetch.slice(0, maxConcurrent);
    const toFetchLater = needFetch.slice(maxConcurrent);
    
    if(toFetchLater.length > 0){
      console.log(`[ensureDateCoverage] 分批获取：先获取 ${toFetchNow.length} 个，剩余 ${toFetchLater.length} 个稍后获取`);
    }
    const fetchPromises = toFetchNow.map(date => {
      if(pendingHistoryFetch.get(date)){
        return pendingHistoryFetch.get(date);
      }
      const promise = (async ()=>{
        try{
          const payload = await fetchHistoryRows(clientId, date);
          const histRows = Array.isArray(payload?.rows) ? dedupeLatestRows(payload.rows) : [];
          if(histRows.length){
            try{ localStorage.setItem(storageKey(date), JSON.stringify(histRows)); }catch(e){}
          }
          if(payload?.memberRaw && payload.memberRaw[date]){
            try{ localStorage.setItem(storageRawKey(date), payload.memberRaw[date]); }catch(e){}
          }
        }catch(err){
          console.warn('ensureDateCoverage history fetch failed:', date, err);
        }finally{
          pendingHistoryFetch.delete(date);
        }
      })();
      pendingHistoryFetch.set(date, promise);
      return promise;
    });
    
    // 等待当前批次请求完成（但允许部分失败）
    await Promise.allSettled(fetchPromises);
    
    // 如果有剩余日期，在后台异步获取（不阻塞主流程）
    if(toFetchLater.length > 0 && !force){
      console.log(`[ensureDateCoverage] 后台异步获取剩余 ${toFetchLater.length} 个日期...`);
      Promise.allSettled(toFetchLater.map(date => {
        if(pendingHistoryFetch.get(date)) return pendingHistoryFetch.get(date);
        const promise = (async ()=>{
          try{
            const payload = await fetchHistoryRows(clientId, date);
            const histRows = Array.isArray(payload?.rows) ? dedupeLatestRows(payload.rows) : [];
            if(histRows.length){
              try{ localStorage.setItem(storageKey(date), JSON.stringify(histRows)); }catch(e){}
            }
            if(payload?.memberRaw && payload.memberRaw[date]){
              try{ localStorage.setItem(storageRawKey(date), payload.memberRaw[date]); }catch(e){}
            }
          }catch(err){
            console.warn('ensureDateCoverage 后台获取失败:', date, err);
          }finally{
            pendingHistoryFetch.delete(date);
          }
        })();
        pendingHistoryFetch.set(date, promise);
        return promise;
      })).catch(err => {
        console.warn('[ensureDateCoverage] 后台获取失败:', err);
      });
    }
  } else {
    console.log(`[ensureDateCoverage] 所有日期已有缓存，无需请求`);
  }
}

async function fetchHistoryRows(clientId, date){
  const attempt = async (base) => {
    const timestamp = `&_t=${Date.now()}`;
    const url = `${base}/api/archives/history?client_id=${encodeURIComponent(clientId)}&date=${encodeURIComponent(date)}${timestamp}`;
    const resp = await fetch(url, { mode: 'cors', cache: 'no-store', headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' } });
    if(!resp.ok){
      const text = await resp.text();
      throw new Error(text || `历史接口失败(${resp.status})`);
    }
    return resp.json();
  };
  try{
    return await attempt('');
  }catch(e1){
    try{
      return await attempt(API_BASE || '');
    }catch(e2){
      return await attempt('https://api.dailygh4.com');
    }
  }
}

async function ensurePreviousDateData(latestDate, clientId){
  if(!latestDate) return;
  const prevDate = getPrevDateStr(latestDate);
  if(!prevDate) return;
  try{
    const cached = localStorage.getItem(storageKey(prevDate));
    if(cached){
      try{
        const arr = JSON.parse(cached);
        if(Array.isArray(arr) && arr.length) return;
      }catch(e){}
    }
  }catch(e){}
  try{

    const deduped = dedupeLatestRows(rows);

  }
}

function pullLatestBackup(){

    fetch(`${API_BASE}/api/archives/latest?client_id=${encodeURIComponent(clientId)}${timestamp}`, { mode: 'cors', cache: 'no-store', headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' } })
      .then(async (resp)=>{
        if(!resp.ok){ const t = await resp.text(); throw new Error(t || '拉取失败'); }
        return resp.json();
      }).catch(async (err)=>{
        console.log('主API失败，尝试备用API:', err.message);
        try{
          const timestamp2 = `&_t=${Date.now()}`;
          const resp2 = await fetch(`${API_BASE}/api/archives/latest?client_id=${encodeURIComponent(clientId)}${timestamp2}`, { mode: 'cors', cache: 'no-store', headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' } });
          if(!resp2.ok){ const t2 = await resp2.text(); throw new Error(t2 || '拉取失败'); }
          return resp2.json();
        }catch(err2){
          console.log('备用API失败，尝试本地存档:', err2.message);
          try{
            const resp3 = await fetch('archives/latest_localhost.json');
            if(!resp3.ok){ const t3 = await resp3.text(); throw new Error(t3 || '本地最新存档缺失'); }
            return resp3.json();
          }catch(err3){
            console.log('本地存档也失败:', err3.message);
            // 如果所有方式都失败，提供友好的错误信息
            throw new Error('无法连接到服务器，且本地存档不可用。请检查网络连接或稍后重试。');
          }
        }
      }).then(async (payload)=>{
        const rawMap = payload.memberRaw || {};
        const dataMap = payload.memberData || {};
        // 合并策略：仅补齐缺失或覆盖较旧版本，保留本地较新版本
        const serverMaxIsoMap = {};
        const unionDates = Array.from(new Set([ ...Object.keys(rawMap), ...Object.keys(dataMap) ])).sort();
        let updatedCount = 0, keptCount = 0;
        function getMaxIsoFromRowsForDate(rows, date){
          try{
            if(!Array.isArray(rows) || !rows.length || !date) return null;
            let maxTs = -Infinity; let maxIso = null;
            for(const r of rows){
              const iso = r && r.startedDateTime ? String(r.startedDateTime) : null;
              if(!iso) continue;
              const ds = iso.split('T')[0];
              if(ds !== date) continue;
              const ts = Date.parse(iso);
              if(Number.isFinite(ts) && ts > maxTs){ maxTs = ts; maxIso = iso; }
            }
            return maxIso;
          }catch(e){ return null; }
        }
        for(const d of unionDates){
          try{
            const srvRaw = rawMap[d] || '';
            const srvRowsRaw = Array.isArray(dataMap[d]) ? dataMap[d] : [];
            const srvRows = dedupeLatestRows(srvRowsRaw);
            let srvMaxIso = srvRaw ? detectMaxTsForDateFromText(srvRaw, d) : null;
            if(!srvMaxIso && srvRows.length){ srvMaxIso = getMaxIsoFromRowsForDate(srvRows, d); }
            const srvMax = srvMaxIso ? Date.parse(srvMaxIso) : null;
            if(srvMaxIso){
              serverMaxIsoMap[d] = srvMaxIso;
            }

            const locRaw = localStorage.getItem(storageRawKey(d)) || '';
            const locRowsStr = localStorage.getItem(storageKey(d));
            const locRows = locRowsStr ? (function(){ try{ return JSON.parse(locRowsStr); }catch(e){ return []; } })() : [];
            let locMaxIso = locRaw ? detectMaxTsForDateFromText(locRaw, d) : null;
            if(!locMaxIso && Array.isArray(locRows) && locRows.length){ locMaxIso = getMaxIsoFromRowsForDate(locRows, d); }
            const locMax = locMaxIso ? Date.parse(locMaxIso) : null;

            // 决策：若本地较新或同新，则保留本地；否则更新为服务器版本；若本地为空且服务器有，则写入
            const hasLocal = (!!locRaw && locRaw.trim()) || (Array.isArray(locRows) && locRows.length);
            const hasServer = (!!srvRaw && srvRaw.trim()) || (Array.isArray(srvRows) && srvRows.length);

            if(hasLocal && hasServer && locMax!=null && srvMax!=null){
              if(locMax > srvMax){ keptCount++; continue; }
              const sameTimestamp = Math.abs(locMax - srvMax) < 1;
              const rowsDifferent = rowsHaveMeaningfulDiff(srvRows, locRows);
              if(!rowsDifferent && sameTimestamp){ keptCount++; continue; }
              // 服务器较新或内容不同，覆盖
              try{ if(srvRaw && srvRaw.trim()) localStorage.setItem(storageRawKey(d), srvRaw); }catch(e){}
              try{ localStorage.setItem(storageKey(d), JSON.stringify(srvRows)); }catch(e){}
              updatedCount++; continue;
            }
            if(hasLocal && !hasServer){ keptCount++; continue; }
            if(!hasLocal && hasServer){
              try{ if(srvRaw && srvRaw.trim()) localStorage.setItem(storageRawKey(d), srvRaw); }catch(e){}
              try{ localStorage.setItem(storageKey(d), JSON.stringify(srvRows)); }catch(e){}
              updatedCount++; continue;
            }
            // 两边都没有有效数据，不做处理
          }catch(e){ /* 单个日期合并失败忽略 */ }
        }
        if(typeof showInfo==='function'){
          showInfo(`已合并服务器存档：保留本地 ${keptCount} 项，更新 ${updatedCount} 项`);
        }
        try{
          window.__latestServerMaxIso = serverMaxIsoMap;
        }catch(e){}
        // 刷新下拉并尝试切换到最新日期
        refreshDateOptions();
        let latestDate = null;
        let latestIsoFromServer = null;
        try{
          const dates = listStoredDates();
          latestDate = dates.length ? dates[dates.length - 1] : null;
          if(latestDate){
            const tdEl = document.getElementById('todayDate');
            const ydEl = document.getElementById('yesterdayDate');
            if(tdEl){ tdEl.value = latestDate; }
            if(ydEl){ ydEl.value = getPrevDateStr(latestDate); }
            fillRawTextForDate(latestDate, 'todayText');
            fillRawTextForDate(getPrevDateStr(latestDate), 'yesterdayText');
            showInfo(`已切换至 ${latestDate}`);
            latestIsoFromServer = getMaxIsoFromStoredRows(latestDate);
            const monthDates = listDatesBetween(getMonthStart(latestDate), latestDate);
            await ensureDateCoverage({
              clientId,
              dates: monthDates,
              memberDataMap: dataMap,
              rawMap
            });
          }
        }catch(e){}

        const finalizeView = () => {
        ensureNonDuplicateDates();
        autoFillFromLocal();
        updateDetectedTsLabels();
        try{
          const tdMaxEl = document.getElementById('todayMaxTs');
          const tdMaxTxt = (tdMaxEl && tdMaxEl.textContent || '').trim();
          const tdValEl = document.getElementById('todayDate');
          const tdVal = tdValEl ? tdValEl.value : '';
            const derivedMaxLocal = getMaxIsoFromStoredRows(tdVal);
            const derivedMaxServer = (window.__latestServerMaxIso || {})[tdVal];
            const displayMax = formatIsoForLabel(derivedMaxLocal || derivedMaxServer);
            if(tdMaxEl && displayMax){
              tdMaxEl.textContent = displayMax;
            }
            const finalText = (tdMaxEl && tdMaxEl.textContent || '').trim();
            if(!finalText || finalText === '—' || finalText === '-' || finalText === 'NaN'){
            showInlineStatus('pullStatus','error',`最新日期${tdVal ? ' '+tdVal : ''}内容为空或无有效 HAR 时间戳`);
          }else{
            showInlineStatus('pullStatus','success','拉取完成：已恢复最新存档');
            setLastSync(Date.now());
          }
        }catch(e){
          showInlineStatus('pullStatus','success','拉取完成：已恢复最新存档');
          setLastSync(Date.now());
        }
        };

        Promise.resolve()
          .then(()=> latestDate ? ensurePreviousDateData(latestDate, clientId) : null)
          .catch(err => console.warn('补充上一日数据失败:', err))
          .finally(finalizeView);
      }).catch(err=>{ showInlineStatus('pullStatus','error',`拉取失败：${err.message || err}`); });
  }catch(e){ showError('拉取异常'); }
}
// 新增：导出图片
async function exportImage(){
  if(!lastPreview || !lastPreview.length){ showError('请先"解析并预览"'); return; }
  const todayDate = document.getElementById('todayDate').value || new Date().toISOString().split('T')[0];
  const node = document.getElementById('preview');
  if(!node){ showError('未找到预览区域'); return; }
  
  // 防止重复点击
  const btn = document.querySelector('button[onclick="exportImage()"]');
  if(btn && btn.disabled) return;
  if(btn) btn.disabled = true;
  
  // 显示加载提示
  showSuccess('正在加载导出工具，请稍候...');
  
  try {
    // 按需加载 html2canvas
    await loadHtml2Canvas();
  } catch (err) {
    if(btn) btn.disabled = false;
    showError('导出工具加载失败：' + (err.message || '未知错误'));
    return;
  }
  
  // 确保导出时从预览顶部开始，包含表头
  node.scrollTop = 0;
  const origBG = node.style.backgroundColor;
  // 为导出PNG添加专用样式类，确保日期区间居中且上下留白一致
  node.classList.add('export-png');
  // 参照整个已显示列居中对齐：将日期区间宽度设置为表格的实际宽度，并使用左右 margin: auto 居中
  const rangeBar = node.querySelector('.range-bar');
  const tableEl = node.querySelector('table');
  const prevRangeStyle = {
    width: rangeBar ? rangeBar.style.width : '',
    display: rangeBar ? rangeBar.style.display : '',
    marginLeft: rangeBar ? rangeBar.style.marginLeft : '',
    marginRight: rangeBar ? rangeBar.style.marginRight : '',
    marginTop: rangeBar ? rangeBar.style.marginTop : '',
    marginBottom: rangeBar ? rangeBar.style.marginBottom : ''
  };
  try{
    const tw = tableEl ? Math.max(tableEl.scrollWidth, tableEl.offsetWidth, tableEl.clientWidth) : 0;
    if(rangeBar && tw > 0){
      rangeBar.style.width = tw + 'px';
      rangeBar.style.display = 'block';
      rangeBar.style.marginLeft = 'auto';
      rangeBar.style.marginRight = 'auto';
    }
  }catch(e){}
  node.style.backgroundColor = '#ffffff';
  
  // 使用元素的完整滚动宽高，避免截断内容
  const exportWidth = node.scrollWidth;
  const exportHeight = node.scrollHeight;
  
  // 移动端和微信浏览器兼容性处理
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
  
  // 更新加载提示
  showSuccess('正在生成图片，请稍候...');
  
  // 优化 scale：根据设备像素比和屏幕大小动态调整
  const devicePixelRatio = window.devicePixelRatio || 1;
  const optimalScale = isMobile 
    ? Math.min(devicePixelRatio, 1.2)  // 移动端进一步降低
    : Math.min(devicePixelRatio, 1.5);  // 桌面端也降低
  
  html2canvas(node, { 
    scale: optimalScale,  // 优化后的 scale
    useCORS: true, 
    backgroundColor: '#ffffff', 
    width: exportWidth, 
    height: exportHeight,
    allowTaint: false,
    foreignObjectRendering: false, // 禁用 foreignObject 以提高性能
    removeContainer: false, // 保留容器
    imageTimeout: 0, // 图片超时设为 0（不等待外部图片）
    ignoreElements: function(element) {
      // 忽略不可见元素以提高性能
      return element.style.display === 'none' || element.style.visibility === 'hidden';
    },
    onclone: function(clonedDoc) {
      // 确保克隆的文档中所有样式都正确应用
      const clonedNode = clonedDoc.getElementById('preview');
      if(clonedNode) {
        clonedNode.style.transform = 'none';
        clonedNode.style.position = 'relative';
      }
    }
  })
    .catch(err => {
      if(btn) btn.disabled = false;
      node.classList.remove('export-png');
      node.style.backgroundColor = origBG;
      if(rangeBar) {
        rangeBar.style.width = prevRangeStyle.width;
        rangeBar.style.display = prevRangeStyle.display;
        rangeBar.style.marginLeft = prevRangeStyle.marginLeft;
        rangeBar.style.marginRight = prevRangeStyle.marginRight;
        rangeBar.style.marginTop = prevRangeStyle.marginTop;
        rangeBar.style.marginBottom = prevRangeStyle.marginBottom;
      }
      console.error('html2canvas 错误:', err);
      if(isWeChat) {
        showError('图片生成失败，请重试。错误：' + (err.message || '未知错误'));
      } else {
        showError('导出图片失败：' + (err.message || '未知错误'));
      }
    })
    .then(canvas => {
      if(!canvas) return;
      const fileName = `高会数据_${todayDate}.png`;
      const dataUrl = canvas.toDataURL('image/png');
      
      // 微信浏览器：直接在页面显示图片，让用户长按保存
      if(isWeChat) {
        try {
          // 恢复原始样式
          node.classList.remove('export-png');
          node.style.backgroundColor = origBG;
          if(rangeBar) {
            rangeBar.style.width = prevRangeStyle.width;
            rangeBar.style.display = prevRangeStyle.display;
            rangeBar.style.marginLeft = prevRangeStyle.marginLeft;
            rangeBar.style.marginRight = prevRangeStyle.marginRight;
            rangeBar.style.marginTop = prevRangeStyle.marginTop;
            rangeBar.style.marginBottom = prevRangeStyle.marginBottom;
          }
          
          // 移除之前可能存在的导出图片容器
          const existingExport = document.getElementById('wechat-export-image');
          if(existingExport) {
            existingExport.remove();
          }
          
          // 创建图片显示容器
          const exportContainer = document.createElement('div');
          exportContainer.id = 'wechat-export-image';
          exportContainer.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; box-sizing:border-box; overflow:auto;';
          
          const img = document.createElement('img');
          img.src = dataUrl;
          img.style.cssText = 'max-width:100%; max-height:85vh; height:auto; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.5); display:block;';
          img.alt = fileName;
          img.setAttribute('crossorigin', 'anonymous');
          
          // 确保图片加载完成
          img.onload = function() {
            console.log('微信导出：图片加载成功');
          };
          img.onerror = function(e) {
            console.error('微信导出：图片加载失败', e);
            showError('图片生成失败，请重试');
            exportContainer.remove();
          };
          
          const tip = document.createElement('div');
          tip.textContent = '长按图片保存到相册';
          tip.style.cssText = 'color:#fff; font-size:16px; margin-top:20px; padding:12px 24px; background:rgba(76,110,245,0.8); border-radius:24px; font-weight:500;';
          
          const closeBtn = document.createElement('div');
          closeBtn.textContent = '✕ 关闭';
          closeBtn.style.cssText = 'position:absolute; top:20px; right:20px; color:#fff; font-size:18px; padding:10px 20px; background:rgba(255,255,255,0.3); border-radius:20px; cursor:pointer; user-select:none;';
          closeBtn.onclick = function() {
            exportContainer.remove();
            document.body.style.overflow = '';
          };
          closeBtn.ontouchstart = function() {
            exportContainer.remove();
            document.body.style.overflow = '';
          };
          
          exportContainer.appendChild(img);
          exportContainer.appendChild(tip);
          exportContainer.appendChild(closeBtn);
          document.body.appendChild(exportContainer);
          
          // 点击背景关闭
          exportContainer.onclick = function(e) {
            if(e.target === exportContainer) {
              exportContainer.remove();
              document.body.style.overflow = '';
            }
          };
          
          // 防止滚动
          document.body.style.overflow = 'hidden';
          
          console.log('微信导出：图片容器已创建，dataUrl长度:', dataUrl.length);
          return;
        } catch(e) {
          console.error('微信导出异常:', e);
          showError('导出失败：' + (e.message || '未知错误'));
          node.classList.remove('export-png');
          node.style.backgroundColor = origBG;
          return;
        }
      }
      
      // 移动端使用不同的下载方式
      if(isMobile) {
        // 移动端：优先尝试下载，如果失败则打开新窗口显示图片
        canvas.toBlob(function(blob) {
          if(!blob) {
            showError('导出图片失败，请重试');
            return;
          }
          const url = URL.createObjectURL(blob);
          
          // 尝试创建下载链接
          try {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = url;
            link.style.display = 'none';
            document.body.appendChild(link);
            
            // 触发点击（在用户手势事件中调用，应该可以工作）
            const clickEvent = new MouseEvent('click', {
              bubbles: true,
              cancelable: true,
              view: window
            });
            link.dispatchEvent(clickEvent);
            
            // 延迟清理
            setTimeout(() => {
              document.body.removeChild(link);
              URL.revokeObjectURL(url);
            }, 100);
            
            // 如果下载失败，打开新窗口显示图片（用户可长按保存）
            setTimeout(() => {
              const imgWindow = window.open();
              if(imgWindow) {
                imgWindow.document.write(`<html><head><title>${fileName}</title></head><body style="margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f0f0f0;"><img src="${url}" style="max-width:100%; height:auto;" alt="${fileName}" /></body></html>`);
                imgWindow.document.close();
                showSuccess('图片已打开，请长按图片保存');
              } else {
                // 如果弹窗被阻止，直接显示图片URL
                showSuccess('请长按下方链接保存图片：<br><a href="' + url + '" download="' + fileName + '" style="color:#4c6ef5; text-decoration:underline;">点击下载图片</a>');
              }
            }, 500);
          } catch(e) {
            // 如果下载失败，打开新窗口显示图片
            const imgWindow = window.open();
            if(imgWindow) {
              imgWindow.document.write(`<html><head><title>${fileName}</title></head><body style="margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f0f0f0;"><img src="${url}" style="max-width:100%; height:auto;" alt="${fileName}" /></body></html>`);
              imgWindow.document.close();
              showSuccess('图片已打开，请长按图片保存');
            } else {
              // 如果弹窗被阻止，使用 data URL
              const dataUrl = canvas.toDataURL('image/png');
              const imgWindow = window.open();
              if(imgWindow) {
                imgWindow.document.write(`<html><head><title>${fileName}</title></head><body style="margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f0f0f0;"><img src="${dataUrl}" style="max-width:100%; height:auto;" alt="${fileName}" /></body></html>`);
                imgWindow.document.close();
                showSuccess('图片已打开，请长按图片保存');
              } else {
                showError('无法打开图片，请检查浏览器弹窗设置');
              }
            }
          }
        }, 'image/png');
      } else {
        // 桌面端：使用 toDataURL
        const link = document.createElement('a');
      link.download = fileName;
      link.href = canvas.toDataURL('image/png');
        link.style.display = 'none';
        document.body.appendChild(link);
      link.click();
        document.body.removeChild(link);
      showSuccess(`已导出图片：${fileName}`);
      }
    })
    .catch(e => { showError('导出图片失败：' + (e && e.message ? e.message : e)); })
    .finally(() => {
      node.style.backgroundColor = origBG;
      node.classList.remove('export-png');
      // 还原日期区间样式
      if(rangeBar){
        rangeBar.style.width = prevRangeStyle.width || '';
        rangeBar.style.display = prevRangeStyle.display || '';
        rangeBar.style.marginLeft = prevRangeStyle.marginLeft || '';
        rangeBar.style.marginRight = prevRangeStyle.marginRight || '';
        rangeBar.style.marginTop = prevRangeStyle.marginTop || '';
        rangeBar.style.marginBottom = prevRangeStyle.marginBottom || '';
      }
    });
