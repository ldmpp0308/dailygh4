  <style>
    body { font-family: Inter, system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f6f7fb; margin:0; }
    .container { max-width: 1080px; margin: 0 auto; background:#fff; border-radius: 12px; box-shadow: 0 8px 8px rgba(0,0,0,0.06); padding: 50px 8px 20px; position: relative; }
    h1 { font-size: 24px; margin: 0; color:#111; letter-spacing: 1px; line-height: 1.4; position: relative; }
    .desc { color:#616a76; font-size: 14px; margin-top: 6px; margin-bottom: 0; line-height: 1.8; }
    .container::before { content:""; position:absolute; top:0; left:0; right:0; height: 30px; border-top-left-radius:12px; border-top-right-radius:12px; background: linear-gradient(90deg, #8e73ff, #c3a8ff, #6f8af8); }
    /* Page header cosmetics */
    .page-header { display:flex; align-items:center; gap:14px; padding: 0 0 0px; border-bottom: none; margin-bottom: 0px; }
    .header-icon { width:44px; height:44px; border-radius:10px; background: linear-gradient(135deg, #7c4dff, #4c6ef5); box-shadow: 0 8px 20px rgba(76,110,245,0.25); display:flex; align-items:center; justify-content:center; color:#fff; }
    .header-icon svg { width:22px; height:22px; }
    .title-wrap { flex:1; }
    .title-wrap h1::after { content:""; position:absolute; left:0; bottom:-8px; width:72px; height:3px; border-radius:2px; background: linear-gradient(90deg, #8e73ff, #c3a8ff, #6f8af8); opacity:0.82; }
    /* 隐藏标题下的说明文本 */
    .title-wrap .desc { display: none; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background:#fafafa; border:1px solid #eee; border-radius:10px; padding:12px; }
    label { display:block; font-size: 13px; color:#333; margin-bottom:6px; }
    input[type=date] { width: 100%; box-sizing: border-box; padding:8px 10px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
    textarea { width: 100%; min-height: 180px; box-sizing: border-box; padding:10px; border:1px solid #ddd; border-radius:10px; font-size:13px; resize: vertical; }
    /* 表格样式与美化 */
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #b28cff; color: #fff; font-weight: 600; white-space: nowrap; text-align: center; }
    th, td { padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 13px; line-height: 1.35; border-right: 1px solid #e0e0e0; text-align: center; white-space: nowrap; width: auto; }
    thead th:last-child, tbody td:last-child { border-right: none; }
    /* 偶数行浅灰底色（以行序号/排名为准） */
    .zebra-even td { background-color: #efefef; }
    /* 增长用红色，下降用绿色 */
    .num-pos { color: #c62828; font-weight: 600; }
    .num-neg { color: #2e7d32; font-weight: 600; }
    .range-bar { text-align:center; color:#555; font-size:13px; margin: 0px 0 8px !important; display:block; width:100%; }
    #preview .range-bar { text-align: center !important; }
    /* 导出 PNG 时：日期区间整体居中，上下留白间距一致 */
    #preview.export-png .range-bar { margin: 0px 0 8px !important; text-align: center !important; }
    /* 统一保留的样式，去除重复的 table/th,td 定义 */
    .tab-switcher { display:flex; gap:8px; margin: 12px 0; background:#f3f5fb; padding:8px; border-radius:10px; }
    .tab-switcher button { flex:1; border:none; background:transparent; padding:10px 14px; border-radius:8px; font-size:15.5px; font-weight:600; color:#475569; cursor:pointer; transition:background .2s ease, color .2s ease; }
    .tab-switcher button.active { background:#ffffff; color:#1e293b; box-shadow:0 6px 18px rgba(76,110,245,0.12); }
    .tab-panel { display:none; margin-top: -4px; }
    .tab-panel.active { display:block; }
    .auto-card { background:#fafafa; border:1px solid #e5e7eb; border-radius:10px; padding:16px; margin-bottom:16px; display:flex; flex-direction:column; gap:8px; }
    .auto-card-header { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px; }
    .auto-card-title { font-size:18px; font-weight:600; color:#1f2937; }
    .auto-card-desc { font-size:13px; color:#6b7280; margin-top:-10px; }
    .auto-card-desc-row { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }

    .auto-preview { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:12px; }
    .auto-preview .muted { text-align:center; padding:20px 0; }
    .auto-actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .auto-refresh-btn { background:#4c6ef5; color:#fff; border:none; border-radius:8px; padding:8px 14px; font-weight:600; cursor:pointer; }
    .auto-refresh-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .actions { display:flex; gap:10px; margin-top: 8px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }
    button { padding: 8px 14px; border: none; border-radius: 8px; font-weight: 600; cursor:pointer; }
    .btn-primary { background: #4c6ef5; color:#fff; }
    .btn-secondary { background:#20c997; color:#fff; }
    .btn-light { background:#f1f3f5; color:#333; }

    .msg.error { background:#fff5f5; color:#c92a2a; border:1px solid #ffe3e3; }
    .msg.success { background:#f4fce3; color:#2b8a3e; border:1px solid #e9fac8; }
    .muted { color:#868e96; font-size:12px; }
    .icon { width: 16px; height: 16px; margin-right: 4px; vertical-align: -1px; font-size: 16px; }

    /* 手机端统一：左右12px、底部24px、顶部50px */
    @media (max-width: 640px){
      .container { padding: 50px 12px 24px; }
    }
    .flame-icon { display: inline-block; margin-left: 4px; font-size: 14px; line-height: 1; vertical-align: middle; }
    /* 涨幅单元格：文本居中，火焰固定在最左侧，不遮挡文字 */
    .growth-cell {
      position: relative;
      display: block;
      width: 100%;
      text-align: center;
      /* 预留左右内边距，保证居中视觉不偏移，同时避免文本与火焰重叠
         使用 max() 适配移动端 emoji 真实宽度 */
      padding-left: max(18px, 1.6em);
      padding-right: 18px;
      box-sizing: border-box;
    }
    .growth-cell .flame-left {
      position: absolute;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      /* 覆盖通用火焰样式中的左外边距，确保贴近列最左侧 */
      margin-left: 0;
    }
    .flame-icon { font-size: 14px; line-height: 1; }
    /* 导出 PNG 时进一步扩大左侧预留，避免手机端遮挡 */
    #preview.export-png .growth-cell { padding-left: max(26px, 2em) !important; }
    #preview.export-png .growth-cell .flame-left { left: 4px; }
    /* 导出 PNG 时文本居中、内容完整：预览区域不裁剪且所有单元格居中 */
    #preview { overflow: visible; }
    #preview table th, #preview table td { text-align: center !important; }
    /* PNG 导出同步说明留白：下方间距加长 */
    #preview.export-png .preview-notes { margin: 12px 0 18px !important; }
    /* 头像网格：两排共14个，7列布局 */
    .avatar-grid { margin-top: 12px; margin-bottom: 4px; display: grid; grid-template-columns: repeat(7, 1fr); column-gap: 4px; row-gap: 8px; }
    .avatar-item { position: relative; aspect-ratio: 1 / 1; border-radius: 10px; overflow: hidden; background: linear-gradient(135deg, #7c4dff, #b28cff, #4c6ef5); padding: 1px; display: block; text-decoration: none; color: inherit; cursor: pointer; }
    .avatar-item img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 9px; background-color: #fff; }
    .avatar-name { position: absolute; left: 50%; bottom: 3px; transform: translateX(-50%); padding: 2px 6px; font-size: 12px; line-height: 1.4; color: #fff; background: rgba(0,0,0,0.38); border-radius: 6px; white-space: nowrap; }
    /* 手机端同步样式：日期区间与说明留白在小屏一致 */
    @media (max-width: 640px){
      .range-bar { margin: 0px 0 8px !important; text-align: center !important; }
      #preview.export-png .range-bar { margin-top: 0px !important; margin-bottom: 8px !important; }
      .preview-notes { margin: 12px 0 18px !important; }
      #preview.export-png .preview-notes { margin-bottom: 32px !important; }
      /* 手机端额外加大左边距，保证 emoji 不压到文本 */
      .growth-cell { padding-left: max(22px, 1.8em); padding-right: 16px; }
      #preview.export-png .growth-cell { padding-left: max(28px, 2.2em) !important; }
      #preview.export-png .growth-cell .flame-left { left: 4px; }
      /* 手机端头像姓名：缩小字号，不换行显示并做超长省略 */
      .avatar-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: calc(100% - 12px); }
    }
    /* 页脚 LOGO：居中显示，移动端与桌面端自适应宽度 */
    .footer-logo { margin-top: 16px; margin-bottom: 8px; text-align: center; }
    .footer-logo img { display: block; margin: 0 auto; width: min(420px, 86vw); height: auto; max-width: 100%; }
    .footer-logo .logo-fallback { display: none; font-size: 13px; color: #444; opacity: 0.75; }
    @media (max-width: 640px){
      .footer-logo img { width: min(360px, 86vw); }
    }
  </style>

<body>
  <div class="container">
    <div class="page-header">
      <div class="title-wrap">
        <h1>🎀 高会排行榜</h1>
        <div class="desc">粘贴当日与前一日的代码文本，系统将解析出 姓名/收藏/点赞/粉丝 数据，按粉丝数降序排名，并生成表头为中文的Excel，同时新增"排名变化"、"距上一名"和"今日涨幅"三列（今日涨幅为与指定日期粉丝数的差值）。</div>
        <div id="apiStatus" style="margin: 8px 0; padding: 6px 10px; border-radius: 6px; font-size: 12px; display: none;">
          <span id="apiStatusIcon">🔄</span> <span id="apiStatusText">检查API连接状态...</span>
        </div>
        <div id="avatarGrid" class="avatar-grid" aria-label="成员头像展示"></div>
      </div>
    </div>
    </div>

    <div class="tab-switcher" role="tablist" aria-label="模式切换">
      <button type="button" id="tab-auto-btn" class="active" data-tab="auto" aria-selected="true">自动刷新</button>
      <button type="button" id="tab-manual-btn" data-tab="manual" aria-selected="false">手动模式</button>
    </div>

    <div id="tab-auto" class="tab-panel active" role="tabpanel" aria-labelledby="tab-auto-btn">
      <div class="auto-card">
        <div class="auto-card-header" style="justify-content:space-between;">
          <div class="auto-card-title">自动刷新视图</div>
          <div class="auto-actions">
            <button type="button" class="auto-refresh-btn" id="autoRefreshBtn" onclick="refreshAutoTab(true)">立即刷新</button>
            <button type="button" class="btn-secondary" onclick="exportAutoImage()">导出图片</button>
          </div>
        </div>
        <div class="auto-card-desc-row">
          <div class="auto-card-desc">自动拉取服务器最新榜单数据</div>
        </div>
        <div class="auto-meta">
          <span>最新日期：<strong id="autoLatestDate">—</strong></span>
          <span>对比日期：<strong id="autoPrevDate">—</strong></span>
          <span>上次刷新：<strong id="autoLastSync">—</strong></span>
          <span class="auto-status" id="autoStatusText"></span>
        </div>
      </div>
      <div class="actions" style="align-items:center; margin-bottom:8px; margin-top:8px;">
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="checkbox" id="autoToggleCollect" onchange="refreshAutoTableDisplay()" /> 收藏数
        </label>
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="checkbox" id="autoToggleLike" onchange="refreshAutoTableDisplay()" /> 点赞数
        </label>
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="checkbox" id="autoToggleFans" checked onchange="refreshAutoTableDisplay()" /> 粉丝数
        </label>
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="checkbox" id="autoToggleWeekGrowth" onchange="refreshAutoTableDisplay()" /> 本周涨幅
        </label>
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="checkbox" id="autoToggleMonthGrowth" onchange="refreshAutoTableDisplay()" /> 本月涨幅
        </label>
      </div>
      <div id="autoPreview" class="auto-preview">
        <div class="muted">正在等待数据...</div>
      </div>
    </div>

    <div id="tab-manual" class="tab-panel" role="tabpanel" aria-labelledby="tab-manual-btn">
    <div class="grid">
      <div class="card">
        <label>当日日期</label>
        <input type="date" id="todayDate" />
        <label style="margin-top:8px;">快速选择已有日期（当日）</label>
        <select id="todayDateSelect"><option value="">— 选择存档日期 —</option></select>
        <button class="btn-light" onclick="clearDateStorageByDate('today')" style="margin-left:8px;">清空该日期存档</button>
        <label style="margin-top:8px;">当日代码文本</label>
        <div class="muted" style="margin:4px 0 6px; font-size:12px;">识别到最晚 startedDateTime：<span id="todayMaxTs" style="display:block; margin-top:2px; font-weight:600; color:#333;">—</span></div>
        <textarea id="todayText" placeholder="粘贴当日抓取到的HAR或接口JSON……"></textarea>
        <div class="actions" style="margin-top:8px;">
          <button class="btn-light" onclick="selectAllText('todayText')">全选当日代码</button>
        </div>
      </div>
      <div class="card">
        <label>昨日日期</label>
        <input type="date" id="yesterdayDate" />
        <label style="margin-top:8px;">快速选择已有日期（昨日）</label>
        <select id="yesterdayDateSelect"><option value="">— 选择存档日期 —</option></select>
        <button class="btn-light" onclick="clearDateStorageByDate('yesterday')" style="margin-left:8px;">清空昨日日期存档</button>
        <label style="margin-top:8px;">昨日代码文本</label>
        <div class="muted" style="margin:4px 0 6px; font-size:12px;">识别到最晚 startedDateTime：<span id="yesterdayMaxTs" style="display:block; margin-top:2px; font-weight:600; color:#333;">—</span></div>
        <textarea id="yesterdayText" placeholder="若本地没有存档，可粘贴昨日的HAR或JSON用于对比……"></textarea>
        <div class="actions" style="margin-top:8px;">
          <button class="btn-light" onclick="selectAllText('yesterdayText')">全选昨日代码</button>
        </div>
      </div>
      </div>
      <!-- 已按你的要求删除“昨日”输入卡片（日期/下拉/文本/全选按钮/说明），逻辑仍默认使用当日-1作为对比日期 -->

    <div class="actions">
      <button class="btn-primary" onclick="parseAndPreview()">解析并预览</button>
      <button class="btn-primary" onclick="clearLocalArchives()" title="清除所有以 memberRaw:/memberData: 为前缀的本地缓存">清空本地存档</button>
      <button class="btn-secondary" onclick="exportExcel()">导出Excel</button>
      <button class="btn-secondary" onclick="exportImage()">导出图片</button>
      <button class="btn-light" onclick="saveTodayToLocal()">保存今日数据到本地</button>
    </div>
    <div class="actions" style="align-items:center;">
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleCollect" /> 收藏数
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleLike" /> 点赞数
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleFans" checked /> 粉丝数
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleWeekGrowth" /> 本周涨幅
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="toggleMonthGrowth" /> 本月涨幅
      </label>
      <label style="display:flex; align-items:center; gap:6px;">
        <input type="checkbox" id="followTextDate" /> 跟随文本日期
      </label>
    </div>


    <div id="msgError" class="msg error"></div>
    <div id="msgSuccess" class="msg success"></div>
    <div id="msgInfo" class="msg info"></div>

    <div id="preview" style="margin-top: 12px;"></div>
    
    <!-- 页面底部的存档操作区 -->
    <hr style="margin:16px 0; border:none; border-top:1px solid #eee;"/>
    <div class="actions" style="margin-top:0; gap:8px;">
      <button class="btn-light" onclick="exportLocalBackup()">导出本地存档</button>
      <button class="btn-light" onclick="triggerImport()">导入本地存档</button>
      <button class="btn-light" onclick="uploadLocalBackup()">上传到服务器</button>
      <button class="btn-light" onclick="pullLatestBackup()">拉取服务器最新</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" />
    </div>
    
    <!-- 状态提示区域 -->
    <div class="status-area" style="margin-top: 12px; min-height: 24px; display: flex; flex-direction: column; gap: 4px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <span id="uploadStatus" class="inline-msg" aria-live="polite"></span>
        <span id="pullStatus" class="inline-msg" aria-live="polite"></span>
      </div>
      <span id="lastSyncTime" style="font-size:12px; color:var(--text-muted);">最后同步时间：—</span>
    </div>

    <!-- 页脚LOGO（图片加载失败时显示回退文本） -->
    <div class="footer-logo" role="contentinfo" aria-label="站点Logo">
      <img src="assets/tf-family-logo-dark.png" alt="TF FAMILY LOGO" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';" />
      <div class="logo-fallback" aria-hidden="true">TF FAMILY · TF家族</div>
    </div>
  </div>

<script>
// 版本标识（控制台输出，便于验证部署）
  console.log('%c🎀 高会排行榜 v2026.01.23.2130', 'color: #8e73ff; font-size: 16px; font-weight: bold;');
console.log('Build time:', new Date().toISOString());

// ==================== 按需加载资源管理 ====================
// html2canvas 按需加载
let html2canvasPromise = null;
function loadHtml2Canvas() {
  if (typeof html2canvas !== 'undefined') {
    return Promise.resolve(html2canvas);
  }
  if (html2canvasPromise) {
    return html2canvasPromise;
  }
  html2canvasPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'vendor/html2canvas.min.js?v=20251112';
    script.async = true;
    script.onload = () => {
      if (typeof html2canvas !== 'undefined') {
        resolve(html2canvas);
      } else {
        reject(new Error('html2canvas 加载失败'));
      }
    };
    script.onerror = () => reject(new Error('html2canvas 脚本加载失败'));
    document.head.appendChild(script);
  });
  return html2canvasPromise;
}

// xlsx.js 按需加载
let xlsxPromise = null;
function loadXLSX() {
  if (typeof XLSX !== 'undefined') {
    return Promise.resolve(XLSX);
  }
  if (xlsxPromise) {
    return xlsxPromise;
  }
  xlsxPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'vendor/xlsx.full.min.js?v=20251112';
    script.async = true;
    script.onload = () => {
      if (typeof XLSX !== 'undefined') {
        resolve(XLSX);
      } else {
        reject(new Error('XLSX 加载失败'));
      }
    };
    script.onerror = () => reject(new Error('XLSX 脚本加载失败'));

  // ==================== 智能缓存管理系统 ====================
  const CacheManager = {
    // 缓存元数据键
    META_KEY: 'cache_meta',
    // 缓存有效期（毫秒）：5分钟
    CACHE_TTL: 5 * 60 * 1000,
    
    // 获取缓存元数据
    getMeta() {
      try {
        const metaStr = localStorage.getItem(this.META_KEY);
        if (!metaStr) return null;
        return JSON.parse(metaStr);
      } catch (e) {
        return null;
      }
    },
    
    // 保存缓存元数据
    setMeta(meta) {
      try {
        localStorage.setItem(this.META_KEY, JSON.stringify({
          ...meta,
          lastUpdate: Date.now()
        }));
      } catch (e) {
        console.warn('[CacheManager] 保存元数据失败:', e);
      }
    },
    
    // 检查缓存是否有效
    isCacheValid(meta) {
      if (!meta || !meta.lastUpdate) return false;
      const age = Date.now() - meta.lastUpdate;
      return age < this.CACHE_TTL;
    },
    
    // 获取缓存的日期列表
    getCachedDates() {
      try {
        const dates = new Set();
        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (!key) continue;
          if (key.startsWith('memberData:') || key.startsWith('memberRaw:')) {
            const date = key.split(':')[1];
            if (date && /^\d{4}-\d{2}-\d{2}$/.test(date)) {
              dates.add(date);
            }
          }
        }
        return Array.from(dates).sort();
      } catch (e) {
        return [];
      }
    },
    
    // 从缓存加载数据（立即返回，用于快速显示）
    loadFromCache() {
      const cachedDates = this.getCachedDates();
      if (!cachedDates.length) return null;
      
      const latestDate = cachedDates[cachedDates.length - 1];
      const memberData = {};
      const rawMap = {};
      
      // 加载所有缓存的数据
      for (const date of cachedDates) {
        try {
          const dataKey = `memberData:${date}`;
          const rawKey = `memberRaw:${date}`;
          const dataStr = localStorage.getItem(dataKey);
          const rawStr = localStorage.getItem(rawKey);
          
          if (dataStr) {
            try {
              memberData[date] = JSON.parse(dataStr);
            } catch (e) {
              console.warn(`[CacheManager] 解析 ${date} 的 memberData 失败:`, e);
            }
          }
          
          if (rawStr && rawStr.trim()) {
            rawMap[date] = rawStr;
          }
        } catch (e) {
          console.warn(`[CacheManager] 加载 ${date} 的缓存失败:`, e);
        }
      }
      
      return {
        latestDate,
        memberData,
        rawMap,
        cachedDates
      };
    },
    
    // 修复 memberRaw 类型问题：兼容 Object 和 string
    normalizeMemberRaw(memberRaw) {
      if (!memberRaw) return null;
      
      // 如果是字符串，直接返回
      if (typeof memberRaw === 'string' && memberRaw.trim()) {
        return memberRaw.trim();
      }
      
      // 如果是对象，尝试转换为字符串
      if (typeof memberRaw === 'object') {
        try {
          // 如果对象有日期键，取最新日期的值
          if (Object.keys(memberRaw).length > 0) {
            const dates = Object.keys(memberRaw).sort();
            const latestDate = dates[dates.length - 1];
            const value = memberRaw[latestDate];
            
            // 如果值本身是字符串，返回
            if (typeof value === 'string' && value.trim()) {
              return value.trim();
            }
            
            // 如果值是对象，转换为 JSON 字符串
            if (typeof value === 'object') {
              return JSON.stringify(value);
            }
          }
          
          // 如果对象本身是 HAR 格式，转换为 JSON 字符串
          if (memberRaw.log && memberRaw.log.entries) {
            return JSON.stringify(memberRaw);
          }
          
          // 其他情况，尝试转换为 JSON 字符串
          return JSON.stringify(memberRaw);
        } catch (e) {
          console.warn('[CacheManager] 转换 memberRaw 对象失败:', e);
          return null;
        }
      }
      
      return null;
    },
    
    // 保存数据到缓存
    saveToCache(memberData, rawMap) {
      let savedCount = 0;
      let rawSavedCount = 0;
      
      // 保存 memberData
      for (const [date, rows] of Object.entries(memberData || {})) {
        if (Array.isArray(rows) && rows.length) {
          try {
            localStorage.setItem(`memberData:${date}`, JSON.stringify(rows));
            savedCount++;
          } catch (e) {
            console.warn(`[CacheManager] 保存 ${date} 的 memberData 失败:`, e);
          }
        }
      }
      
      // 保存 memberRaw（修复类型问题）
      for (const [date, raw] of Object.entries(rawMap || {})) {
        const normalized = this.normalizeMemberRaw(raw);
        if (normalized) {
          try {
            localStorage.setItem(`memberRaw:${date}`, normalized);
            rawSavedCount++;
          } catch (e) {
            console.warn(`[CacheManager] 保存 ${date} 的 memberRaw 失败:`, e);
          }
        } else {
          console.warn(`[CacheManager] ${date} 的 memberRaw 无效，未保存`);
        }
      }
      
      // 更新元数据
      const cachedDates = this.getCachedDates();
      this.setMeta({
        latestDate: cachedDates.length ? cachedDates[cachedDates.length - 1] : null,
        dates: cachedDates,
        savedCount,
        rawSavedCount
      });
      
      console.log(`[CacheManager] ✅ 已保存 ${savedCount} 个日期的 memberData 和 ${rawSavedCount} 个日期的 memberRaw 到缓存`);
      
      return { savedCount, rawSavedCount };
    },
    
    // 检查哪些日期需要更新（增量更新）
    getDatesToUpdate(serverDates, cachedDates) {
      const serverSet = new Set(serverDates || []);
      const cachedSet = new Set(cachedDates || []);
      
      // 需要更新的日期：服务器有但缓存没有的，或者服务器日期列表中的最新日期
      const toUpdate = [];
      
      // 添加服务器有但缓存没有的日期
      for (const date of serverDates || []) {
        if (!cachedSet.has(date)) {
          toUpdate.push(date);
        }
      }
      
      // 如果服务器有新的日期（比缓存的最新日期更新），也要更新
      if (serverDates && serverDates.length > 0) {
        const latestServerDate = serverDates[serverDates.length - 1];
        const latestCachedDate = cachedDates && cachedDates.length > 0 ? cachedDates[cachedDates.length - 1] : null;
        
        if (!latestCachedDate || latestServerDate > latestCachedDate) {
          if (!toUpdate.includes(latestServerDate)) {
            toUpdate.push(latestServerDate);
          }
        }
      }
      
      return toUpdate;
    }
  };
  
  // 将 CacheManager 暴露到全局，供其他函数使用
  window.CacheManager = CacheManager;

function initTabSwitcher(){

    buttons.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const tab = btn.getAttribute('data-tab');
        activateTab(tab);
      });
    });
    // 延迟激活自动标签页，让页面先完全渲染
    // 使用 requestIdleCallback 或 setTimeout 进一步延迟数据加载
    // 优化：立即激活自动标签页，减少初始延迟
    // 先显示加载状态，然后立即开始加载数据
    const activateAutoTab = () => {
      // 立即显示加载状态
      const container = document.getElementById('autoPreview');
      if(container && !container.querySelector('table')){
        container.innerHTML = '<div class="muted" style="padding:20px; text-align:center;">正在加载数据...</div>';
      }
      // 优化：首次加载时使用缓存优先策略，不强制从服务器获取
      // 这样有缓存时可以立即显示，后台再异步更新
      activateTab('auto', { force: false, suppressScroll: true });
    };

    // 减少延迟：从 800-1000ms 降至 100ms，让用户更快看到内容
    // 注意：移动端activateAutoTab内部会检测并直接返回，不会触发自动刷新
    if (window.requestIdleCallback) {
      requestIdleCallback(activateAutoTab, { timeout: 100 });
    } else {
      setTimeout(activateAutoTab, 100);
    }
  }catch(e){
    console.error('initTabSwitcher error', e);
  }
}

function activateTab(tab, options){
  if(!tab) return;
  // 优化：切换标签时立即显示加载状态
  if(tab === 'auto'){
    const container = document.getElementById('autoPreview');
    if(container && !container.querySelector('table')){
      container.innerHTML = '<div class="muted" style="padding:20px; text-align:center;">正在加载数据...</div>';
    }
  }
  if(currentTab === tab && tab === 'auto' && !options?.force){
    refreshAutoTab();
    return;
  }
  currentTab = tab;
  const panels = document.querySelectorAll('.tab-panel');
  panels.forEach(panel=>{
    const isMatch = panel.id === `tab-${tab}`;
    panel.classList.toggle('active', isMatch);
    if(isMatch){
      panel.removeAttribute('hidden');
    }else{
      panel.setAttribute('hidden','');
    }
  });
  const buttons = document.querySelectorAll('.tab-switcher button[data-tab]');
  buttons.forEach(btn=>{
    const isMatch = btn.getAttribute('data-tab') === tab;
    btn.classList.toggle('active', isMatch);
    btn.setAttribute('aria-selected', isMatch ? 'true' : 'false');
  });
  if(tab === 'auto'){
    // 优化：先尝试使用缓存快速显示，后台再更新
    // 如果用户手动点击刷新按钮，则强制从服务器获取最新数据
    // 否则先显示缓存（如果有），后台异步更新
    if(options?.force){
      // 用户手动点击刷新，强制从服务器获取
      refreshAutoTab(true);
    } else {
      // 自动切换或首次加载，先尝试使用缓存，后台更新
      refreshAutoTab(false);
    }
  }
}

function formatNumberDisplay(val, opts){
  if(val === '' || val == null) return '';
  const num = Number(val);
  if(!Number.isFinite(num)) return '';
  if(opts?.withSign){
    if(num === 0) return '-';
    return (num > 0 ? '+' : '') + num.toLocaleString('zh-CN');
  }
  if(opts?.dashWhenZero && num === 0) return '-';
  return num.toLocaleString('zh-CN');
}

  const showLike = document.getElementById('autoToggleLike')?.checked || false;

  const showWeekGrowth = document.getElementById('autoToggleWeekGrowth')?.checked || false;
  const showMonthGrowth = document.getElementById('autoToggleMonthGrowth')?.checked || false;

  const maxFans = Math.max(...rows.map(r=>Number(r.粉丝数||0)));

  const totalItems = rows.length;
  const totalPages = Math.ceil(totalItems / itemsPerPage);

  // 确保页码在有效范围内
  if(autoTableCurrentPage > totalPages) autoTableCurrentPage = totalPages;
  if(autoTableCurrentPage < 1) autoTableCurrentPage = 1;

  const startIndex = (autoTableCurrentPage - 1) * itemsPerPage;
  const endIndex = Math.min(startIndex + itemsPerPage, totalItems);
  const currentPageRows = rows.slice(startIndex, endIndex);

  // 分页控件HTML
  const paginationHtml = totalPages > 1 ? `
    <div class="pagination" style="display:flex; justify-content:center; align-items:center; gap:12px; margin:12px 0; font-size:14px;">

  container.innerHTML = rangeHtml + paginationHtml + html + paginationHtml + noteHtml;

    } else {
      // 桌面端：使用 toDataURL
    const link = document.createElement('a');

async function refreshAutoTab(force){
  // 强制刷新时，即使正在加载也要重新开始
  if(autoTabState.loading && !force){
    return;
  }
  // 强制刷新时，重置加载状态
  if(force){
    autoTabState.loading = false;
  }
  const btn = document.getElementById('autoRefreshBtn');
  const latestDateEl = document.getElementById('autoLatestDate');
  const prevDateEl = document.getElementById('autoPrevDate');
  const lastSyncEl = document.getElementById('autoLastSync');
  
  // 智能缓存策略：非强制刷新时，先使用本地缓存快速显示，后台异步更新
  // 强制刷新时，直接从服务器获取最新数据
  
  const clientId = resolveClientId();
  
  // 步骤1：非强制刷新时，先尝试从缓存快速加载并显示
  if(!force){
    const cachedData = CacheManager.loadFromCache();
    const cacheMeta = CacheManager.getMeta();
    const isCacheValid = CacheManager.isCacheValid(cacheMeta);
    
    if(cachedData && cachedData.latestDate && isCacheValid){
      // 缓存有效，立即显示缓存数据（使用 requestAnimationFrame 确保立即渲染）
      const cachedLatestDate = cachedData.latestDate;
      const cachedTodayRows = dedupeLatestRows(cachedData.memberData[cachedLatestDate] || []);
      const cachedPrevDate = getPrevDateStr(cachedLatestDate);
      const cachedYesterdayRows = cachedPrevDate ? dedupeLatestRows(cachedData.memberData[cachedPrevDate] || []) : [];
      
      if(cachedTodayRows && cachedTodayRows.length){
        // 使用 requestAnimationFrame 立即渲染，不等待其他操作
        requestAnimationFrame(() => {
          const baselineWeek = getBaselineRowsForMode('week', cachedLatestDate);
          const baselineMonth = getBaselineRowsForMode('month', cachedLatestDate);
          const enriched = sortAndEnrich(cachedTodayRows, cachedYesterdayRows, baselineWeek, baselineMonth);
          
          const latestIso = getMaxIsoFromRows(cachedTodayRows) || getMaxIsoFromStoredRows(cachedLatestDate);
          const prevIso = cachedPrevDate ? getMaxIsoFromRows(cachedYesterdayRows) || getMaxIsoFromStoredRows(cachedPrevDate) : null;
          
          renderAutoTable(enriched, {
            latestDate: cachedLatestDate,
            prevDate: cachedPrevDate,
            latestIso,
            prevIso
          });
          if(latestDateEl) latestDateEl.textContent = cachedLatestDate || '—';
          if(prevDateEl) prevDateEl.textContent = cachedPrevDate || '—';
          if(lastSyncEl) lastSyncEl.textContent = cacheMeta?.lastUpdate ? new Date(cacheMeta.lastUpdate).toLocaleString('zh-CN',{ hour12:false }) : '—';
          updateAutoStatus('info', '已加载缓存数据，正在后台检查更新...');
        });
        
        // 后台异步检查更新（不阻塞显示）
        refreshAutoTab(true).catch(err => {
          console.warn('[refreshAutoTab] 后台更新失败，继续使用缓存:', err);
        });
        return;
      }
    }
  }
  
  try{
    autoTabState.loading = true;
    btn?.setAttribute('disabled','disabled');
    updateAutoStatus('info', force ? '正在从服务器获取最新数据...' : '正在检查更新...');
    
    // 优化：添加超时控制和指数退避重试机制
    const fetchWithTimeout = (url, options = {}, timeout = 15000) => {
      return Promise.race([
        fetch(url, options),
        new Promise((_, reject) => 
          setTimeout(() => reject(new Error('请求超时')), timeout)
        )
      ]).catch(err => {
        // 超时或其他错误，返回一个失败的 Response
        if(err.message === '请求超时'){
          console.warn('[refreshAutoTab] 请求超时:', url);
        }
        throw err;
      });
    };
    
    // 新增：指数退避重试机制
    const fetchWithRetry = async (url, options = {}, maxRetries = 3, baseDelay = 1000) => {
      for (let i = 0; i < maxRetries; i++) {
        try {
          return await fetchWithTimeout(url, options);
        } catch (err) {
          console.warn(`[fetchWithRetry] 第 ${i + 1}/${maxRetries} 次请求失败:`, url, err.message);
          if (i === maxRetries - 1) throw err;
          // 指数退避：1s, 2s, 4s
          const delay = baseDelay * Math.pow(2, i);
          console.log(`[fetchWithRetry] ${delay}ms 后重试...`);
          await new Promise(r => setTimeout(r, delay));
        }
      }
    };
    
    // 优先从 history 接口获取所有日期，找到真正的"最新"日期（确保显示真正的最新数据）
    let latestDate = null;
    let memberData = {};
    let rawMap = {};
    let allHistoryDates = []; // 保存所有历史日期，避免重复请求
    
    // 智能缓存策略：强制刷新时绕过缓存，否则允许使用缓存
    const cacheOptions = force ? {
      cache: 'no-store',
      headers: { 
        'Cache-Control': 'no-cache, no-store, must-revalidate, max-age=0',
        'Pragma': 'no-cache',
        'Expires': '0'
      }
    } : {
      cache: 'default', // 允许使用缓存
      headers: {}
    };
    
    // 优化：优先使用 latest API 快速获取最新数据，history API 作为后台补充
    // 这样可以避免等待 history API 的阻塞，提升首次加载速度
    let latestApiPromise = null;
    let historyApiPromise = null;
    
    // 并行发起 latest 和 history 请求
    const timestamp = force ? `&_t=${Date.now()}&_r=${Math.random()}` : '';
    
    // latest API：快速获取最新数据（优先）- 使用重试机制
    latestApiPromise = fetchWithRetry(`${API_BASE}/api/archives/latest?client_id=${encodeURIComponent(clientId)}&raw=1${timestamp}`, { 
      ...cacheOptions,
      method: 'GET'
    }, 3, 1000).catch(err => {
      console.warn('[refreshAutoTab] latest API 请求失败（已重试3次）:', err);
      return null;
    });
    
    // history API：后台获取历史日期列表（不阻塞）- 使用重试机制
    historyApiPromise = fetchWithRetry(`${API_BASE}/api/archives/history?client_id=${encodeURIComponent(clientId)}${timestamp}`, { 
      ...cacheOptions,
      method: 'GET'
    }, 3, 1000).catch(err => {
      console.warn('[refreshAutoTab] history API 请求失败（已重试3次）:', err);
      return null;
    });
    
    // 优先等待 latest API 响应（更快）
    try{
      const latestResp = await latestApiPromise;
      if(latestResp && latestResp.ok){
        const payload = await latestResp.json();
        syncPayloadToLocal(payload);
        // 使用 CacheManager 修复类型问题，确保 rawMap 中的数据有效
        const latestRawMap = payload.memberRaw || {};
        rawMap = {};
        for (const [date, raw] of Object.entries(latestRawMap)) {
          const normalized = CacheManager.normalizeMemberRaw(raw);
          if (normalized && normalized.length > 100) {
            rawMap[date] = normalized;
          }
        }
        const latestMemberData = payload.memberData || {};
        const dates = Object.keys(latestMemberData).sort();
        // 从后往前找第一个有数据的日期
        let foundLatestDate = null;
        for(let i = dates.length - 1; i >= 0; i--){
          const checkDate = dates[i];
          const checkRows = latestMemberData[checkDate] || [];
          if(checkRows && checkRows.length > 0){
            foundLatestDate = checkDate;
            break;
          }
        }
        if(foundLatestDate){
          latestDate = foundLatestDate;
          memberData = { [foundLatestDate]: latestMemberData[foundLatestDate] };
          // 使用 CacheManager 保存到缓存
          CacheManager.saveToCache(memberData, rawMap);
          console.log(`[refreshAutoTab] ✅ 从 latest API 快速获取到最新日期: ${latestDate}, 数据条数: ${memberData[latestDate].length}`);
        } else if(dates.length){
          // 如果所有日期都没有数据，使用最后一个日期
          latestDate = dates[dates.length - 1];
          memberData = latestMemberData;
          CacheManager.saveToCache(memberData, rawMap);
        }
      }
    }catch(err){
      console.warn('[refreshAutoTab] latest API 处理失败:', err);
    }
    
    // 后台处理 history API（不阻塞主流程）
    try{
      const historyResp = await historyApiPromise;
      if(historyResp && historyResp.ok){
        const historyPayload = await historyResp.json();
        const histMemberData = historyPayload.memberData || {};
        // 使用 dates 列表而不是 memberData 的 keys，因为 dates 包含所有有数据的日期
        const allDates = (historyPayload.dates || Object.keys(histMemberData)).sort();
        // 保存所有历史日期，避免后续重复请求
        allHistoryDates = allDates;
        console.log(`[refreshAutoTab] history API 返回: dates=${allDates.length}, memberData keys=${Object.keys(histMemberData).length}`);
        
        // 如果 latest API 没有返回数据，使用 history API 的数据
        if(!latestDate || !memberData[latestDate] || !memberData[latestDate].length){
          if(allDates.length){
          // 优化：只查询最新8个日期，大幅减少初始查询数量
          const maxInitialDates = 8; // 只查询最新8个日期
          const latestDates = allDates.slice(-maxInitialDates); // 取最后8个（最新的）
          console.log(`[refreshAutoTab] 优化：只查询最新 ${latestDates.length} 个日期（共 ${allDates.length} 个历史日期）`);
          
          // 第一步：智能收集需要查询的日期（优化：优先检查本地缓存）
          const datesToQuery = [];
          const cachedDates = CacheManager.getCachedDates();
          const cachedSet = new Set(cachedDates);
          
          // 从最新日期开始遍历（从后往前）
          for(let i = latestDates.length - 1; i >= 0; i--){
            const checkDate = latestDates[i];
            let checkRows = histMemberData[checkDate] || [];
            if(!Array.isArray(checkRows)){
              console.warn(`[refreshAutoTab] ${checkDate} 的 memberData 不是数组:`, typeof checkRows, checkRows);
              checkRows = [];
            }
            // 优化：如果本地缓存已有该日期数据，且不是强制刷新，则跳过
            if(!checkRows.length){
              // 强制刷新时，即使本地有缓存也要查询（确保数据最新）
              // 非强制刷新时，如果本地有缓存，跳过查询
              if(force || !cachedSet.has(checkDate)){
                datesToQuery.push(checkDate);
              } else {
                console.log(`[refreshAutoTab] 跳过 ${checkDate}（本地已有缓存）`);
              }
            }
          }
          
          // 第二步：并行查询所有需要查询的日期（移动端降速：3个，电脑端：8个）
          if(datesToQuery.length > 0){
            const maxConcurrent = window.__isMobile ? 3 : 8; // 移动端降速，避免网络阻塞
            const toQueryNow = datesToQuery.slice(0, maxConcurrent);
            // 优化：不再查询剩余日期，只在需要时（计算涨幅时）再查询
            if(datesToQuery.length > maxConcurrent){
              console.log(`[refreshAutoTab] 只查询前 ${toQueryNow.length} 个日期，其余 ${datesToQuery.length - maxConcurrent} 个日期将在需要时（计算涨幅）再查询`);
            } else {
              console.log(`[refreshAutoTab] 并行查询 ${datesToQuery.length} 个日期...`);
            }
            
            const queryPromises = toQueryNow.map(checkDate => {
              const dateTimestamp = force ? `&_t=${Date.now()}&_r=${Math.random()}` : '';
              return fetchWithRetry(`${API_BASE}/api/archives/history?client_id=${encodeURIComponent(clientId)}&date=${encodeURIComponent(checkDate)}${dateTimestamp}`, { 
                ...cacheOptions,
                method: 'GET'
              }, 3, 1000).then(dateHistoryResp => {
                if(dateHistoryResp.ok){
                  return dateHistoryResp.json().then(dateHistoryPayload => {
                    const checkRows = Array.isArray(dateHistoryPayload.rows) ? dateHistoryPayload.rows : [];
                    if(checkRows.length){
                      // 处理从 date 查询返回的 memberRaw
                      const normalizedRaw = CacheManager.normalizeMemberRaw(dateHistoryPayload.memberRaw);
                      if (normalizedRaw && normalizedRaw.length > 100) {
                        rawMap[checkDate] = normalizedRaw;
                      }
                      // 更新 memberData
                      histMemberData[checkDate] = checkRows;
                      console.log(`[refreshAutoTab] ✅ 并行查询获取到 ${checkDate} 的数据，条数: ${checkRows.length}`);
                    }
                    return { date: checkDate, rows: checkRows };
                  });
                }
                return { date: checkDate, rows: [] };
              }).catch(e => {
                console.warn(`[refreshAutoTab] 并行查询日期 ${checkDate} 失败:`, e);
                return { date: checkDate, rows: [] };
              });
            });
            
            // 等待所有并行查询完成
            const queryResults = await Promise.allSettled(queryPromises);
            queryResults.forEach((result, idx) => {
              if(result.status === 'fulfilled' && result.value){
                const { date, rows } = result.value;
                if(rows && rows.length){
                  histMemberData[date] = rows;
                }
              }
            });
            
            // 优化：不再查询剩余日期，只在需要时（计算涨幅时）再查询
            // 这样可以大幅减少初始加载的API请求数量
            if(datesToQuery.length > maxConcurrent){
              console.log(`[refreshAutoTab] 已查询 ${toQueryNow.length} 个日期，其余 ${datesToQuery.length - maxConcurrent} 个日期将在需要时（计算涨幅）再查询`);
            }
          }
          
          // 第三步：从后往前查找有数据的日期
          let foundDate = null;
          let foundRows = [];
          for(let i = allDates.length - 1; i >= 0; i--){
            const checkDate = allDates[i];
            let checkRows = histMemberData[checkDate] || [];
            if(!Array.isArray(checkRows)) checkRows = [];
            console.log(`[refreshAutoTab] 检查日期 ${checkDate}: checkRows.length=${checkRows.length}`);
            if(checkRows.length){
              foundDate = checkDate;
              foundRows = checkRows;
              console.log(`[refreshAutoTab] 找到有数据的日期: ${foundDate}, 数据条数: ${foundRows.length}`);
              break;
            }
          }
        if(foundDate && foundRows.length){
          latestDate = foundDate;
          memberData[latestDate] = foundRows;
          console.log(`[refreshAutoTab] 使用最新日期: ${latestDate}, 数据条数: ${memberData[latestDate].length}`);
        } else {
          // 如果都没找到，使用日期列表中的最后一个（即使为空）
          latestDate = allDates[allDates.length - 1];
          memberData[latestDate] = histMemberData[latestDate] || [];
          console.warn(`[refreshAutoTab] 未找到有数据的日期，使用最后一个日期: ${latestDate}`);
        }
        // 处理从 history 接口返回的 memberRaw（用于小时级数据）
        // 注意：优先使用通过 date 参数查询获取的 memberRaw（已在 rawMap 中）
        // 只有当 rawMap 中没有该日期的数据时，才尝试从 history 接口的 memberRaw 中获取
        if(latestDate && (!rawMap[latestDate] || !rawMap[latestDate].trim() || rawMap[latestDate].length < 100)){
          // rawMap 中没有有效数据，尝试从 history 接口获取
          const histMemberRaw = historyPayload.memberRaw || {};
          // 优先尝试从对象中获取指定日期的数据
          if (typeof histMemberRaw === 'object' && histMemberRaw[latestDate]) {
            const dateRaw = CacheManager.normalizeMemberRaw(histMemberRaw[latestDate]);
            if (dateRaw && dateRaw.length > 100) {
              rawMap[latestDate] = dateRaw;
              console.log(`[refreshAutoTab] ✅ 从 history 接口获取到 ${latestDate} 的 memberRaw (对象)，长度:`, dateRaw.length);
            } else {
              console.warn(`[refreshAutoTab] ⚠️ history 接口返回的 memberRaw 无效或太短，长度:`, dateRaw ? dateRaw.length : 0);
            }
          } else {
            // 尝试直接转换整个 memberRaw 对象
            const normalizedRaw = CacheManager.normalizeMemberRaw(histMemberRaw);
            if (normalizedRaw && normalizedRaw.length > 100) {
              rawMap[latestDate] = normalizedRaw;
              console.log(`[refreshAutoTab] ✅ 从 history 接口获取到 ${latestDate} 的 memberRaw，长度:`, normalizedRaw.length);
            } else {
              console.warn(`[refreshAutoTab] ⚠️ history 接口未返回 ${latestDate} 的有效 memberRaw，histMemberRaw类型:`, typeof histMemberRaw, '长度:', normalizedRaw ? normalizedRaw.length : 0);
            }
          }
        } else if(latestDate) {
          console.log(`[refreshAutoTab] ✅ rawMap 中已有 ${latestDate} 的 memberRaw（来自 date 参数查询），长度:`, rawMap[latestDate]?.length || 0);
        }
          // 使用 CacheManager 保存到缓存
          CacheManager.saveToCache(memberData, rawMap);
          // 同时同步到本地（保持兼容性）
          syncPayloadToLocal({ memberData, memberRaw: rawMap });
        }
        }
      }
    }catch(err){
      console.warn('[refreshAutoTab] history API 处理失败:', err);
    }
    
    // 如果 history 接口没有返回数据，回退到 latest 接口
    if(!latestDate || !memberData[latestDate] || !memberData[latestDate].length){
      try{
        const timestamp = force ? `&_t=${Date.now()}&_r=${Math.random()}` : '';
        const resp = await fetchWithRetry(`${API_BASE}/api/archives/latest?client_id=${encodeURIComponent(clientId)}&raw=1${timestamp}`, { 
          ...cacheOptions,
          method: 'GET'
        }, 3, 1000);
        if(resp.ok){
          const payload = await resp.json();
          syncPayloadToLocal(payload);
          // 使用 CacheManager 修复类型问题，确保 rawMap 中的数据有效
          const latestRawMap = payload.memberRaw || {};
          rawMap = {};
          for (const [date, raw] of Object.entries(latestRawMap)) {
            const normalized = CacheManager.normalizeMemberRaw(raw);
            if (normalized && normalized.length > 100) {
              rawMap[date] = normalized;
            }
          }
          const latestMemberData = payload.memberData || {};
          const dates = Object.keys(latestMemberData).sort();
          // 从后往前找第一个有数据的日期
          let foundLatestDate = null;
          for(let i = dates.length - 1; i >= 0; i--){
            const checkDate = dates[i];
            const checkRows = latestMemberData[checkDate] || [];
            if(checkRows && checkRows.length > 0){
              foundLatestDate = checkDate;
              break;
            }
          }
          if(foundLatestDate){
            latestDate = foundLatestDate;
            memberData = { [foundLatestDate]: latestMemberData[foundLatestDate] };
          } else if(dates.length){
            // 如果所有日期都没有数据，使用最后一个日期
            latestDate = dates[dates.length - 1];
            memberData = latestMemberData;
          }
        }
      }catch(err2){
        console.warn('从 latest 接口获取最新数据也失败', err2);
      }
    }
    
    autoTabState.lastFetched = Date.now();
    
    // 强化缓存优先策略：如果服务器没有返回有效日期，尝试从本地缓存获取最新日期
    if(!latestDate){
      console.warn('[refreshAutoTab] 服务器未返回有效日期，尝试从本地缓存获取...');
      const cachedDates = CacheManager.getCachedDates().sort();
      if(cachedDates && cachedDates.length > 0){
        // 使用本地缓存的最新日期
        latestDate = cachedDates[cachedDates.length - 1];
        console.log(`[refreshAutoTab] ✅ 使用本地缓存的最新日期: ${latestDate}`);
        // 从缓存加载数据
        const cachedRows = getStoredRowsForDate(latestDate);
        if(cachedRows && cachedRows.length > 0){
          memberData[latestDate] = cachedRows;
          console.log(`[refreshAutoTab] ✅ 从本地缓存加载数据，条数: ${cachedRows.length}`);
        }
        // 显示提示但继续渲染
        updateAutoStatus('info', '已使用本地缓存数据（服务器连接失败）');
      } else {
        renderAutoTable([], {});
        updateAutoStatus('error', '服务器未返回有效日期数据，且本地无缓存');
        return;
      }
    }
    // 优化：只确保必要日期的数据覆盖（最新日期、前一日）
    // 基准日期（本周涨幅、本月涨幅）改为按需查询，不在这里查询
    const neededDates = new Set([latestDate]);
    let prevDate = getPrevDateStr(latestDate);
    if(prevDate) neededDates.add(prevDate);
    
    // 优化：不再在这里查询基准日期，改为在 getBaselineRowsForMode 中按需查询
    // 这样可以减少初始加载的API请求数量
    // 基准日期会在计算涨幅时自动查询（如果缓存中没有）
    
    // 复用之前获取的 allHistoryDates，避免重复请求
    // allHistoryDates 已在第一次 history API 调用时获取
    if(!allHistoryDates || allHistoryDates.length === 0){
      // 如果第一次调用失败，才尝试获取（添加超时控制）
      try{
        const allHistoryResp = await fetchWithRetry(`${API_BASE}/api/archives/history?client_id=${encodeURIComponent(clientId)}${force ? `&_t=${Date.now()}&_r=${Math.random()}` : ''}`, { 
          ...cacheOptions,
          method: 'GET'
        }, 3, 1000);
        if(allHistoryResp.ok){
          const allHistoryPayload = await allHistoryResp.json();
          allHistoryDates = (allHistoryPayload.dates || Object.keys(allHistoryPayload.memberData || {})).sort();
          console.log(`[refreshAutoTab] 从 history API 获取到所有历史日期: ${allHistoryDates.length} 个日期`);
        }
      }catch(e){
        console.warn('[refreshAutoTab] 获取所有历史日期失败:', e);
      }
    } else {
      console.log(`[refreshAutoTab] 复用已获取的历史日期: ${allHistoryDates.length} 个日期`);
    }
    
    // 优化：只确保必要日期的数据覆盖，避免请求所有历史日期
    // 合并必要日期（最新日期、前一日、基准日期）和已获取的历史日期
    const essentialDates = Array.from(neededDates);
    // 只添加本地没有的日期，避免重复请求
    const cachedDates = CacheManager.getCachedDates();
    const cachedSet = new Set(cachedDates);
    const datesToCover = essentialDates.filter(date => !cachedSet.has(date) || force);
    
    if(datesToCover.length > 0){
      console.log(`[refreshAutoTab] 确保 ${datesToCover.length} 个必要日期的数据覆盖（${essentialDates.length - datesToCover.length} 个已从缓存跳过）`);
      await ensureDateCoverage({
        clientId,
        dates: datesToCover,
        memberDataMap: memberData,
        rawMap: rawMap,
        force: force
      });
    } else {
      console.log(`[refreshAutoTab] 所有必要日期已有缓存，跳过 ensureDateCoverage`);
    }
    // 优化：并行查询前一日和前前一日数据，减少串行等待时间
    try{
      // 先检查本地缓存，避免不必要的请求
      const cachedPrevRows = getStoredRowsForDate(prevDate);
      if(cachedPrevRows && cachedPrevRows.length > 0 && !force){
        console.log(`[refreshAutoTab] 前一日数据已缓存，跳过请求: ${prevDate}`);
      } else {
        const prevPrevDate = getPrevDateStr(prevDate);
        const cachedPrevPrevRows = getStoredRowsForDate(prevPrevDate);
        
        // 并行查询前一日和前前一日（如果前前一日也需要查询）
        const timestamp = force ? `&_t=${Date.now()}` : '';
        const timestamp2 = force ? `&_t=${Date.now()}` : '';
        
        const prevPromise = fetchWithRetry(`${API_BASE}/api/archives/history?client_id=${encodeURIComponent(clientId)}&date=${encodeURIComponent(prevDate)}${timestamp}`, { 
          ...cacheOptions,
          method: 'GET'
        }, 3, 1000).catch(err => {
          console.warn(`[refreshAutoTab] 前一日查询失败（已重试3次）:`, err);
          return null;
        });
        
        const prevPrevPromise = (!cachedPrevPrevRows || cachedPrevPrevRows.length === 0 || force) 
          ? fetchWithRetry(`${API_BASE}/api/archives/history?client_id=${encodeURIComponent(clientId)}&date=${encodeURIComponent(prevPrevDate)}${timestamp2}`, { 
              ...cacheOptions,
              method: 'GET'
            }, 3, 1000).catch(err => {
              console.warn(`[refreshAutoTab] 前前一日查询失败（已重试3次）:`, err);
              return null;
            })
          : Promise.resolve(null);
        
        // 等待两个请求完成
        const [prevHistoryResp, prevPrevHistoryResp] = await Promise.allSettled([prevPromise, prevPrevPromise]);
        
        // 处理前一日响应
        if(prevHistoryResp.status === 'fulfilled' && prevHistoryResp.value && prevHistoryResp.value.ok){
          const prevHistoryPayload = await prevHistoryResp.value.json();
          const prevHistRows = Array.isArray(prevHistoryPayload.rows) ? prevHistoryPayload.rows : [];
          if(prevHistRows.length){
            // 前一日有数据，使用它
            try{ localStorage.setItem(storageKey(prevDate), JSON.stringify(prevHistRows)); }catch(_){}
          } else {
            // 前一日没有数据，尝试使用前前一日
            if(prevPrevHistoryResp.status === 'fulfilled' && prevPrevHistoryResp.value && prevPrevHistoryResp.value.ok){
              const prevPrevHistoryPayload = await prevPrevHistoryResp.value.json();
              const prevPrevHistRows = Array.isArray(prevPrevHistoryPayload.rows) ? prevPrevHistoryPayload.rows : [];
              if(prevPrevHistRows.length){
                prevDate = prevPrevDate;
                try{ localStorage.setItem(storageKey(prevDate), JSON.stringify(prevPrevHistRows)); }catch(_){}
              }
            } else if(cachedPrevPrevRows && cachedPrevPrevRows.length > 0){
              // 使用缓存的前前一日数据
              prevDate = prevPrevDate;
              try{ localStorage.setItem(storageKey(prevDate), JSON.stringify(cachedPrevPrevRows)); }catch(_){}
            }
          }
        } else if(cachedPrevPrevRows && cachedPrevPrevRows.length > 0 && !prevHistoryResp.value){
          // 如果前一日查询失败，但有前前一日缓存，使用前前一日
          prevDate = prevPrevDate;
          try{ localStorage.setItem(storageKey(prevDate), JSON.stringify(cachedPrevPrevRows)); }catch(_){}
        }
      }
    }catch(_){ /* 忽略错误 */ }
    
    // 始终优先使用服务器数据，确保显示最新数据
    // 只有在服务器数据完全不存在时，才回退到本地存储（作为最后的后备方案）
    let todayRows = null;
    let yesterdayRows = null;
    
    // 优先使用服务器数据（这是主要数据源）
    if (memberData[latestDate] && memberData[latestDate].length) {
      todayRows = dedupeLatestRows(memberData[latestDate]);
      console.log(`[refreshAutoTab] ✅ 使用服务器数据，日期: ${latestDate}, 数据条数: ${todayRows.length}`);
    } else {
      console.warn(`[refreshAutoTab] ⚠️ 服务器未返回 ${latestDate} 的数据`);
    }
    // 对于前一日数据，即使 memberData 中存在也要强制从服务器获取最新数据（确保涨幅对比准确）
    if (prevDate && memberData[prevDate] && memberData[prevDate].length) {
      // 即使本地有缓存，也先尝试从服务器获取最新数据
      yesterdayRows = dedupeLatestRows(memberData[prevDate]);
      console.log(`[refreshAutoTab] ✅ 使用服务器数据，前一日: ${prevDate}, 数据条数: ${yesterdayRows.length}`);
    } else if (prevDate) {
      console.warn(`[refreshAutoTab] ⚠️ 服务器未返回 ${prevDate} 的数据`);
    }
    
    // 如果服务器数据不存在，才回退到本地存储（仅作为最后的后备方案）
    // 注意：即使本地存储有数据，也优先使用服务器数据，确保显示最新
    if ((!todayRows || !todayRows.length) && latestDate) {
      const fallbackRows = getStoredRowsForDate(latestDate);
      if (fallbackRows && fallbackRows.length) {
        todayRows = dedupeLatestRows(fallbackRows);
        console.log(`[refreshAutoTab] ⚠️ 服务器数据不存在，回退到本地存储，日期: ${latestDate}`);
      }
    }
    if ((!yesterdayRows || !yesterdayRows.length) && prevDate) {
      const fallbackRows = getStoredRowsForDate(prevDate);
      if (fallbackRows && fallbackRows.length) {
        yesterdayRows = dedupeLatestRows(fallbackRows);
        console.log(`[refreshAutoTab] ⚠️ 服务器数据不存在，回退到本地存储，前一日: ${prevDate}`);
      }
    }
    
    // 如果前一日服务器数据不存在或数据空，對应一开始强制一次从服务器获取最新数据（确保涨幅对比正确）
    // 应为开始的 refreshAutoTab 调用，这种情况下限必需要从服务器获取最新的前一日数据
    if((todayRows && todayRows.length) && (!yesterdayRows || !yesterdayRows.length) && prevDate){
      try{
        const timestamp = force ? `&_t=${Date.now()}` : '';
        const historyResp = await fetch(`${API_BASE}/api/archives/history?client_id=${encodeURIComponent(clientId)}&date=${encodeURIComponent(prevDate)}${timestamp}`, { 
          ...cacheOptions,
          method: 'GET'
        });
        if(historyResp.ok){
          const historyPayload = await historyResp.json();
          const histRows = Array.isArray(historyPayload.rows) ? dedupeLatestRows(historyPayload.rows) : [];
          if(histRows.length){
            yesterdayRows = histRows;
            try{ localStorage.setItem(storageKey(prevDate), JSON.stringify(histRows)); }catch(_){}
            console.log(`[refreshAutoTab] ✅ 强制从服务器获取应为新的前一日数据（碩涨幅对比）。日期: ${prevDate}, 数据条数: ${histRows.length}`);
          }
        }
      }catch(error){
        console.warn('[refreshAutoTab] 冶制从服务器获取前一日数据失败', error);
      }
    }
    // 记录服务器端该日的最大时间戳（即使只有 HAR 日志也能识别）
    try{
      const rawTextLatest = rawMap[latestDate] || '';
      const srvMaxIso = detectMaxTsForDateFromText(rawTextLatest, latestDate);
      window.__latestServerMaxIso = window.__latestServerMaxIso || {};
      if(srvMaxIso){ window.__latestServerMaxIso[latestDate] = srvMaxIso; }
    }catch(_){ /* 忽略解析错误 */ }

    // 如果从 history 获取的数据，需要获取该日期的原始数据（HAR）用于时间戳识别
    // 非强制刷新时，如果已有数据则延迟获取 HAR 数据
    if(!rawMap[latestDate] || !rawMap[latestDate].trim() || rawMap[latestDate].length < 100){
      try{
        const timestamp = force ? `&_t=${Date.now()}` : '';
        const latestResp = await fetch(`${API_BASE}/api/archives/latest?client_id=${encodeURIComponent(clientId)}&raw=1${timestamp}`, { 
          ...cacheOptions,
          method: 'GET'
        });
        if(latestResp.ok){
          const latestPayload = await latestResp.json();
          const latestRawMap = latestPayload.memberRaw || {};
          // 使用 CacheManager 修复类型问题，确保 rawMap 中的数据有效
          for (const [date, raw] of Object.entries(latestRawMap)) {
            const normalized = CacheManager.normalizeMemberRaw(raw);
            if (normalized && normalized.length > 100) {
              rawMap[date] = normalized;
            }
          }
          // 更新本地存储（仅用于后备，不作为主要数据源）
          for(const [date, raw] of Object.entries(rawMap)){
            try{ localStorage.setItem(storageRawKey(date), raw); }catch(_){}
          }
          console.log(`[refreshAutoTab] ✅ 从 latest 接口获取到 HAR 数据，日期: ${latestDate}`);
        }
      }catch(e){ 
        console.warn('[refreshAutoTab] 从 latest 获取 HAR 数据失败', e);
      }
    }

    // 若最新日期没有有效明细，只在既没有memberData也没有任何数据时才回退
    // 如果有memberData（即使没有memberRaw），也应该显示该日期的数据而不是回退
    const hasLatestDateData = memberData[latestDate] && memberData[latestDate].length > 0;
    if(!todayRows || !todayRows.length){
      // 检查是否真的没有任何数据（即使是fallback也没有）
      if(!hasLatestDateData){
        updateAutoStatus('warning', `最新日期 ${latestDate} 数据不完整（无有效明细），已回退展示昨日数据`);
        const displayDate = prevDate;
        const displayPrevDate = displayDate ? getPrevDateStr(displayDate) : null;
        const baselineWeekFallback = getBaselineRowsForMode('week', displayDate);
        const baselineMonthFallback = getBaselineRowsForMode('month', displayDate);
      const enrichedFallback = sortAndEnrich(yesterdayRows || [], [], baselineWeekFallback, baselineMonthFallback);
        
        // 优先从 yesterdayRows 中提取 latestIsoFallback
        const latestIsoFallback = getMaxIsoFromRows(yesterdayRows) || (displayDate ? getMaxIsoFromStoredRows(displayDate) : null);
        // 优先从存储中提取 prevIsoFallback（如果有前一日数据）
        const prevIsoFallback = displayPrevDate ? getMaxIsoFromStoredRows(displayPrevDate) : null;
      renderAutoTable(enrichedFallback, {
        latestDate: displayDate,
        prevDate: displayPrevDate,
          latestIso: latestIsoFallback,
          prevIso: prevIsoFallback
      });
      if(latestDateEl) latestDateEl.textContent = displayDate || '—';
      if(prevDateEl) prevDateEl.textContent = displayPrevDate || '—';
      if(lastSyncEl) lastSyncEl.textContent = new Date(autoTabState.lastFetched).toLocaleString('zh-CN',{ hour12:false });
      return;
      } else {
        // 有memberData但todayRows为空，说明可能是dedupeLatestRows导致的，重新从memberData提取
        todayRows = dedupeLatestRows(memberData[latestDate] || []);
        console.log(`[refreshAutoTab] ✅ 从 memberData 重新提取，日期: ${latestDate}, 数据条数: ${todayRows.length}`);
      }
    }

    // 正常路径：最新日期有数据，按标准流程渲染
    // 优化：使用 requestAnimationFrame 立即渲染，避免阻塞
    requestAnimationFrame(() => {
      const baselineWeek = getBaselineRowsForMode('week', latestDate);
      const baselineMonth = getBaselineRowsForMode('month', latestDate);
      const enriched = sortAndEnrich(todayRows, yesterdayRows, baselineWeek, baselineMonth);
      
      // 优先从 todayRows 中提取 latestIso（实际显示的数据，包含最新时间）
      const latestIso = getMaxIsoFromRows(todayRows) || (window.__latestServerMaxIso || {})[latestDate] || getMaxIsoFromStoredRows(latestDate);
      // 优先从 yesterdayRows 中提取 prevIso
      const prevIso = prevDate ? (getMaxIsoFromRows(yesterdayRows) || getMaxIsoFromStoredRows(prevDate)) : null;
      renderAutoTable(enriched, {
        latestDate,
        prevDate,
        latestIso,
        prevIso
      });
      if(latestDateEl) latestDateEl.textContent = latestDate || '—';
      if(prevDateEl) prevDateEl.textContent = prevDate || '—';
      if(lastSyncEl) lastSyncEl.textContent = new Date(autoTabState.lastFetched).toLocaleString('zh-CN',{ hour12:false });
      updateAutoStatus('success', '已获取最新服务器数据');
    });
  }catch(err){
    console.error('refreshAutoTab error', err);
    updateAutoStatus('error', `拉取失败：${err.message || err}`);
  }finally{
    autoTabState.loading = false;
    btn?.removeAttribute('disabled');
  }
}

// 内联提示：显示在指定元素旁
function showInlineStatus(targetId, type, text, ms=2200){
  try{
    const el = document.getElementById(targetId);
    if(!el) return;
    el.textContent = text || '';
    el.classList.remove('success','error','info','show');
    if(type) el.classList.add(type);
    
    // 成功时添加高亮效果
    if(type === 'success') {
      el.style.backgroundColor = '#e8f5e8';
      el.style.padding = '4px 8px';
      el.style.borderRadius = '4px';
      el.style.fontWeight = '500';
      el.style.color = '#137333';
    } else if(type === 'error') {
      el.style.backgroundColor = '#fce8e6';
      el.style.padding = '4px 8px';
      el.style.borderRadius = '4px';
      el.style.fontWeight = '500';
      el.style.color = '#d93025';
    }
    
    void el.offsetWidth; // force reflow
    el.classList.add('show');
    clearTimeout(el._hideT);
    el._hideT = setTimeout(()=>{ 
      el.classList.remove('show');
      // 恢复正常样式
      setTimeout(() => {
        el.style.backgroundColor = '';
        el.style.padding = '';
        el.style.borderRadius = '';
        el.style.fontWeight = '';
        el.style.color = '';
      }, 300);
    }, ms);
  }catch(e){}
}

// API状态检查和显示
function updateApiStatus(status, message) {
  const statusEl = document.getElementById('apiStatus');
  const iconEl = document.getElementById('apiStatusIcon');
  const textEl = document.getElementById('apiStatusText');
  
  if (!statusEl || !iconEl || !textEl) return;
  
  statusEl.style.display = 'block';
  textEl.textContent = message;
  
  // 清除之前的样式
  statusEl.style.backgroundColor = '';
  statusEl.style.color = '';
  statusEl.style.border = '';
  
  switch(status) {
    case 'checking':
      iconEl.textContent = '🔄';
      statusEl.style.backgroundColor = '#f0f0f0';
      statusEl.style.color = '#666';
      break;
    case 'online':
      iconEl.textContent = '🟢';
      statusEl.style.backgroundColor = '#e8f5e8';
      statusEl.style.color = '#137333';
      break;
    case 'offline':
      iconEl.textContent = '🔴';
      statusEl.style.backgroundColor = '#fce8e6';
      statusEl.style.color = '#d93025';
      break;
    case 'partial':
      iconEl.textContent = '🟡';
      statusEl.style.backgroundColor = '#fff3cd';
      statusEl.style.color = '#856404';
      break;

async function checkApiStatus() {
  updateApiStatus('checking', '检查API连接状态...');
  
  const clientId = resolveClientId();
  
  try {
    // 使用更短的超时时间（3秒），快速失败，不阻塞页面
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 3000);
    
    const timestamp = `&_t=${Date.now()}`;
    const response = await fetch(`${API_BASE}/api/archives/latest?client_id=${encodeURIComponent(clientId)}${timestamp}`, {
      method: 'GET',
      signal: controller.signal,
      cache: 'no-store',
      mode: 'cors',
      headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
    });
    
    clearTimeout(timeoutId);
    
    if (response.ok) {
      updateApiStatus('online', 'API服务正常，支持数据同步');
      return 'online';
    } else {
      // 即使返回非200，只要连接成功，也认为API可用（可能是数据问题，不是连接问题）
      if (response.status < 500) {
        updateApiStatus('online', 'API服务正常，支持数据同步');
        return 'online';
      }
      throw new Error(`API返回错误: ${response.status}`);
    }
  } catch (error) {
    // 如果是 AbortError（超时），不立即判定为离线，可能是网络慢
    if (error.name === 'AbortError') {
      console.log('API检查超时，但可能只是网络慢，继续尝试使用API');
      // 超时情况下，仍然标记为在线，让用户尝试使用
      updateApiStatus('online', 'API服务正常（网络可能较慢）');
      return 'online';
    }
    
    console.log('主API检查失败:', error);
    
    // 所有API都失败，但只在明确错误时才显示离线
    // 如果是网络错误（如 CORS、DNS 等），可能是配置问题，不是真正的离线
    if (error.message && !error.message.includes('Failed to fetch') && !error.message.includes('NetworkError')) {
    updateApiStatus('offline', '离线模式：数据仅保存在本地，建议导出备份');
    return 'offline';
    }
    
    // 网络错误时，仍然尝试标记为在线（可能是配置问题）
        updateApiStatus('online', 'API服务正常，支持数据同步');
        return 'online';
  }
}

function extractDateFromJsonObj(obj){
  try{
    // HAR: 优先取 entries 中“数值最大”的 startedDateTime 对应的日期；若不可解析则回退到“出现次数最多的日期”
    const entries = obj?.log?.entries;
    if(Array.isArray(entries) && entries.length){
      // 1) 先找最大 startedDateTime
      let maxTs = -Infinity;
      let maxDate = null;
      for(const e of entries){
        const t = e?.startedDateTime || e?.request?.startedDateTime || e?.response?.startedDateTime;
        if(!t) continue;
        const ts = Date.parse(String(t));
        const ds = String(t).split('T')[0];
        if(!Number.isFinite(ts) || !/\d{4}-\d{2}-\d{2}/.test(ds)) continue;
        if(ts > maxTs){ maxTs = ts; maxDate = ds; }
      }
      if(maxDate) return maxDate;
      // 2) 回退：按日期出现次数最多
      const counts = {};
      for(const e of entries){
        const t = e?.startedDateTime || e?.request?.startedDateTime || e?.response?.startedDateTime;
        if(!t) continue;
        const ds = String(t).split('T')[0];
        if(/\d{4}-\d{2}-\d{2}/.test(ds)){ counts[ds] = (counts[ds]||0)+1; }
      }
      const best = Object.keys(counts).sort((a,b)=>counts[b]-counts[a])[0];
      if(best) return best;
    }
    // 常见 payload: 尝试 obj.date / obj.data.date / obj.info.date / obj.data.info.date
    const candidates = [];
    const maybeDates = [obj?.date, obj?.data?.date, obj?.info?.date, obj?.data?.info?.date];
    for(const v of maybeDates){ if(typeof v === 'string'){ const m = v.match(/\d{4}-\d{2}-\d{2}/); if(m){ candidates.push(m[0]); } } }
    if(candidates.length) return candidates[0];
    // 兜底：在字符串化内容中扫描日期
    const text = JSON.stringify(obj);
    const matches = text.match(/\b\d{4}-\d{2}-\d{2}\b/g);
    if(matches && matches.length){ const cnt = {}; for(const d of matches){ cnt[d]=(cnt[d]||0)+1; } return Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a])[0]; }
  }catch(e){}
  return null;
}
function detectDateFromText(rawText){
  if(!rawText || !rawText.trim()) return null;
  try{ const obj = JSON.parse(rawText); const d = extractDateFromJsonObj(obj); if(d) return d; }

  return null;
}

// 将 ISO 时间字符串格式化为 "YYYY-MM-DD HH:mm:ss"（不做时区换算，仅截取主体部分）
function formatDateTimeForDisplay(tsStr){
  if(!tsStr) return null;
  let s = String(tsStr).replace('T',' ');
  const idxZ = s.indexOf('Z');
  const idxPlus = s.lastIndexOf('+');
  const idxMinus = s.lastIndexOf('-');
  let cutIndex = -1;
  if(idxZ >= 0) cutIndex = idxZ; else if(idxPlus > 10) cutIndex = idxPlus; else if(idxMinus > 10) cutIndex = idxMinus;
  if(cutIndex > 0) s = s.slice(0, cutIndex);
  if(s.includes('.')) s = s.split('.')[0];
  // 仅保留到分钟（YYYY-MM-DD HH:mm）
  const parts = s.split(' ');
  if(parts.length === 2){
    const hhmm = parts[1].split(':').slice(0,2).join(':');
    return `${parts[0]} ${hhmm}`;
  }
  // 回退：截取到前16位（YYYY-MM-DD HH:mm）
  return s.slice(0,16);
}

// 格式化日期为 xxxx年/x/x 格式（用于日期区间显示）
function formatDateForRange(dateStr){
  if(!dateStr) return null;
  const s = String(dateStr);
  // 如果是 ISO 格式（YYYY-MM-DD 或 YYYY-MM-DD HH:mm），提取日期和时间部分
  let datePart = s.split(' ')[0].split('T')[0];
  let timePart = '';
  
  // 提取时间部分（HH:mm）
  if(s.includes('T')){
    const tPart = s.split('T')[1];
    if(tPart){
      const timeMatch = tPart.match(/(\d{2}):(\d{2})/);
      if(timeMatch){
        timePart = ` ${timeMatch[1]}:${timeMatch[2]}`;
      }
    }
  } else if(s.includes(' ')){
    const spaceParts = s.split(' ');
    if(spaceParts.length >= 2){
      const timeMatch = spaceParts[1].match(/(\d{2}):(\d{2})/);
      if(timeMatch){
        timePart = ` ${timeMatch[1]}:${timeMatch[2]}`;
      }
    }
  }
  
  // 格式化为 YYYY-MM-DD HH:mm（去掉"年"字，使用"-"分隔）
  const parts = datePart.split('-');
  if(parts.length === 3){
    const year = parts[0];
    const month = parseInt(parts[1], 10);
    const day = parseInt(parts[2], 10);
    return `${year}-${month}-${day}${timePart}`;
  }
  
  // 如果已经是 xxxx年-x-x 格式，转换为 xxxx-x-x
  if(s.includes('年')){
    return s.replace(/年/g, '').replace(/\//g, '-');
  }
  
  return s;
}

    let tTs = detectMaxTsForDateFromText(tRaw, tDate);
    if(!tTs){
      tTs = getMaxIsoFromStoredRows(tDate);
    }
    let yDate = document.getElementById('yesterdayDate')?.value || getPrevDateStr(document.getElementById('todayDate')?.value || new Date().toISOString().split('T')[0]);
    // 若两端日期重复，自动修正昨日为前一天
    if(yDate === tDate){
      yDate = getPrevDateStr(tDate);
      const ydEl = document.getElementById('yesterdayDate');
      if(ydEl){ ydEl.value = yDate; }
    }
    let yRaw = yesterdayEl?.value || '';
    if(!yRaw || !yRaw.trim()){
      try{ yRaw = localStorage.getItem(storageRawKey(yDate)) || ''; }catch(e){ yRaw = ''; }
    }
    let yTs = detectMaxTsForDateFromText(yRaw, yDate);
    if(!yTs){
      yTs = getMaxIsoFromStoredRows(yDate);
    }
    tSpan && (tSpan.textContent = tTs ? formatDateTimeForDisplay(tTs) : '—');
    ySpan && (ySpan.textContent = yTs ? formatDateTimeForDisplay(yTs) : '—');
  }catch(e){}
}

// 根据 HAR entries.startedDateTime 校验存档日期（优先使用 entries 最大 startedDateTime 对应日期，无法解析时回退到“出现次数最多的日期”）
function validateDateAgainstStartedDateTime(chosenDate, rawText, options){
  const opts = options || {};
  const follow = document.getElementById('followTextDate')?.checked;
  if(!rawText || !rawText.trim()) return { date: chosenDate, changed: false, reason: '' };
  const strategy = opts.strategy || 'max';
  if(strategy === 'latest_for_day'){
    // 仅用于当日校准：不跨天，若文本最大日期不等于所选日期，则保留所选日期
    const latest = detectLatestDateFromText(rawText);
    if(!latest) return { date: chosenDate, changed: false, reason: 'no_detected' };
    if(chosenDate && latest !== chosenDate){
      return { date: chosenDate, changed: false, reason: 'keep_today' };
    }
    return { date: chosenDate || latest, changed: !chosenDate, reason: chosenDate ? '' : 'empty_chosen' };
  }
  const detected = strategy === 'earliest' ? detectEarliestDateFromText(rawText)
                   : strategy === 'latest' ? detectLatestDateFromText(rawText)
                   : detectDateFromText(rawText);
  if(!detected) return { date: chosenDate, changed: false, reason: 'no_detected' };
  if(!chosenDate){
    return { date: detected, changed: true, reason: 'empty_chosen' };
  }
  if(chosenDate !== detected){
    if(follow || opts.enforce){
      return { date: detected, changed: true, reason: 'mismatch_follow' };
    } else {
      showError(`所选日期(${chosenDate})与文本中的 startedDateTime(${detected})不一致，请确认或开启“跟随文本日期”`);
      return { date: chosenDate, changed: false, reason: 'mismatch' };
    }
  }
  return { date: chosenDate, changed: false, reason: '' };
}

// 新增：出生时间解析工具函数（兼容常见字段与嵌套）
function parseBirthTs(val){
  if(val == null) return null;
  if(typeof val === 'number'){
    const n = Number(val);
    if(!Number.isFinite(n)) return null;
    const ts = n > 1e10 ? n : n * 1000; // 兼容秒/毫秒
    return Number.isFinite(ts) ? ts : null;
  }
  const s = String(val);
  const m = s.match(/\b(\d{4})[-\/.](\d{2})[-\/.](\d{2})\b/);
  if(m){
    const iso = `${m[1]}-${m[2]}-${m[3]}T00:00:00Z`;
    const ts = Date.parse(iso);
    return Number.isFinite(ts) ? ts : null;
  }
  return null;
}
function findFirstBirthValDeep(obj){
  const keys = ['birthday','birthDay','birth_date','dateOfBirth','birth','出生时间','出生日期','birthdayDesc'];
  try{
    const stack = [obj];
    while(stack.length){
      const cur = stack.pop();
      if(cur && typeof cur === 'object'){
        for(const [k,v] of Object.entries(cur)){
          const kl = String(k).toLowerCase();
          if(keys.some(x => kl === String(x).toLowerCase())){
            return v;
          }
          if(v && typeof v === 'object') stack.push(v);
        }
      }
    }
  }catch(e){}
  return null;
}
function extractBirthTsFromPayload(payload){
  const d = payload?.data || {};
  const i = d?.info || payload?.info || {};
  const candidates = [
    d.birthday, d.birthDay, d.birth_date, d.dateOfBirth, d.birth, d['出生时间'], d['出生日期'], d.birthdayDesc,
    i.birthday, i.birthDay, i.birth_date, i.dateOfBirth, i.birth, i['出生时间'], i['出生日期'], i.birthdayDesc
  ];
  for(const v of candidates){
    const ts = parseBirthTs(v);
    if(Number.isFinite(ts)) return ts;
  }
  const deepVal = findFirstBirthValDeep(payload);
  const ts2 = parseBirthTs(deepVal);
  return Number.isFinite(ts2) ? ts2 : null;
}

function parseTextToRows(rawText){
  if(!rawText || !rawText.trim()) return [];
  let obj = null;
  try{ obj = JSON.parse(rawText); }catch(e){
    // 尝试提取第一个大括号段落再解析
    const m = rawText.match(/\{[\s\S]*\}/);
    if(m){ try{ obj = JSON.parse(m[0]); }catch(e2){ obj = null; } }
  }
  if(!obj || typeof obj !== 'object') return [];
  // 支持：完整HAR 或 直接接口JSON
  const rows = [];
  const entries = obj?.log?.entries;
  if(Array.isArray(entries)){
    for(const entry of entries){
      const textVal = entry?.response?.content?.text;
      if(!textVal) continue;
      let payload = null;
      try{ payload = JSON.parse(textVal); }catch(e){
        const mm = String(textVal).match(/\{[\s\S]*\}/);
        if(mm){ try{ payload = JSON.parse(mm[0]); }catch(e2){ payload=null; } }
      }
      if(!payload || typeof payload!=='object') continue;
      const data = payload.data || {};
      const info = data.info || {};
      const birthTs = extractBirthTsFromPayload(payload);
      rows.push({
        realName: data.realName || '',
        nickName: data.nickName || data.nick || (nicknameFallbacks[data.realName] || ''),
        collectNum: Number(info.collectNum||0),
        likeNum: Number(info.likeNum||0),
        fansNum: Number(info.fansNum||0),
        avatarUrl: data.headPortrait || data.starHeadPortrait || '',
        birthTs: (birthTs != null ? birthTs : (birthFallbacks[data.realName] ? Date.parse(birthFallbacks[data.realName]) : null)),
        userId: (data.userId != null ? data.userId : (userIdFallbacks[data.realName] || null))
      });
    }
  } else {
    // 直接接口JSON，结构与 payload 相同
    const data = obj.data || {};
    const info = data.info || {};
    const birthTs = extractBirthTsFromPayload(obj);
    if(data.realName || info.fansNum!=null){
      rows.push({
        realName: data.realName || '',
        nickName: data.nickName || data.nick || (nicknameFallbacks[data.realName] || ''),
        collectNum: Number(info.collectNum||0),
        likeNum: Number(info.likeNum||0),
        fansNum: Number(info.fansNum||0),
        avatarUrl: data.headPortrait || data.starHeadPortrait || '',
        birthTs: (birthTs != null ? birthTs : (birthFallbacks[data.realName] ? Date.parse(birthFallbacks[data.realName]) : null)),
        userId: (data.userId != null ? data.userId : (userIdFallbacks[data.realName] || null))
      });
    }
  }
  return rows;
}

function sortAndEnrich(todayRows, yesterdayRows, baselineWeekRows, baselineMonthRows){
  // 先对昨日数据进行去重，确保每个成员只有一条记录（取时间戳最大的一条）
  const dedupedYesterdayRows = dedupeLatestRows(yesterdayRows || []);
  // 过滤掉张三和李四的数据
  const filteredYesterdayRows = dedupedYesterdayRows.filter(r => {
    const name = String(r.realName || '').trim();
    return name !== '张三' && name !== '李四';
  });
  // 基于去重后的昨日数据构建粉丝数映射（用于涨幅计算）
  const mapYesterdayFans = new Map();
  for(const r of filteredYesterdayRows){
    if(r.realName) mapYesterdayFans.set(String(r.realName), Number(r.fansNum||0));
  }
  const mapBaselineWeek = new Map();
  for(const r of (baselineWeekRows||[])){
    const name = String(r.realName || '').trim();
    if(r.realName && name !== '张三' && name !== '李四') {
      mapBaselineWeek.set(String(r.realName), Number(r.fansNum||0));
    }
  }
  const mapBaselineMonth = new Map();
  for(const r of (baselineMonthRows||[])){
    const name = String(r.realName || '').trim();
    if(r.realName && name !== '张三' && name !== '李四') {
      mapBaselineMonth.set(String(r.realName), Number(r.fansNum||0));
    }
  }
  // 计算指定日期的排名映射（按粉丝数降序）
  const prevSorted = filteredYesterdayRows.slice().sort((a,b)=>Number(b.fansNum||0)-Number(a.fansNum||0));
  const prevRankMap = new Map();
  let prevRankCounter = 0;
  for (const pr of prevSorted) {
    prevRankCounter += 1;
    // 使用 realName 作为 key，如果没有则使用 userId
    const key = String(pr.realName || '').trim() || (pr.userId != null ? String(pr.userId) : '');
    if (key) prevRankMap.set(key, prevRankCounter);
  }

  // 先对今日数据进行去重，确保每个成员只有一条记录（取最新的一条）
  const dedupedTodayRows = dedupeLatestRows(todayRows || []);
  // 过滤掉张三和李四的数据
  const filteredRows = dedupedTodayRows.filter(r => {
    const name = String(r.realName || '').trim();
    return name !== '张三' && name !== '李四';
  });
  const sorted = filteredRows.slice().sort((a,b)=>Number(b.fansNum||0)-Number(a.fansNum||0));
  let prevFans = null;
  const enriched = [];
  let rank = 0;
  for(const r of sorted){
    rank += 1;
    const fans = Number(r.fansNum||0);
    const diffPrev = prevFans==null? '' : (prevFans - fans);
    prevFans = fans;
    const yesFans = mapYesterdayFans.has(String(r.realName)) ? mapYesterdayFans.get(String(r.realName)) : null;
    const growth = (yesFans==null ? '' : (fans - Number(yesFans))); // 日涨幅（昨日为基准）
    const weekBase = mapBaselineWeek.has(String(r.realName)) ? mapBaselineWeek.get(String(r.realName)) : null;
    // 本月涨幅：如果本月1日有数据则使用，否则使用 0 作为基准（表示从0开始累计）
    const monthBase = mapBaselineMonth.has(String(r.realName)) ? mapBaselineMonth.get(String(r.realName)) : null;
    const weekGrowth = (weekBase==null ? '' : (fans - Number(weekBase))); // 不回退
    
    // 调试信息：输出前3个成员的涨幅计算详情（避免输出过多）
    if(rank <= 3 && weekGrowth !== '' && weekGrowth !== null){
      console.log(`[本周涨幅计算] ${r.realName}: 今日粉丝数=${fans}, 基准粉丝数=${weekBase}, 本周涨幅=${weekGrowth}`);
    }
    // 本月涨幅：如果本月1日有基准数据，计算差值；如果没有基准数据，显示为空字符串
    // 注意：如果 baselineMonthRows 为空（本月1日无数据），monthBase 为 null，此时应显示为空字符串，而不是粉丝数
    const monthGrowth = (monthBase==null ? '' : (fans - Number(monthBase)));
    // 排名变化：使用 realName 或 userId 作为 key 查找昨日排名
    const key = String(r.realName || '').trim() || (r.userId != null ? String(r.userId) : '');
    const prevRank = key && prevRankMap.has(key) ? prevRankMap.get(key) : null;
    let rankChange = '';
    if (prevRank != null) {
      const diff = prevRank - rank; // 正数表示排名提升（数值变小）
      if (diff > 0) rankChange = `上升${diff}名`;
      else if (diff < 0) rankChange = `下降${Math.abs(diff)}名`;
      else rankChange = '持平';
    }

    enriched.push({
      排名: rank,
      姓名: r.realName || '',
      收藏数: Number(r.collectNum||0),
      点赞数: Number(r.likeNum||0),
      粉丝数: fans,
      涨幅: growth,
      本周涨幅: weekGrowth,
      本月涨幅: monthGrowth,
      与前一名差值: diffPrev,
      排名变化: rankChange,
      avatarUrl: r.avatarUrl || r.headPortrait || '',
      birthTs: (r.birthTs!=null && Number.isFinite(Number(r.birthTs))) ? Number(r.birthTs) : null,
      nickName: r.nickName || (nicknameFallbacks[r.realName] || ''),
      userId: (r.userId != null ? r.userId : (userIdFallbacks[r.realName] || null))
    });
  }
  return enriched;
}
